/* 바텀시트 끌어내려 닫기(모바일) — 상단 그립을 잡고 아래로 끌면 따라오고, 임계치 넘으면 닫힘 */
(function(){
  const mobile=()=>window.matchMedia('(max-width:920px)').matches;
  let on=false,sy=0,dy=0,t0=0;
  function down(e){
    const grip=e.target&&e.target.closest?e.target.closest('.sheetgrip'):null;
    if(!grip||!mobile())return;
    const sh=$('#sheet');if(!sh)return;
    on=true;dy=0;sy=e.clientY;t0=Date.now();sh.style.transition='none';
    try{grip.setPointerCapture(e.pointerId);}catch(_){}
    document.addEventListener('pointermove',move,{passive:false});
    document.addEventListener('pointerup',up,{once:true});
    document.addEventListener('pointercancel',up,{once:true});
    e.preventDefault();
  }
  function move(e){
    if(!on)return;
    dy=Math.max(0,e.clientY-sy);
    const sh=$('#sheet');if(sh)sh.style.transform='translateY('+dy+'px)';
    const sc=document.querySelector('#modal .scrim');if(sc)sc.style.opacity=String(Math.max(0,1-dy/420));
    e.preventDefault();
  }
  function up(){
    document.removeEventListener('pointermove',move);
    if(!on)return;on=false;
    const sh=$('#sheet');const sc=document.querySelector('#modal .scrim');
    const fast=dy>40 && dy/Math.max(1,Date.now()-t0)>0.6;
    if(sh)sh.style.transition='transform .22s var(--ease)';
    if(dy>96||fast){
      if(sh)sh.style.transform='translateY(100%)';
      setTimeout(()=>{if(sh)sh.style.transition='';closeModal();},170);
    }else{
      if(sh)sh.style.transform='';
      if(sc)sc.style.opacity='';
      setTimeout(()=>{if(sh)sh.style.transition='';},240);
    }
  }
  document.addEventListener('pointerdown',down,{passive:false});
})();

/* ===================== drag & drop (desktop) ===================== */
const GRIP=`<span class="draghandle" title="드래그해서 이동"><svg><use href="#i-grip"/></svg></span>`;
let _drag=null;
function _dndRef(zone,itemSel,x,y,axis){
  const els=[...zone.querySelectorAll(':scope > '+itemSel)].filter(e=>e!==_drag.el&&!e.classList.contains('dragging'));
  if(axis==='grid'){
    let best=null,bd=Infinity;
    for(const el of els){const b=el.getBoundingClientRect();const cx=b.left+b.width/2,cy=b.top+b.height/2;
      const d=(x-cx)**2+(y-cy)**2;if(d<bd){bd=d;best=el;}}
    if(!best)return null;
    const b=best.getBoundingClientRect();
    return x<b.left+b.width/2?best:best.nextElementSibling;
  }
  let best=null,bestOff=-Infinity;
  for(const el of els){const b=el.getBoundingClientRect();const off=y-(b.top+b.height/2);
    if(off<0&&off>bestOff){bestOff=off;best=el;}}
  return best;
}
function dndWire({zones,itemSel,kind,axis,handleSel,commit}){
  zones.forEach(zone=>{
    zone.addEventListener('dragover',e=>{
      if(!_drag||_drag.kind!==kind)return;
      e.preventDefault();e.dataTransfer.dropEffect='move';
      const ref=_dndRef(zone,itemSel,e.clientX,e.clientY,axis||'y');
      if(ref===_drag.el)return;
      if(ref)zone.insertBefore(_drag.el,ref);else zone.appendChild(_drag.el);
    });
    zone.addEventListener('drop',e=>{if(_drag&&_drag.kind===kind)e.preventDefault();});
  });
  zones.forEach(zone=>zone.querySelectorAll(':scope > '+itemSel).forEach(it=>{
    if(it.dataset.nodrag)return;
    if(handleSel){const h=it.querySelector(handleSel);if(!h)return;
      h.addEventListener('mousedown',()=>it.setAttribute('draggable','true'));
      h.addEventListener('mouseup',()=>it.setAttribute('draggable','false'));
      h.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();});
    }else it.setAttribute('draggable','true');
    it.addEventListener('dragstart',e=>{_drag={kind,el:it};it.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';try{e.dataTransfer.setData('text/plain','x');}catch(_){}}); 
    it.addEventListener('dragend',()=>{it.classList.remove('dragging');if(handleSel)it.setAttribute('draggable','false');
      const had=_drag;_drag=null;if(had)commit();});
  }));
}
function dndRename(el,cur,apply){
  if(el.getAttribute('contenteditable')==='true')return;
  el.classList.add('editing');el.setAttribute('contenteditable','true');el.spellcheck=false;el.focus();
  const r=document.createRange();r.selectNodeContents(el);const s=getSelection();s.removeAllRanges();s.addRange(r);
  let done=false;
  const finish=keep=>{if(done)return;done=true;
    el.removeAttribute('contenteditable');el.classList.remove('editing');
    el.removeEventListener('blur',onBlur);el.removeEventListener('keydown',onKey);
    const val=el.textContent.replace(/\s+/g,' ').trim();
    if(keep&&val&&val!==cur)apply(val);else el.textContent=cur;};
  const onBlur=()=>finish(true);
  const onKey=e=>{if(e.key==='Enter'){e.preventDefault();finish(true);}else if(e.key==='Escape'){e.preventDefault();finish(false);}};
  el.addEventListener('blur',onBlur);el.addEventListener('keydown',onKey);
}

  const TYPEPAL=['#2997FF','#64D2FF','#5EEAD4','#FBBF24','#FB7185','#A78BFA','#34D399','#F472B6'];
  const rows=Object.entries(types).sort((a,b)=>b[1]-a[1]).map(([t,n],i)=>{
    const w=Math.max(4,Math.round(n/Math.max(1,total)*100));const col=TYPEPAL[i%TYPEPAL.length];
    return `<div class="trow" title="${esc(t)} ${n}개 · 전체의 ${Math.round(n/Math.max(1,total)*100)}%"><span class="tl"><span class="tdot" style="background:${col}"></span>${esc(t)}</span><div class="bartrack"><div class="barfill" style="width:${w}%;background:${col}"></div></div><span class="tn num">${n}</span></div>`;
  }).join('');

    :'<div class="mut2" style="font-size:var(--f12)">등록된 릴리즈가 없습니다.</div>';
  wrap.appendChild(c);return wrap;
}

/* 홈 위젯 — 매출 현황(발매 경로별 매출·순수익 비중) */
function platformWidget(L){
  const ch={};ALLTX.forEach(t=>{const s=t.src;(ch[s]||(ch[s]={n:0,c:0}));ch[s].n+=txNetKRW(t);ch[s].c++;});
  const ent=Object.entries(ch).sort((a,b)=>b[1].n-a[1].n);
  const tot=ent.reduce((s,[,d])=>s+d.n,0)||1;
  const wrap=ce('div');wrap.appendChild(secH('매출 현황','',`<span class="mut2 num" style="font-size:var(--f12)">매출 ${won(L.gross)} · 순수익 ${won(L.net)}</span>`));
  const c=ce('div','card');
  if(!ent.length){c.innerHTML='<div class="mut2" style="font-size:var(--f12)">거래 데이터가 없습니다.</div>';wrap.appendChild(c);return wrap;}
  c.innerHTML=ent.map(([k,d])=>{
    const pct=d.n/tot*100;const isDcm=k.includes('DCM');
    return `<div class="prow" title="${esc(k)} · 순수익 ${won(d.n)} · ${d.c.toLocaleString()}건 · 전체의 ${pctf(pct)}">
      <div class="ph"><span class="pill ${isDcm?'info':'acc'}">${esc(k)}</span><span class="mut2 num" style="font-size:var(--f11)">${d.c.toLocaleString()}건</span><span class="num" style="margin-left:auto;font-weight:500;color:var(--t1)">${won(d.n)}</span></div>
      <div class="bartrack" style="margin-top:7px"><div class="barfill ${isDcm?'':'over'}" style="width:${Math.max(3,pct).toFixed(1)}%"></div></div>
      <div class="mut2 num" style="font-size:var(--f11);margin-top:3px">${pctf(pct)}</div></div>`;
  }).join('');
  wrap.appendChild(c);return wrap;
}

      + '</tr></thead>';
    let body='<tbody>';

        }else{
          const cell=(fld,val,w)=>`<td style="padding:4px 6px"><input type="text" title="${esc(val||'')}" data-rid="${r.id}" data-ti="${i}" data-f="${fld}" value="${esc(val||'')}" style="width:${w||'100%'};min-width:70px;border-color:transparent;background:transparent;padding:5px 6px"></td>`;
          tds+=`<td class="mut2 num" style="text-align:center;padding:4px 2px">${i+1}</td>`;

    applyQ();
    $('#rq').oninput=()=>{f.q=$('#rq').value;applyQ();};
    card.querySelectorAll('td[data-open]').forEach(td=>td.onclick=()=>openRelease(td.dataset.open));

      const r=S.releases.find(x=>x.id===rid);if(!r||!r.tracks||!r.tracks[ti])return;
      apply(r.tracks[ti]);r.updatedAt=Date.now();r.by=who();saveReleases();if(el)flash(el);
    };
    card.querySelectorAll('input[data-rid]').forEach(inp=>inp.onchange=()=>{
      saveCell(inp.dataset.rid,+inp.dataset.ti,t=>{

  syncTog();

function genreOptions(){
  const g=new Set();
  S.releases.forEach(r=>{if(r.genre)g.add(r.genre);(r.tracks||[]).forEach(t=>{if(t.genre)g.add(t.genre);});});
  return [...g].sort();
}
function genreSelect(attrs,val){
  val=val||'';
  const opts=dedup([...(val?[val]:[]),...genreOptions()]);
  return `<select ${attrs}><option value="">장르 —</option>${opts.map(g=>`<option value="${esc(g)}" ${g===val?'selected':''}>${esc(g)}</option>`).join('')}<option value="__new">＋ 직접 입력…</option></select>`;
}
function wireGenre(sel,onVal){
  sel.dataset.prev=sel.value;
  sel.addEventListener('change',async()=>{
    if(sel.value==='__new'){
      const g=((await dlgPrompt('새 장르 이름','',{title:'장르 추가',ok:'추가'}))||'').trim();
      if(!g){sel.value=sel.dataset.prev||'';return;}
      let o=[...sel.options].find(x=>x.value===g);
      if(!o){o=document.createElement('option');o.value=o.textContent=g;sel.insertBefore(o,sel.querySelector('option[value="__new"]'));}
      sel.value=g;
    }
    sel.dataset.prev=sel.value;
    if(onVal)onVal(sel.value);
  });
}
function openRelease(id,draft){
  let r=id?S.releases.find(x=>x.id===id):null;
  const isNew=!r;
  if(isNew)r=draft||{id:uid(),cat:'',title:'',type:'싱글',artists:[],date:'',genre:'',copy:'',link:'',
    tracks:[{title:'',version:'',artists:'',genre:'',bpm:'',key:''}],artUri:'',memo:''};
  r=deep(r);
  const sheet=$('#sheet');
  function trkRows(){
    return r.tracks.map((t,i)=>`<div class="trkrow" data-i="${i}">
      <span class="n num">${i+1}</span>
      <input type="text" data-f="title" placeholder="트랙명" value="${esc(t.title)}">
      <input type="text" data-f="artists" placeholder="아티스트" value="${esc(t.artists)}">
      ${genreSelect(`data-f="genre"`,t.genre||'')}
      <input type="text" data-f="version" placeholder="버전" value="${esc(t.version||'')}">
      <input type="text" data-f="bpm" placeholder="BPM" value="${esc(t.bpm||'')}" class="num">
      <input type="text" data-f="key" placeholder="KEY" value="${esc(t.key||'')}">
      <button class="iconbtn" data-deltrk="${i}" title="트랙 삭제"><svg><use href="#i-x"/></svg></button></div>`).join('');
  }
  function collectTrks(){
    sheet.querySelectorAll('.trkrow').forEach(div=>{const i=+div.dataset.i;
      div.querySelectorAll('[data-f]').forEach(inp=>r.tracks[i][inp.dataset.f]=inp.value);});
  }
  // 트랙 추가/삭제 시 전체 시트(앨범아트 base64 포함)를 다시 그리지 않고 트랙 목록만 갱신
  function renderTrks(){
    const host=$('#rTrks');host.innerHTML=trkRows();

    host.querySelectorAll('[data-deltrk]').forEach(b=>b.onclick=()=>{
      collectTrks();r.tracks.splice(+b.dataset.deltrk,1);
      if(!r.tracks.length)r.tracks.push({title:'',version:'',artists:'',genre:'',bpm:'',key:''});
      renderTrks();
    });

  function draw(){
    sheet.innerHTML=`<span class="x" onclick="closeModal()">${ic('x')}</span>
      <h3>${isNew?'새 릴리즈':'릴리즈 편집'}</h3>

          ${relArt(r)?`<img class="prev" id="rArtPrev" src="${relArt(r)}" onerror="artErr(this)" alt="">`:`<img class="prev noart" id="rArtPrev" alt="">`}          <span class="ov">${relArt(r)?'이미지 변경':'앨범아트 업로드'}</span>
          <input type="file" id="rArtFile" accept="image/*" style="display:none">
        </label>
        <div style="flex:1;min-width:0;display:flex;flex-direction:column;justify-content:space-between;gap:7px">
          <div class="frow">
            <div class="field" style="flex:2"><label class="fl">릴리즈명</label><input type="text" id="rTitle" value="${esc(r.title)}" placeholder="예: Step Forward"></div>
            <div class="field"><label class="fl">카탈로그 번호</label><input type="text" id="rCat" value="${esc(r.cat)}" placeholder="DIN-0XX"></div>
          </div>
          <div class="frow">
            <div class="field" style="flex:2"><label class="fl">아티스트 (쉼표로 구분)</label><input type="text" id="rArtists" value="${esc((r.artists||[]).join(', '))}" placeholder="예: Kaselia, Ixia" list="rosterList">
              <datalist id="rosterList">${S.roster.map(a=>`<option value="${esc(a.name)}">`).join('')}</datalist></div>
            <div class="field"><label class="fl">유형</label><select id="rType">${['싱글','EP','앨범','리믹스','컴필레이션'].map(t=>`<option ${r.type===t?'selected':''}>${t}</option>`).join('')}</select></div>
          </div>

            <div class="field"><label class="fl">발매일</label><input type="date" id="rDate" value="${esc(r.date)}"></div>
          </div>
        </div>
      </div>
      <div class="field" style="margin-top:12px"><label class="fl">소개 문구 (릴리즈 카피)</label>

      <hr class="sep"><div class="fgrp" style="display:flex;align-items:center;justify-content:space-between;gap:8px">트랙리스트<button class="btn sm" id="addTrk">${ic('plus')}추가</button></div>

        <button class="btn" onclick="closeModal()">취소</button>

    const del=$('#rDel');if(del)del.onclick=async()=>{

      S.releases=S.releases.filter(x=>x.id!==r.id);saveReleases();closeModal();render();toast('릴리즈를 삭제했습니다');};

      if(i>=0)S.releases[i]=r;else S.releases.push(r);
      saveReleases();closeModal();render();toast(isNew?'릴리즈가 등록되었습니다':'저장되었습니다');
    };
    renderTrks();

  draw();openModal(true);

function artistArtUri(name){
  const k=KX(name);if(!k)return null;
  // 1) 릴리즈 데이터 연동 — 메인 아티스트 정확 매칭 또는 트랙의 아티스트·버전·제목 텍스트에 이름 포함(리믹스·합작 커버)
  const rels=S.releases.filter(r=>
    (r.artists||[]).some(a=>KX(a)===k) ||
    (r.tracks||[]).some(t=>KX((t.artists||'')+'|'+(t.version||'')+'|'+(t.title||'')).includes(k))
  ).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  for(const r of rels){const u=relArt(r);if(u)return u;}
  // 2) 정산 레지스트리 폴백 — 원작자/리믹서/원본 표기 텍스트 매칭
  const reg=REG_DATA.find(r=>
    (r.originals||[]).some(o=>KX(o)===k) || (r.remixer&&KX(r.remixer)===k) ||
    KX((r.artist_raw||'')+'|'+(r.version||'')+'|'+(r.track||'')).includes(k)
  );
  return reg?(artUri(reg.release)||artCatUrl(reg.cat)||null):null;
}
/* 이미지 없을 때 이니셜 + 이름 기반 자동 색상 폴백 */
function phInitials(s){s=(s||'').trim();if(!s)return '–';
  const p=s.split(/[\s/&,·]+/).filter(Boolean);
  if(p.length>=2)return p[0][0]+p[1][0];
  return s.replace(/\s+/g,'').slice(0,2);}
function phBg(name){let h=0;const s=name||'?';for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;const hue=h%360;return `linear-gradient(135deg,hsl(${hue} 58% 54%),hsl(${(hue+38)%360} 56% 42%))`;}
function phBox(name,cls,style){return `<span class="${cls} artph" style="${style||''};background:${phBg(name)}">${esc(phInitials(name))}</span>`;}
function avatarMini(name,size){
  size=size||34;const uri=artistArtUri(name);const st=`width:${size}px;height:${size}px;border-radius:${Math.round(size/4)}px`;
  return uri?`<img class="av" style="${st}" src="${uri}" data-ph="${esc(name)}" onerror="artErr(this)" alt="">`:phBox(name,'av',st+`;font-size:${Math.round(size*0.42)}px`);
}
// 거래/명세 등에서 릴리즈명만 있을 때 릴리즈 데이터의 앨범아트를 우선 사용
function relArtByName(name){
  if(!name)return artUri(name)||'';
  const k=KX(name);
  const r=S.releases.find(x=>KX(x.title)===k)||S.releases.find(x=>KX(x.cat)===k);
  if(r){const u=relArt(r);if(u)return u;}
  return artUri(name)||'';
}
// 거래 행 앨범아트: 카탈로그 → 릴리즈 데이터, 없으면 릴리즈명 매칭
function txArt(t){
  const r=t&&t.cat?relByCat(t.cat):null;
  const nm=(t&&(t.release||t.track))||'';
  const u=(r?relArt(r):'')||relArtByName(t&&t.release)||artCatUrl(t&&t.cat);
  return u?`<img class="av" src="${u}" data-ph="${esc(nm)}" onerror="artErr(this)" alt="">`:phBox(nm,'av','font-size:13px');
}

function fillVars(text,art,rel){
  const tracks=(rel&&rel.tracks||[]).map((t,i)=>`${i+1}. ${t.title}${t.version?' ('+t.version+')':''}`).join('\n');
  return (text||'')
    .replace(/\{아티스트\}/g,art?art.name:'{아티스트}')
    .replace(/\{릴리즈\}/g,rel?rel.title:'{릴리즈}')
    .replace(/\{발매일\}/g,rel&&rel.date?fmtD(rel.date):'{발매일}')
    .replace(/\{트랙리스트\}/g,tracks||'{트랙리스트}')
    .replace(/\{링크\}/g,rel&&rel.link?rel.link:'{링크}')
    .replace(/\{보낸이\}/g,who());
}

  const kpis=ce('div','kpis');
  const kpi=(lab,tag,val,meta)=>`<div class="card kpi"><div class="lab"><span class="ind" style="background:${tag}"></span>${lab}</div><div class="val num">${val}</div><div class="meta">${meta}</div></div>`;

    kpi('총 매출','var(--t4)',won(L.gross),`수수료 포함 · 거래 ${ALLTX.length.toLocaleString()}건`)+
    kpi('순수익','var(--t3)',won(L.net),'수수료 제외 실수령액')+
    kpi('레이블 귀속','var(--info)',won(L.label),`아티스트 귀속 ${won(L.net-L.label)}`)+
    kpi('정산 가능','var(--ok)',won(payTotal),`대상 <b>${payArts.length}</b>명 · ${L.mode==='release'?'계약별':'아티스트 합산'}`);
  v.appendChild(kpis);

  v.appendChild(secH('발매 경로별','매출 · 순수익'));
  const ch={};ALLTX.forEach(t=>{(ch[t.src]||(ch[t.src]={g:0,n:0,c:0}));ch[t.src].g+=txGrossKRW(t);ch[t.src].n+=txNetKRW(t);ch[t.src].c++;});
  const ct=ce('div','card flat tblx');let h='<table><thead><tr><th>경로</th><th class="r">거래</th><th class="r">매출</th><th class="r">순수익</th><th class="r">비중</th></tr></thead><tbody>';

function trendCard(labels,cum,monthly){
  const c=ce('div','card');c.style.padding='12px 14px 8px';
  const W=960,H=170,padL=40,padR=44,padT=14,padB=28;
  const n=cum.length;
  const cMax=Math.max(1,...cum.map(Math.abs));
  const mMax=Math.max(1,...monthly.map(v=>Math.max(0,v)));
  const innerW=W-padL-padR,plotH=H-padB-padT;
  const band=innerW/Math.max(1,n);
  const bw=Math.min(30,band*0.6);
  const cxOf=i=>padL+band*(i+0.5);
  const Yb=val=>H-padB-plotH*(Math.max(0,val)/mMax);
  const Yc=val=>H-padB-plotH*(val/cMax);
  const Yf=f=>H-padB-plotH*f;
  const kfmt=x=>{x=Math.round(x);const a=Math.abs(x);if(a>=1e6)return (x/1e6).toFixed(a%1e6?1:0).replace(/\.0$/,'')+'M';if(a>=1e3)return Math.round(x/1e3)+'k';return ''+x;};
  // 공유 가로 그리드 — 좌(월별·파랑) / 우(누계·주황) 라벨
  let grid='';
  [0,.25,.5,.75,1].forEach(f=>{const yy=Yf(f);
    grid+=`<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-padR}" y2="${yy.toFixed(1)}" stroke="var(--bd)" ${f>0&&f<1?'stroke-dasharray="2 4"':''}/>
      <text x="${padL-7}" y="${(yy+3.2).toFixed(1)}" text-anchor="end" fill="var(--chart-bar)" font-size="8">${kfmt(mMax*f)}</text>
      <text x="${W-padR+7}" y="${(yy+3.2).toFixed(1)}" text-anchor="start" fill="var(--chart-line)" font-size="8">${kfmt(cMax*f)}</text>`;});
  // 막대(월별) + 선(누계) + 포인트 + 연도 경계 + x 라벨
  let bars='',dots='',xlab='',dpath='';
  monthly.forEach((mv,i)=>{
    const cxC=cxOf(i),yTop=Yb(mv),bh=Math.max(0,(H-padB)-yTop);
    bars+=`<rect class="mbar" x="${(cxC-bw/2).toFixed(1)}" y="${yTop.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="2" fill="var(--chart-bar)" opacity=".5"/>`;
    dpath+=(i?'L':'M')+cxC.toFixed(1)+' '+Yc(cum[i]).toFixed(1)+' ';
    dots+=`<circle cx="${cxC.toFixed(1)}" cy="${Yc(cum[i]).toFixed(1)}" r="2" fill="var(--chart-line)" opacity=".85"/>`;
    if(i>0&&labels[i].slice(0,4)!==labels[i-1].slice(0,4))
      xlab+=`<line x1="${(padL+band*i).toFixed(1)}" y1="${padT}" x2="${(padL+band*i).toFixed(1)}" y2="${H-padB}" stroke="var(--bd)" stroke-dasharray="2 4"/>`;
    const every=n<=14?1:n<=30?3:6;
    if(i%every===0||i===n-1)
      xlab+=`<text x="${cxC.toFixed(1)}" y="${H-9}" fill="var(--t4)" font-size="8" text-anchor="middle">${labels[i].slice(2)}</text>`;
  });
  let lastMk='';
  if(n){const lx=cxOf(n-1),ly=Yc(cum[n-1]);
    lastMk=`<circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="3.5" fill="var(--card)" stroke="var(--chart-line)" stroke-width="2"/>`;}
  c.innerHTML=`<div class="chartwrap">
    <svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block" preserveAspectRatio="xMidYMid meet">
      ${grid}${xlab}${bars}
      <path d="${dpath}" fill="none" stroke="var(--chart-line)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}${lastMk}
      <line class="cx" x1="0" y1="${padT}" x2="0" y2="${H-padB}" stroke="var(--t4)" stroke-width="1" stroke-dasharray="4 3" style="display:none"/>
      <circle class="cdot" r="4.5" fill="var(--card)" stroke="var(--chart-line)" stroke-width="2" style="display:none"/>
      <rect class="covl" x="${padL}" y="${padT}" width="${innerW}" height="${plotH}" fill="transparent" style="cursor:crosshair"/>
    </svg><div class="ctip" style="display:none"></div></div>`;
  const svg=c.querySelector('svg'),dot=c.querySelector('.cdot'),cx=c.querySelector('.cx'),tip=c.querySelector('.ctip'),ov=c.querySelector('.covl'),bel=[...c.querySelectorAll('.mbar')];
  const showAt=i=>{
    bel.forEach((b,j)=>b.setAttribute('opacity',j===i?'.85':'.5'));
    const cxC=cxOf(i),yL=Yc(cum[i]);
    dot.setAttribute('cx',cxC);dot.setAttribute('cy',yL);dot.style.display='';
    cx.setAttribute('x1',cxC);cx.setAttribute('x2',cxC);cx.style.display='';
    const r=svg.getBoundingClientRect();
    tip.style.left=(cxC/W*r.width)+'px';tip.style.top=(yL/H*r.height)+'px';tip.style.transform='translate(-50%,-135%)';tip.style.display='';
    tip.innerHTML=`<div class="ctm">${labels[i]} · 누계</div><div class="ctv num">${won(cum[i])}</div><div class="ctm num" style="color:var(--chart-bar)">이번 달 ${won(monthly[i])}</div>`;};
  ov.addEventListener('pointermove',ev=>{const r=svg.getBoundingClientRect();const fx=(ev.clientX-r.left)/r.width*W;
    let i=Math.floor((fx-padL)/band);i=Math.max(0,Math.min(n-1,i));showAt(i);});
  ov.addEventListener('pointerleave',()=>{dot.style.display='none';cx.style.display='none';tip.style.display='none';bel.forEach(b=>b.setAttribute('opacity','.5'));});
  return c;
}

function txPager(host,pg,pages,total,per){

function splitMini(t){const ps=partiesFor(t).filter(p=>p.name!=='LABEL');const names=ps.map(p=>esc(p.name)).join(', ');return `<span class="mut" title="레이블 50% · ${esc(names)}">${names||'—'}</span>`;}
/* 표 열 너비 사용자 조정 — 핸들 드래그로 인접 두 열의 비율을 조정, 조정 중 % 표시, 설정은 저장됨 */
let _crTip=null;
function makeColResizable(table,key){
  if(!table||!table.tHead||!table.tHead.rows.length)return;
  const ths=[...table.tHead.rows[0].cells];
  if(ths.length<2)return;
  table.style.tableLayout='fixed';
  const saved=S.colWidths&&S.colWidths[key];
  if(saved&&saved.length===ths.length)ths.forEach((th,i)=>th.style.width=saved[i]+'%');
  ths.forEach((th,i)=>{
    if(i===ths.length-1)return;
    th.style.position='sticky';th.style.top='0';
    const h=ce('div','colresize');h.title='드래그해서 열 너비 조정';th.appendChild(h);
    h.addEventListener('click',e=>e.stopPropagation());
    h.addEventListener('pointerdown',e=>{
      e.preventDefault();e.stopPropagation();
      const tableW=table.clientWidth||1, next=ths[i+1], startX=e.clientX;
      const w1=th.getBoundingClientRect().width, w2=next.getBoundingClientRect().width, pair=w1+w2;
      h.classList.add('active');try{h.setPointerCapture(e.pointerId);}catch(_){}
      if(!_crTip){_crTip=ce('div','colresize-tip');document.body.appendChild(_crTip);}
      _crTip.style.display='block';
      const move=ev=>{
        const pairPct=Math.round(pair/tableW*100);
        let p1=Math.round((w1+(ev.clientX-startX))/tableW*100);
        p1=Math.max(3,Math.min(pairPct-3,p1));           // 정수 %로만 스냅
        const p2=pairPct-p1;
        th.style.width=p1+'%';next.style.width=p2+'%';
        _crTip.textContent=p1+'%  ·  '+p2+'%';
        _crTip.style.left=ev.clientX+'px';_crTip.style.top=(th.getBoundingClientRect().bottom+10)+'px';
      };
      const up=()=>{
        document.removeEventListener('pointermove',move);document.removeEventListener('pointerup',up);
        h.classList.remove('active');if(_crTip)_crTip.style.display='none';
        const ws=ths.map(t=>Math.round(t.getBoundingClientRect().width/tableW*100));
        S.colWidths=S.colWidths||{};S.colWidths[key]=ws;saveSettings();
      };
      document.addEventListener('pointermove',move);document.addEventListener('pointerup',up);
    });
  });
}
function groupCard(rows,by){
  const key=t=>by==='ym'?t.ym:by==='year'?(t.ym?t.ym.slice(0,4):'?'):by==='track'?(t.track||t.release):by==='release'?t.release:'';
  const G={};
  if(by==='artist'){rows.forEach(t=>partiesFor(t).forEach(p=>{if(p.name==='LABEL')return;const g=G[p.name]||(G[p.name]={k:p.name,n:0,g:0,c:0});g.n+=txNetKRW(t)*p.pct/100;g.g+=txGrossKRW(t)*p.pct/100;g.c++;}));}
  else{rows.forEach(t=>{const k=key(t)||'—';const g=G[k]||(G[k]={k,n:0,g:0,c:0});g.n+=txNetKRW(t);g.g+=txGrossKRW(t);g.c++;});}
  const list=Object.values(G).sort((a,b)=>b.n-a.n);const c=ce('div','card flat tblx');

/* ---- 카탈로그 ---- */
function relGroups(){
  const rel={};
  REG_DATA.forEach(r=>{const k=r.cat||r.release;(rel[k]||(rel[k]={cat:r.cat,release:r.release,type:r.type,tracks:[]})).tracks.push(r);});
  return Object.values(rel);
}
function relByCat(cat){const k=KX(cat||'');return S.releases.find(r=>KX(r.cat||'')===k)||null;}
function relTrackFor(rel,reg){
  if(!rel)return null;
  const byKey=(rel.tracks||[]).find(t=>t.regKey===reg.k_rtv);
  if(byKey)return byKey;
  const kt=KX(reg.track),kv=KX(reg.version==='-'?'':reg.version);
  return (rel.tracks||[]).find(t=>KX(t.title)===kt&&KX(t.version||'')===kv)
      || (rel.tracks||[]).find(t=>KX(t.title)===kt)||null;
}
/* 부팅 시 1회: relOverrides(구 카탈로그 편집)를 S.releases로 병합 */
function migrateRelOverrides(){
  const ovAll=S.relOverrides||{};const cats=Object.keys(ovAll);if(!cats.length)return;
  let dirty=false,linkColId=null;
  const ensureLinkCol=()=>{if(linkColId)return linkColId;
    let col=S.customCols.find(c=>c.name==='링크');
    if(!col){col={id:'c'+Date.now(),name:'링크'};S.customCols.push(col);saveCustomCols();}
    linkColId=col.id;return linkColId;};
  cats.forEach(cat=>{
    const ov=ovAll[cat]||{};const rel=relByCat(cat);if(!rel)return;
    if(ov.release&&ov.release!==rel.title){rel.title=ov.release;dirty=true;}
    if(ov.type&&ov.type!==rel.type){rel.type=ov.type;dirty=true;}
    Object.entries(ov.tracks||{}).forEach(([k,tov])=>{
      const reg=REG_DATA.find(r=>r.k_rtv===k);if(!reg)return;
      const t=relTrackFor(rel,reg);if(!t)return;
      if(!t.regKey){t.regKey=k;dirty=true;}
      const map={track:'title',artist:'artists',version:'version',genre:'genre',bpm:'bpm'};
      Object.entries(map).forEach(([from,to])=>{const val=tov[from];if(val!=null&&val!==''&&t[to]!==val){t[to]=val;dirty=true;}});
      if(tov.link){t.custom=t.custom||{};const cid=ensureLinkCol();if(!t.custom[cid]){t.custom[cid]=tov.link;dirty=true;}}
      if(tov.custom){t.custom=Object.assign({},tov.custom,t.custom||{});dirty=true;}
    });
  });
  if(dirty)saveReleases();
  S.relOverrides={};saveRel();
}
/* 부팅 시: 정산 트랙(k_rtv)을 릴리즈 트랙에 안정 키로 연결 — 이름을 바꿔도 연동 유지 */
function linkRegKeys(){
  let dirty=false;const used=new Set();
  S.releases.forEach(r=>(r.tracks||[]).forEach(t=>{if(t.regKey)used.add(t.regKey);}));
  REG_DATA.forEach(reg=>{
    if(used.has(reg.k_rtv))return;
    const rel=relByCat(reg.cat);if(!rel)return;
    const kt=KX(reg.track),kv=KX(reg.version==='-'?'':reg.version);
    const t=(rel.tracks||[]).find(x=>!x.regKey&&KX(x.title)===kt&&KX(x.version||'')===kv)
         ||(rel.tracks||[]).find(x=>!x.regKey&&KX(x.title)===kt);
    if(t){t.regKey=reg.k_rtv;used.add(reg.k_rtv);dirty=true;}
  });
  if(dirty)saveReleases();
}
function openReleaseByCat(cat){
  const rel=relByCat(cat);
  if(rel){openRelease(rel.id);return;}
  const tracks=REG_DATA.filter(r=>(r.cat||r.release)===cat);if(!tracks.length)return;
  const draft={id:uid(),cat,title:tracks[0].release,type:tracks[0].type,date:'',status:'발매 완료',genre:'',copy:'',link:'',
    artists:dedup(tracks.map(t=>t.artist_raw).filter(Boolean)),
    tracks:tracks.map(t=>({title:t.track,version:t.version==='-'?'':t.version,artists:t.artist_raw||'',genre:'',bpm:'',key:'',regKey:t.k_rtv})),
    artUri:'',memo:''};
  openRelease(null,draft);
}

          <small class="note" style="margin:0">기준 스냅샷: DCM ${won(run.snapshot.thrKRW)} / BC $${run.snapshot.thrUSD} · ${run.snapshot.mode==='release'?'계약별':'아티스트 합산'} · 환율 ${fxCtxText(run.snapshot)} · ${esc(run.by||'')}</small>
          <span style="flex:1"></span>
          ${locked
            ?`<button class="btn sm ghost" data-unlock="${run.id}">잠금 해제</button>`

        </div>`;
        c.appendChild(ce('div','',h));
      }
      wrap.appendChild(c);
    });

    wrap.querySelectorAll('[data-tog]').forEach(el=>el.onclick=()=>{S.runOpen=S.runOpen===el.dataset.tog?null:el.dataset.tog;render();});
    wrap.querySelectorAll('[data-paid]').forEach(cb=>{cb.closest('label').onclick=e=>e.stopPropagation();
      cb.onchange=()=>{const[rid,i]=cb.dataset.paid.split('|');const run=S.settleRuns.find(r=>r.id===rid);
        if(run){run.items[+i].paid=cb.checked;saveRuns();render();}};});
    wrap.querySelectorAll('[data-stmt]').forEach(b=>b.onclick=e=>{e.stopPropagation();openArtist(b.dataset.stmt);});
    wrap.querySelectorAll('[data-lock]').forEach(b=>b.onclick=async e=>{e.stopPropagation();
      if(!await dlgConfirm('이 회차를 확정할까요?\n확정하면 금액과 기준이 잠기고, 포함된 기록은 삭제할 수 없습니다.',{ok:'확정'}))return;
      const run=S.settleRuns.find(r=>r.id===b.dataset.lock);if(run){run.status='locked';run.lockedAt=Date.now();saveRuns();logAudit('settle','정산 회차 확정',(run.name||run.date||run.id),{runId:run.id});render();toast('회차가 확정되었습니다');}});
    wrap.querySelectorAll('[data-unlock]').forEach(b=>b.onclick=async e=>{e.stopPropagation();
      if(!await dlgConfirm('확정을 해제할까요? 금액·기준 수정이 다시 가능해집니다.',{ok:'해제'}))return;
      const run=S.settleRuns.find(r=>r.id===b.dataset.unlock);if(run){run.status='open';saveRuns();render();}});
    wrap.querySelectorAll('[data-delrun]').forEach(b=>b.onclick=async e=>{e.stopPropagation();
      const run=S.settleRuns.find(r=>r.id===b.dataset.delrun);if(!run)return;
      if(!await dlgConfirm(`'${run.name}' 회차와 포함된 정산 기록 ${run.items.length}건을 삭제할까요?\n삭제하면 해당 금액이 정산 가능액으로 되돌아갑니다.`,{ok:'삭제',danger:true}))return;
      S.settleRuns=S.settleRuns.filter(r=>r.id!==run.id);
      S.settlements=S.settlements.filter(s=>s.runId!==run.id);
      saveRuns();saveSettle();logAudit('settle','정산 회차 삭제',(run.name||run.id)+' · '+run.items.length+'건 되돌림',{runId:run.id});render();toast('회차를 삭제했습니다');});

    <select id="sA" style="min-width:230px">${opts}</select>

    if(!name||!amt||amt<=0){toast('아티스트와 0보다 큰 정산액을 입력하세요');return;}
    S.settlements.push({id:Date.now(),artist:name,amount:Math.floor(amt),date:$('#sDate').value,memo:$('#sMemo').value.trim(),by:who()});saveSettle();logAudit('settle','개별 정산 기록',name+' · '+won(Math.floor(amt)),{artist:name,amount:Math.floor(amt)});render();};

  /* --- 전체 기록 --- */
  v.appendChild(secH('전체 정산 기록',''));
  if(S.settlements.length){
    const runById={};S.settleRuns.forEach(r=>runById[r.id]=r);
    const c=ce('div','card flat tblx');
    let h='<table><thead><tr><th>일자</th><th>아티스트</th><th class="r">정산액</th><th>회차</th><th>메모</th><th>기록자</th><th></th></tr></thead><tbody>';
    S.settlements.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).forEach(s=>{
      const run=s.runId?runById[s.runId]:null;
      const act=run
        ?(run.status==='locked'?'<span class="pill info" title="확정된 회차의 기록입니다">잠김</span>':'<span class="mut2" style="font-size:var(--f11)" title="회차에서 일괄 관리됩니다">회차 관리</span>')
        :`<button class="btn sm ghost" data-del="${s.id}">삭제</button>`;
      h+=`<tr><td class="mut2 num">${esc(s.date||'')}</td><td><b>${esc(s.artist)}</b></td><td class="r num">${won(s.amount)}</td>
        <td>${run?`<span class="pill">${esc(run.name)}</span>`:'<span class="mut2">—</span>'}</td>
        <td class="mut">${esc(s.memo||'')}</td><td class="mut2" style="font-size:var(--f12)">${esc(s.by||'')}</td><td class="r">${act}</td></tr>`;});
    h+='</tbody></table>';c.innerHTML=h;
    c.querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{if(await dlgConfirm('이 정산 기록을 삭제할까요?',{ok:'삭제',danger:true})){S.settlements=S.settlements.filter(x=>x.id!=b.dataset.del);saveSettle();render();}});
    v.appendChild(c);
    makeColResizable(c.querySelector('table'),'records');
  }else v.appendChild(ce('div','card empty','아직 정산 기록이 없습니다. 회차를 만들거나 개별 기록으로 시작하세요.'));
}

/* ---- 가계부 · 레이블 잔고 ---- */
// 잔고 = (음원 순수익 전체 + 기타 수입) − (아티스트 정산 지급 + 기타 비용 + 지출)
function labelBalance(){
  const L=ledger();
  const musicIn=L.net;
  const extraIn=S.extra.reduce((s,x)=>s+(+x.amount||0),0);
  const extraOut=S.extra.reduce((s,x)=>s+(+x.cost||0),0);
  const expenses=S.expenses.reduce((s,x)=>s+(+x.amount||0),0);
  const paidOut=S.settlements.reduce((s,x)=>s+(+x.amount||0),0);
  return {musicIn,extraIn,extraOut,expenses,paidOut,
    balance:musicIn+extraIn-extraOut-expenses-paidOut};
}
function renderExtra(v){

    <div class="card kpi"><div class="lab"><span class="ind" style="background:var(--bad)"></span>총 지출</div><div class="val num">${won(B.extraOut+B.expenses+B.paidOut)}</div><div class="meta">정산 · 비용 · 잡비</div></div>

  if(S.extra.length){
    const c=ce('div','card flat tblx');

    <input id="eName" class="search" type="text" placeholder="내용 (예: Bandcamp 수수료 / 로고 외주)">

    <input id="eDate" type="date" value="${todayISO()}">
    <button class="btn pri" id="eAdd">지출 기록</button></div>
  <small class="note">순수 지출 항목입니다. 잔고에서 차감됩니다.</small>`;
  v.appendChild(ea);
  $('#eAdd').onclick=()=>{
    const name=$('#eName').value.trim(),amt=parseFloat($('#eAmt').value)||0;

    h+='</tbody></table>';c.innerHTML=h;
    c.querySelectorAll('[data-dele]').forEach(b=>b.onclick=async()=>{if(await dlgConfirm('이 지출 기록을 삭제할까요?',{ok:'삭제',danger:true})){S.expenses=S.expenses.filter(y=>y.id!==b.dataset.dele);saveExpenses();render();}});
    v.appendChild(c);
    makeColResizable(c.querySelector('table'),'expenses');
  }else v.appendChild(ce('div','card empty','아직 지출 기록이 없습니다.'));

/* ---- 아티스트 상세 + 명세서 (원본 이식) ---- */
function artistTx(name){const out=[];ALLTX.forEach(t=>{const p=partiesFor(t).find(x=>x.name===name);if(p)out.push({t,pct:p.pct,nk:txNetKRW(t)*p.pct/100,gk:txGrossKRW(t)*p.pct/100});});return out;}
function openArtist(name){
  const L=ledger();const a=L.artists.find(x=>x.name===name)||{name,accrued:0,qualified:0,settled:0,remaining:0,payable:0,locked:0,tx:0,ch:{DCM:{accrued:0,qualified:0},BC:{accrued:0,qualified:0}},basis:{DCM:0,BC:0},basisQual:{DCM:false,BC:false}};
  const list=artistTx(name);const dates=list.map(x=>x.t.date).filter(Boolean).sort();const pay=a.payable>0;
  const taxRate=S.taxRate||0;const wTax=Math.floor(a.payable*taxRate/100);const wNet=a.payable-wTax;
  const byRel={};list.forEach(x=>{const t=x.t;const rel=t.cat?relByCat(t.cat):null;
    const k=rel?('#'+KX(rel.cat)):('@'+KX(t.release||t.track||''));
    const g=byRel[k]||(byRel[k]={rel:(rel?rel.title:(t.release||'')),t0:t,nk:0,gk:0,c:0});
    g.nk+=x.nk;g.gk+=x.gk;g.c++;});
  const rels=Object.values(byRel).sort((a,b)=>b.nk-a.nk);
  const sheet=$('#sheet');
  const chRow=(lab,key,thrTxt,isUsd)=>{const cb=a.ch[key];const basis=a.basis[key];
    return `<tr><td><span class="pill ${key==='DCM'?'info':'acc'}">${lab}</span></td><td class="r num mut">${won(cb.accrued)}</td><td class="r num" style="color:${cb.qualified>0?'var(--ok)':'var(--t4)'};font-weight:${cb.qualified>0?500:400}">${won(cb.qualified)}</td><td class="r num mut2">${isUsd?usd(basis):won(basis)}</td><td>${cb.qualified>0?'<span class="pill ok">통과</span>':'<span class="pill">미달</span>'}<span class="mut2" style="font-size:11px"> /${thrTxt}</span></td></tr>`;};
  sheet.innerHTML=`<span class="x noprint" onclick="closeModal()">${ic('x')}</span>
    <div style="display:flex;align-items:center;gap:12px">${avatarMini(name,46)}<div><h3>${esc(name)}</h3><div class="mut2" style="font-size:var(--f12)">${dates.length?dates[0]+' ~ '+dates[dates.length-1]:''} · 거래 ${a.tx}건 · ${L.mode==='release'?'계약별':'아티스트 합산'} 판정</div></div>${pay?'<span class="pill ok" style="margin-left:auto">정산 대상</span>':''}</div>
    <div class="kv">
      <div class="kvc"><div class="l">누적 분배</div><div class="v num">${won(a.accrued)}</div></div>
      <div class="kvc"><div class="l">정산 가능</div><div class="v num" style="color:var(--ok)">${won(a.payable)}</div></div>
      <div class="kvc"><div class="l">정산됨</div><div class="v num">${won(a.settled)}</div></div>
      <div class="kvc"><div class="l">잔여 (누적−정산)</div><div class="v num">${won(a.remaining)}</div></div></div>
    <small class="note" style="margin:0 0 8px">임계 미달분 ${won(a.locked)}은 누적되며, 채널 순수익이 임계를 넘으면 정산 가능액에 반영됩니다.</small>
    <div class="card flat tblx" style="margin-bottom:4px"><table><thead><tr><th>채널</th><th class="r">누적</th><th class="r">정산 가능</th><th class="r">순수익 기준</th><th>임계</th></tr></thead><tbody>
      ${chRow('유통(DCM)','DCM',won(S.thrKRW),false)}${chRow('밴드캠프','BC','$'+S.thrUSD,true)}</tbody></table></div>
    ${(pay&&taxRate>0)?`<div class="card" style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:8px;background:var(--ok-bg);border-color:transparent">
      <span class="mut" style="font-weight:500;color:var(--t1)">원천징수 ${taxRate}%</span>

  const drawTx=()=>{let h='<div class="card flat tblx"><table><thead><tr><th>월</th><th>경로</th><th>곡</th><th class="r">지분</th><th class="r">순수익(귀속)</th></tr></thead><tbody>';

  const drawStmt=()=>{const txt=statementText(name,a,rels,dates);
    body.innerHTML=`<div style="display:flex;gap:6px;justify-content:flex-end;margin-bottom:10px" class="noprint"><button class="btn sm" id="copyStmt">${ic('copy')}텍스트 복사</button><button class="btn sm" id="printStmt">인쇄 / PDF</button></div>
      <pre style="white-space:pre-wrap;font-family:var(--font);font-variant-numeric:tabular-nums;font-size:var(--f13);line-height:1.7;margin:0;color:var(--t2)">${esc(txt)}</pre>`;
    $('#copyStmt').onclick=()=>{navigator.clipboard.writeText(txt).then(()=>{toast('명세서가 복사되었습니다');});};
    $('#printStmt').onclick=()=>{
      $('#printDoc').innerHTML=statementHTML(name,a,rels,dates);
      document.body.classList.add('printing');

      setTimeout(()=>{window.print();setTimeout(done,800);},30);

  drawRel();
  sheet.querySelectorAll('.tabs .t').forEach(b=>b.onclick=()=>{sheet.querySelectorAll('.tabs .t').forEach(x=>x.classList.toggle('on',x===b));({rel:drawRel,tx:drawTx,stmt:drawStmt}[b.dataset.t])();});

function statementText(name,a,rels,dates){
  const period=dates.length?dates[0]+' ~ '+dates[dates.length-1]:'-';
  let s='DINURE RECORDINGS · 정산 명세서\n';
  s+='--------------------------------\n';
  s+='아티스트: '+name+'\n기간: '+period+'\n발행일: '+todayISO()+'\n';
  s+='분배 기준: 레이블 50% · 단독/합작/리믹스 규정\n';
  s+='임계: 유통(DCM) '+won(S.thrKRW)+' / 밴드캠프 $'+S.thrUSD+' (순수익 기준, '+(S.settleMode==='release'?'계약별':'아티스트 합산')+')\n';
  s+='적용 환율: 기본 ₩'+S.fx.rate+'/USD'+(Object.keys(S.fxByYm).length?' · 월별 환율 '+Object.keys(S.fxByYm).length+'건 적용':'')+'\n';
  s+='--------------------------------\n[릴리즈별 귀속 순수익]\n';
  rels.forEach(r=>{s+='· '+(r.rel||'-')+' : '+won(r.nk)+'\n';});
  s+='--------------------------------\n';
  s+='누적 분배 : '+won(a.accrued)+'\n정산 가능 : '+won(a.payable)+'\n정산됨   : '+won(a.settled)+'\n잔여     : '+won(a.remaining)+'\n';
  if((S.taxRate||0)>0&&a.payable>0){const tr=S.taxRate,tax=Math.floor(a.payable*tr/100);
    s+='--------------------------------\n[원천징수 '+tr+'%]\n지급액   : '+won(a.payable)+'\n원천징수 : -'+won(tax)+'\n실지급액 : '+won(a.payable-tax)+'\n';}
  s+='--------------------------------\n';
  s+=a.payable>0?('정산 가능액 '+won(a.payable)+' — 정산 대상\n'):('현재 임계 미달, 누적 '+won(a.accrued)+' (정산 가능 0)\n');
  s+='* USD(밴드캠프)는 적용 환율로 KRW 환산. 임계 판정은 채널별 순수익 기준.\n';
  return s;
}

    <div class="stsec">정산 요약</div>
    <table class="sttbl sttot"><tbody>
      <tr><td>누적 분배</td><td class="r">${won(a.accrued)}</td></tr>
      <tr><td>정산 가능액</td><td class="r">${won(a.payable)}</td></tr>
      <tr><td>기 정산액</td><td class="r">${won(a.settled)}</td></tr>

    <table class="sttbl sttot"><tbody>
      <tr><td>지급액</td><td class="r">${won(a.payable)}</td></tr>
      <tr><td>원천징수 (${tr}%)</td><td class="r">-${won(tax)}</td></tr>
      <tr class="stnet"><td>실지급액</td><td class="r">${won(netPay)}</td></tr></tbody></table>`:''}
    <div class="stnote">· USD(밴드캠프) 매출은 적용 환율로 KRW 환산. 임계 판정은 채널별 순수익 기준(유통 ${won(S.thrKRW)} / 밴드캠프 $${S.thrUSD}, ${S.settleMode==='release'?'계약별':'아티스트 합산'}).<br>· 분배 기준: 레이블 50% · 단독/합작/리믹스 규정.${tr>0?` 원천징수 ${tr}%는 지급 시 공제 후 실지급.`:''}</div>
    <div class="stsign">DINURE RECORDINGS</div>
  </div>`;
}

function renderNotes(v){
  const grid=ce('div','notegrid');v.appendChild(grid);
  const left=ce('div','card flat');
  left.innerHTML=`<div style="display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--bd)">
    <b style="font-size:var(--f13);font-weight:500;color:var(--t1)">문서</b><span style="flex:1"></span>
    <button class="btn sm pri" id="newNote">${ic('plus')}추가</button></div>`;
  const pl=ce('div','plist');
  const list=S.notes.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  if(!list.length)pl.appendChild(ce('div','',`<div class="mut2" style="padding:10px;font-size:var(--f12)">아직 회의록이 없습니다.</div>`));
  list.forEach(n=>{
    const b=ce('button',n.id===S.noteSel?'on':'',`<b>${esc(n.title||'(제목 없음)')}</b><span>${esc(n.date||'')}${n.by?' · '+esc(n.by):''}</span>`);
    b.onclick=()=>{S.noteSel=n.id;render();};pl.appendChild(b);
  });
  left.appendChild(pl);grid.appendChild(left);
  $('#newNote').onclick=()=>{
    const n={id:uid(),title:'',date:todayISO(),by:who(),blocks:[{t:'p',text:''}],updatedAt:Date.now()};
    S.notes.push(n);S.noteSel=n.id;saveNotes();render();
  };
  const n=S.notes.find(x=>x.id===S.noteSel);
  const right=ce('div','card');grid.appendChild(right);
  if(!n){right.className='card empty';right.textContent='문서를 선택하거나 새 회의록을 만드세요. 단축키: # 제목 · - 목록 · [] 할 일 · --- 구분선';return;}
  buildNoteEditor(right,n);
}
function buildNoteEditor(host,n){
  const doc=ce('div','doc');host.appendChild(doc);
  const title=ce('input','dtitle');title.placeholder='제목 없음';title.value=n.title||'';
  doc.appendChild(title);
  const meta=ce('div','dmeta');
  meta.innerHTML=`<span style="display:inline-flex;align-items:center;gap:5px">${ic('cal')}<input type="date" value="${esc(n.date||'')}" id="nDate" style="border:none;background:none;padding:0;color:var(--t4);font-size:var(--f12)"></span>
    <span>${esc(n.by||'')}</span><span style="flex:1"></span>
    <button class="btn sm ghost danger" id="nDel">삭제</button>`;
  doc.appendChild(meta);
  const blocksHost=ce('div');doc.appendChild(blocksHost);
  const save=debounce(()=>{n.updatedAt=Date.now();saveNotes();},600);
  title.oninput=()=>{n.title=title.value;save();};
  meta.querySelector('#nDate').onchange=e=>{n.date=e.target.value;save();};
  meta.querySelector('#nDel').onclick=async()=>{if(await dlgConfirm('이 회의록을 삭제할까요?',{ok:'삭제',danger:true})){S.notes=S.notes.filter(x=>x.id!==n.id);S.noteSel=null;saveNotes();render();}};

  function blockEl(b,i){
    const el=ce('div','blk'+(b.done?' done':''));el.dataset.t=b.t;el.dataset.i=i;
    if(b.t==='hr'){el.innerHTML='<div class="hrln"></div><div class="bc"></div>';
      el.querySelector('.hrln').onclick=async()=>{if(await dlgConfirm('구분선을 삭제할까요?',{ok:'삭제',danger:true})){n.blocks.splice(i,1);drawBlocks();save();}};
      return el;}
    if(b.t==='todo'){const tg=ce('span','tg');tg.onclick=()=>{b.done=!b.done;el.classList.toggle('done',b.done);save();};el.appendChild(tg);}
    const bc=ce('div','bc');bc.contentEditable='true';bc.spellcheck=false;bc.textContent=b.text||'';
    bc.dataset.ph=i===0&&b.t==='p'?'내용을 입력하세요 — # 제목 · - 목록 · [] 할 일 · --- 구분선':'';
    el.appendChild(bc);
    bc.oninput=()=>{
      let t=bc.textContent;
      const conv=(pre,type)=>{if(t.startsWith(pre)){b.t=type;b.text=t.slice(pre.length);drawBlocks();focusBlock(i,true);save();return true;}return false;};
      if(b.t==='p'){
        if(conv('# ','h1')||conv('## ','h2')||conv('- ','li')||conv('[] ','todo')||conv('[ ] ','todo'))return;
        if(t.trim()==='---'){b.t='hr';b.text='';drawBlocks();const nb={t:'p',text:''};n.blocks.splice(i+1,0,nb);drawBlocks();focusBlock(i+1);save();return;}
      }
      b.text=t;save();
    };
    bc.onkeydown=e=>{
      if(e.key==='Enter'&&!e.shiftKey){
        e.preventDefault();
        const nt=(b.t==='li'||b.t==='todo')&&b.text.trim()?b.t:'p';
        if((b.t==='li'||b.t==='todo')&&!b.text.trim()){b.t='p';drawBlocks();focusBlock(i);save();return;}
        n.blocks.splice(i+1,0,{t:nt,text:''});drawBlocks();focusBlock(i+1);save();
      }else if(e.key==='Backspace'&&!bc.textContent){
        e.preventDefault();
        if(b.t!=='p'){b.t='p';drawBlocks();focusBlock(i);save();return;}
        if(i>0){n.blocks.splice(i,1);drawBlocks();focusBlock(i-1,true);save();}
      }else if(e.key==='ArrowUp'&&i>0&&window.getSelection().anchorOffset===0){focusBlock(i-1,true);}
      else if(e.key==='ArrowDown'&&i<n.blocks.length-1){const sel=window.getSelection();if(sel.anchorOffset>=bc.textContent.length)focusBlock(i+1);}
    };
    return el;
  }
  function drawBlocks(){
    blocksHost.innerHTML='';
    if(!n.blocks.length)n.blocks.push({t:'p',text:''});
    n.blocks.forEach((b,i)=>blocksHost.appendChild(blockEl(b,i)));
  }
  function focusBlock(i,end){
    const el=blocksHost.querySelector(`.blk[data-i="${i}"] .bc`);if(!el)return;
    el.focus();
    if(end&&el.textContent){const r=document.createRange();r.selectNodeContents(el);r.collapse(false);
      const sel=window.getSelection();sel.removeAllRanges();sel.addRange(r);}
  }
  drawBlocks();
}

function renderLinks(v){
  const ta=$('#topActions');
  if(ta)ta.innerHTML=`<button class="btn sm" id="addCat">${ic('plus')}유형</button><button class="btn sm pri" id="addLink">${ic('plus')}추가</button>`;
  const cats=S.linkcfg.cats.slice();
  const uncatted=S.links.filter(l=>!cats.includes(l.cat));
  const renameCat=(cur,val)=>{
    if(S.linkcfg.cats.includes(val)){toast('이미 있는 유형입니다');render();return;}
    const i=S.linkcfg.cats.indexOf(cur);if(i<0)return;
    S.linkcfg.cats[i]=val;S.links.forEach(l=>{if(l.cat===cur)l.cat=val;});
    saveLinkcfg();saveLinks();render();
  };
  const renderCat=(cat,links,real)=>{
    const box=ce('div','linkcat');box.dataset.cat=cat;if(!real)box.dataset.uncat='1';if(!real)box.dataset.nodrag='1';
    const grp=ce('div','sec-h catgrp');
    grp.innerHTML=`${real?GRIP:''}<h2 style="color:var(--t3);font-weight:500;font-size:var(--f12)"${real?' title="더블클릭해서 이름 변경"':''}>${esc(cat)}</h2>
      ${real?`<div class="ops"><button class="iconbtn" data-cdel="${esc(cat)}" title="유형 삭제"><svg><use href="#i-trash"/></svg></button></div>`:''}`;
    if(real){const h2=grp.querySelector('h2');h2.ondblclick=()=>dndRename(h2,cat,val=>renameCat(cat,val));}
    box.appendChild(grp);
    const g=ce('div','linkgrid');
    links.forEach(l=>{
      let host='';try{host=new URL(l.url).hostname;}catch(e){}
      const a=ce('a','linkcard');a.href=l.url;a.target='_blank';a.rel='noopener';a.dataset.lid=l.id;a.setAttribute('draggable','false');
      a.innerHTML=`${GRIP}<img src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(host)}&sz=64" alt="" onerror="this.style.visibility='hidden'">
        <div class="lt"><b>${esc(l.name)}</b><span>${esc(host)}</span></div>
        ${l.memo?`<span class="memoic" title="메모 있음 — 수정에서 확인">${ic('key')}</span>`:''}
        <button class="iconbtn more" data-edit="${l.id}" title="수정"><svg><use href="#i-edit"/></svg></button>`;
      a.querySelector('[data-edit]').onclick=e=>{e.preventDefault();e.stopPropagation();editLink(l.id);};
      g.appendChild(a);
    });
    if(!links.length){const ph=ce('div','','이 유형에 링크가 없습니다.');ph.dataset.nodrag='1';
      ph.style.cssText='grid-column:1/-1;color:var(--t4);font-size:var(--f12);padding:8px 2px';g.appendChild(ph);}
    box.appendChild(g);
    v.appendChild(box);
  };
  cats.forEach(cat=>renderCat(cat,S.links.filter(l=>l.cat===cat),true));
  if(uncatted.length)renderCat('미분류',uncatted,false);
  if(!S.links.length&&!cats.length)v.appendChild(ce('div','card empty','아직 링크가 없습니다.'));
  $('#addLink').onclick=()=>editLink(null);
  $('#addCat').onclick=async()=>{
    const name=((await dlgPrompt('새 유형 이름','',{title:'유형 추가',ok:'추가'}))||'').trim();
    if(!name)return;
    if(S.linkcfg.cats.includes(name)){toast('이미 있는 유형입니다');return;}
    S.linkcfg.cats.push(name);saveLinkcfg();render();
  };
  v.querySelectorAll('[data-cdel]').forEach(b=>b.onclick=async()=>{
    const cur=b.dataset.cdel;const i=S.linkcfg.cats.indexOf(cur);if(i<0)return;
    const n=S.links.filter(l=>l.cat===cur).length;
    if(!await dlgConfirm(`"${cur}" 유형을 삭제할까요?${n?`\n링크 ${n}개는 미분류로 이동합니다.`:''}`,{ok:'삭제',danger:true}))return;
    S.linkcfg.cats.splice(i,1);saveLinkcfg();render();
  });
  const commitLinks=()=>{
    const catEls=[...v.querySelectorAll(':scope > .linkcat')];
    S.linkcfg.cats=catEls.filter(c=>!c.dataset.uncat).map(c=>c.dataset.cat);
    const lById={};S.links.forEach(l=>lById[l.id]=l);
    const newLinks=[];
    catEls.forEach(catEl=>{const cat=catEl.dataset.uncat?'':catEl.dataset.cat;
      catEl.querySelectorAll('.linkcard[data-lid]').forEach(card=>{const l=lById[card.dataset.lid];if(!l)return;l.cat=cat;newLinks.push(l);});});
    S.links.forEach(l=>{if(!newLinks.includes(l))newLinks.push(l);});
    S.links=newLinks;saveLinkcfg();saveLinks();render();
  };
  dndWire({zones:[v],itemSel:'.linkcat',kind:'lcat',axis:'y',handleSel:'.catgrp .draghandle',commit:commitLinks});
  dndWire({zones:[...v.querySelectorAll('.linkgrid')],itemSel:'.linkcard[data-lid]',kind:'link',axis:'grid',handleSel:'.draghandle',commit:commitLinks});
}

// 클라우드 연결 시에만 기록. dinureos/audit/items 에 push (RTDB 규칙으로 수정·삭제 불가).
function logAudit(scope, action, detail, meta){   // scope: 'revenue' | 'settle'
  if(!Store.cloud()) return;
  try{
    firebase.database().ref('dinureos/audit/items').push({
      ts: firebase.database.ServerValue.TIMESTAMP,
      actor: who(), scope, action,
      detail: String(detail||''), meta: meta||null
    });
  }catch(e){ console.warn('audit 기록 실패', e); }
}

async function pushAllToCloud(){
  for(const c of COLS){
    const remote=await Store.getRemote(c);
    if(remote!=null)continue;            // 클라우드에 이미 있으면 그쪽이 기준 (watch가 받아옴)
    const v=await Store.get(c);
    if(v!=null)await Store.set(c,v,who());
  }
}

/* ===================== 원격 변경 수신 ===================== */
let initialSync = true;
// 동기화로 들어오는 연속 변경(초기 버스트 포함)을 한 번의 렌더로 합치기 — 화면 깜빡임/버벅임 방지
let _syncRenderTO=null;
function syncRender(){clearTimeout(_syncRenderTO);_syncRenderTO=setTimeout(()=>{_syncRenderTO=null;render();},70);}
function startWatch(){
  Store.setOnRemote(async(col,data,by,at)=>{
    if(col==='settings'&&data){S.thrKRW=data.thrKRW??S.thrKRW;S.thrUSD=data.thrUSD??S.thrUSD;if(data.settleMode)S.settleMode=data.settleMode;S.taxRate=data.taxRate??S.taxRate;}
    else if(col==='fx'&&data){S.fx.rate=data.rate||S.fx.rate;S.fx.updated=data.updated;S.fxByYm=data.byYm||{};}
    else if(col==='import'&&data){S.import={tx:data.tx||[],dcmYms:data.dcmYms||[],bcRanges:data.bcRanges||[]};refreshEff();}
    else if(col==='navcfg'&&data){S.navcfg=data;buildNav();}
    else if(col==='registry'){if(Array.isArray(data)&&data.length){REG_DATA=data;buildRegMaps();}}
    else if(col in S&&data!==undefined){S[col]=data===null?(Array.isArray(S[col])?[]:S[col]):data;}
    if((col==='navcfg'||col==='linkcfg')&&!data)seedDefaults();
    // 편집 중이면 화면은 그대로 두고 알림만
    if($('#modal').classList.contains('open')){
      if(!initialSync && by && by!==who())toast((by||'다른 운영진')+'님이 '+(VIEWS[col]||col)+' 데이터를 수정했습니다');
      return;
    }
    syncRender();
    if(!initialSync && by && by!==who())toast((by||'다른 운영진')+'님의 변경이 반영되었습니다');
  });
  COLS.forEach(c=>Store.watch(c));
  setTimeout(()=>{
    initialSync = false;
  },3000);
}
function updateSyncBadge(){

// 정적 호스팅(예: GitHub Pages) 기준 동일 출처라 CORS 없이 상대경로로 로드된다.
let REF_FAIL=[];
async function loadRefData(){
  REF_FAIL=[];
  // tx/registry는 정산 핵심 데이터라 실패 시 경고. art/seed는 선택 사항(앨범아트는 ./art/{카탈로그}.jpg 폴더로 대체) — 없어도 조용히 넘어감.
  const pick=async(file,fallback,critical)=>{
    try{const r=await fetch('./data/'+file,{cache:'no-cache'});if(!r.ok)throw 0;return await r.json();}
    catch(e){if(critical){console.error('참조 데이터 로드 실패: '+file,e);REF_FAIL.push(file);}return fallback;}
  };
  const [tx,reg,art,seed]=await Promise.all([
    pick('tx.json',[],true),pick('registry.json',[],true),pick('art.json',{}),
    pick('seed.json',{releases:[],roster:[],presets:[],links:[]}),
  ]);
  TX_DATA=tx; REG_DATA=reg; ART_DATA=art; SEED=seed;
  REG_DATA.forEach((e,i)=>{if(!e.id)e.id='r'+i+'-'+uid();});   // Firebase 동기화용 고유 id (매칭은 k_rtv로 유지)
  buildRegMaps();
}

  }
}

/* ===================== gate film grain (Canvas procedural noise) =====================
   노이즈 타일을 매 틱 재난수화해 '움직이는' 필름 그레인. DPR 1.5 / 10fps로 제한하고,
   게이트가 숨겨지거나(로그인 완료) 탭이 백그라운드면 자동 정지해 부하를 최소화. */
/* 로그인 배경: 정적 필름 그레인 1회 렌더 (애니메이션 없음). 리사이즈 시에만 다시 그림. */
(function(){
  const canvas=document.getElementById('gateGrain'); if(!canvas)return;
  const ctx=canvas.getContext('2d',{alpha:true});
  const TILE=180, SPREAD=92;
  let DPR=Math.min(window.devicePixelRatio||1,1.5), W=0, H=0;
  const tile=document.createElement('canvas'); tile.width=tile.height=TILE;
  const tctx=tile.getContext('2d'); const img=tctx.createImageData(TILE,TILE);
  for(let i=3;i<img.data.length;i+=4)img.data[i]=255;
  for(let i=0;i<img.data.length;i+=4){const v=128+(Math.random()*2-1)*SPREAD;img.data[i]=img.data[i+1]=img.data[i+2]=v;}
  tctx.putImageData(img,0,0);
  function resize(){DPR=Math.min(window.devicePixelRatio||1,1.5);W=Math.floor(innerWidth*DPR);H=Math.floor(innerHeight*DPR);
    canvas.width=W;canvas.height=H;canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';}
  function paint(){
    ctx.clearRect(0,0,W,H);
    ctx.globalAlpha=1;ctx.fillStyle=ctx.createPattern(tile,'repeat');ctx.fillRect(0,0,W,H);
    // 정적인 먼지 입자 한 번만
    const n=Math.round((W*H)/(DPR*DPR)/13000);
    for(let i=0;i<n;i++){const big=Math.random()<0.10;const s=(big?2.2+Math.random()*3.4:1+Math.random()*1.3)*DPR;
      ctx.globalAlpha=big?0.12:0.07;ctx.fillStyle=Math.random()<0.5?'#000':'#fff';ctx.fillRect(Math.random()*W,Math.random()*H,s,s);}
    ctx.globalAlpha=1;
  }
  let rt; window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{if(canvas.offsetParent!==null){resize();paint();}},150);},{passive:true});
  resize();paint();
})();

/* 로고 호버 회전: 올리면 천천히(8초/회전) 정방향 회전, 떼면 원래 위치(0°)로 빠르게 복귀.
   절반(180°)을 넘었으면 정방향으로 마저 돌고, 아니면 역회전. 복귀는 평소보다 빠르게. */
(function(){
  function wire(el){
    let raf=null, ang=0, last=0, mode='idle'; // 'spin' | 'return' | 'idle'
    const SPEED=360/2400;            // 회전 속도(약 2.4초/바퀴)
    let rStart=0, rFrom=0, rTo=0;    // 복귀 트윈 상태
    const RDUR=340;                  // 복귀 시간(ms)
    const ease=t=>1-Math.pow(1-t,3); // easeOutCubic
    el.style.cursor='pointer';
    el.style.transformOrigin='50% 50%';
    el.style.transition='none';      // CSS 트랜지션 미사용 → '움직임 줄이기' 설정의 영향 차단
    function loop(t){
      if(mode==='spin'){
        if(last) ang+=(t-last)*SPEED;
        last=t; el.style.transform='rotate('+ang+'deg)';
        raf=requestAnimationFrame(loop);
      }else if(mode==='return'){
        if(!rStart)rStart=t;
        const p=Math.min(1,(t-rStart)/RDUR);
        ang=rFrom+(rTo-rFrom)*ease(p);
        el.style.transform='rotate('+ang+'deg)';
        if(p<1){raf=requestAnimationFrame(loop);}
        else{mode='idle';raf=null;ang=0;el.style.transform='';} // 원위치(원래 상태)로 복귀
      }else{raf=null;}
    }
    el.addEventListener('mouseenter',function(){ mode='spin'; last=0; if(!raf)raf=requestAnimationFrame(loop); });
    el.addEventListener('mouseleave',function(){ rFrom=ang; rTo=Math.round(ang/360)*360; rStart=0; mode='return'; if(!raf)raf=requestAnimationFrame(loop); });
  }
  document.querySelectorAll('.brand .logo,.gatecard .logo').forEach(wire);
})();

  c.x/=ar; vec2 scl=(ar>1.0)?vec2(1.0,1.0/ar):vec2(ar,1.0); c*=scl; vec2 base=c+0.5;
  if(uParallax>0.001){ float depth=(uHasTex==1)?dot(texture(uTex,base).rgb,vec3(0.299,0.587,0.114)):0.5; base+=vec2(sin(ph),cos(ph))*uParallax*0.05*(depth-0.5); }
  if(uRipple>0.001){ float d=length(c); base+=normalize(c+vec2(1e-5))*sin(d*16.0-ph*2.0)*uRipple*0.015; }
  if(uWarp>0.0001){ vec2 wp=(uv*vec2(ar,1.0))*uDetail;
    vec2 q=vec2(lfbm(wp,ph),lfbm(wp+vec2(5.2,1.3),ph));
    vec2 rr=vec2(lfbm(wp+q*1.4+vec2(1.7,9.2),ph),lfbm(wp+q*1.4+vec2(8.3,2.8),ph));
    base+=(rr-0.5)*uWarp; }
  vec3 col=sampleImg(base);
  if(uHalation>0.001 && uHasTex==1){ vec3 g=vec3(0.0);
    for(int i=0;i<6;i++){ float a=float(i)/6.0*6.2831853; g+=texture(uTex,base+vec2(cos(a),sin(a))*0.014).rgb; }
    g/=6.0; float gLum=dot(g,vec3(0.299,0.587,0.114));
    col+=uHalation*0.6*smoothstep(0.5,1.0,gLum)*vec3(1.0,0.62,0.38); }
  if(uHue>0.001) col=hueShift(col,uHue*ph);
  if(uPulse>0.001){ float l=dot(col,vec3(0.299,0.587,0.114)); col=mix(vec3(l),col,clamp(1.0+uPulse*0.5*sin(ph),0.0,2.5)); col*=1.0+uPulse*0.16*sin(ph); }
  col+=(hash(gl_FragCoord.xy+uSeed)-0.5)*uGrain;
  frag=vec4(clamp(col,0.0,1.0),1.0);
}`;
  let prog=null,uni={},glReady=false;
  const UNAMES=['uRes','uPhase','uHasTex','uSeed','uTex','uWarp','uScale','uDetail','uGrain','uSpin','uSway','uTilt','uSphere','uVortex','uDolly','uParallax','uHue','uRipple','uKaleido','uPulse','uHalation'];
  function comp(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))throw new Error(gl.getShaderInfoLog(sh));return sh;}
  try{
    prog=gl.createProgram();
    gl.attachShader(prog,comp(gl.VERTEX_SHADER,VERT));
    gl.attachShader(prog,comp(gl.FRAGMENT_SHADER,FRAG));
    gl.bindAttribLocation(prog,0,'p'); gl.linkProgram(prog);
    if(!gl.getProgramParameter(prog,gl.LINK_STATUS))throw new Error(gl.getProgramInfoLog(prog));
    gl.useProgram(prog);
    const vao=gl.createVertexArray();gl.bindVertexArray(vao);
    const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
    gl.enableVertexAttribArray(0);gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);
    UNAMES.forEach(n=>uni[n]=gl.getUniformLocation(prog,n));
    glReady=true;
  }catch(err){ Q('#ls_fallback').style.display='block'; Q('#ls_fallback').textContent='그래픽 초기화 오류: '+(err&&err.message||err); }

  const stage=Q('#ls_stage'), toast=Q('#ls_toast');
  function showError(m){toast.textContent=m;toast.classList.add('on');}
  function hideError(){toast.classList.remove('on');}
  let tex=null,hasTex=false;
  function uploadTex(src){
    if(!tex)tex=gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D,tex);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.MIRRORED_REPEAT);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.MIRRORED_REPEAT);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
    gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL,true);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGB,gl.RGB,gl.UNSIGNED_BYTE,src);
    hasTex=true; hideError();
  }
  async function loadTexture(src){
    try{ let blob=(typeof src==='string')?await (await fetch(src)).blob():src; const bmp=await createImageBitmap(blob); uploadTex(bmp); return; }catch(e){}
    try{ const img=new Image(); img.onload=()=>uploadTex(img); img.onerror=()=>showError('이미지를 불러오지 못했어요. 다른 파일로 시도해 보세요.'); img.src=(typeof src==='string')?src:URL.createObjectURL(src); }catch(e){ showError('이미지를 디코드하지 못했어요.'); }
  }
  if(ARTWORK_DEFAULT_IMG)loadTexture(ARTWORK_DEFAULT_IMG);

  // state + bind
  const KEYS=['flow','warp','scale','detail','spin','sway','tilt','sphere','vortex','dolly','parallax','hue','ripple','kaleido','pulse','halation','grain'];
  const st={ar:0.5625};
  const FMT={flow:v=>v.toFixed(1)+'s',warp:v=>v.toFixed(3),scale:v=>v.toFixed(2)+'×',detail:v=>v.toFixed(1),spin:v=>v.toFixed(0)+'바퀴',hue:v=>v.toFixed(0)+'바퀴',kaleido:v=>v<2?'끄기':v.toFixed(0)+'면',grain:v=>v.toFixed(3)};
  function fmt(k,v){return (FMT[k]||(x=>x.toFixed(2)))(v);}
  KEYS.forEach(k=>{ const el=Q('#ls_'+k),out=Q('#ls_'+k+'V');
    const upd=()=>{st[k]=parseFloat(el.value); if(out)out.textContent=fmt(k,st[k]);}; el.addEventListener('input',upd); upd(); });
  function applyVals(o){ for(const k in o){ const el=Q('#ls_'+k); if(el){ el.value=o[k]; el.dispatchEvent(new Event('input')); } } }
  function captureVals(){ const o={}; KEYS.forEach(k=>o[k]=st[k]); return o; }

  // presets (이름만, 2열, 저장행 상단)
  let presets=[],memP=null;
  async function readStore(){ try{ if(window.storage){ const r=await window.storage.get('ls_artwork_presets'); return r&&r.value; } }catch(e){} try{ return localStorage.getItem('ls_artwork_presets'); }catch(e){} return memP; }
  async function writeStore(s){ memP=s; try{ if(window.storage){ await window.storage.set('ls_artwork_presets',s); return; } }catch(e){} try{ localStorage.setItem('ls_artwork_presets',s); }catch(e){} }
  async function loadPresets(){ const raw=await readStore(); try{ presets=raw?JSON.parse(raw):[]; }catch(e){ presets=[]; } renderPresets(); }
  async function persistPresets(){ await writeStore(JSON.stringify(presets)); }
  function renderPresets(){
    const box=Q('#ls_presets'); if(!box)return; box.innerHTML='';
    if(!presets.length){ const e=document.createElement('div'); e.className='ls-emptybox'; e.textContent='저장된 프리셋이 없어요. 위에 이름을 적고 저장하면 여기에 쌓입니다.'; box.appendChild(e); return; }
    presets.forEach((p,i)=>{
      const card=document.createElement('div'); card.className='ls-pcard';
      const nm=document.createElement('div'); nm.className='ls-pcard-name'; nm.textContent=p.name; nm.title=p.name;
      const del=document.createElement('div'); del.className='ls-pcard-del'; del.textContent='×'; del.title='삭제';
      card.appendChild(nm); card.appendChild(del);
      card.addEventListener('click',ev=>{ if(ev.target===del){ presets.splice(i,1); persistPresets(); renderPresets(); } else { applyVals(p.vals); } });
      box.appendChild(card);
    });
  }
  Q('#ls_save').addEventListener('click',()=>{ const inp=Q('#ls_pname'); let name=(inp.value||'').trim(); if(!name)name='프리셋 '+(presets.length+1); presets.unshift({name,vals:captureVals()}); inp.value=''; persistPresets(); renderPresets(); });
  Q('#ls_pname').addEventListener('keydown',e=>{ if(e.key==='Enter')Q('#ls_save').click(); });
  loadPresets();

  // aspect
  Q('#ls_ratios').addEventListener('click',e=>{ const b=e.target.closest('.ls-chip'); if(!b)return;
    root.querySelectorAll('.ls-chip').forEach(c=>c.classList.toggle('on',c===b));
    st.ar=parseFloat(b.dataset.ar); stage.style.setProperty('--ls-ar',st.ar); resize(); });
  stage.style.setProperty('--ls-ar',st.ar);

  // loop time
  let DPR=Math.min(window.devicePixelRatio||1,2);
  let playing=true, startT=performance.now(), pausedPhase=0, lastPhase=0, recElapsed=0, recording=false, rafId=null;
  function resize(){ if(recording)return; const rect=stage.getBoundingClientRect();
    canvas.width=Math.max(2,Math.round(rect.width*DPR)); canvas.height=Math.max(2,Math.round(rect.height*DPR)); }
  function fmtT(s){ s=Math.max(0,s); const m=Math.floor(s/60),x=Math.floor(s%60); return m+':'+(x<10?'0':'')+x; }
  function updTimebar(phase){ const f=phase/(2*Math.PI);
    Q('#ls_fill').style.width=(f*100).toFixed(2)+'%'; Q('#ls_knob').style.left=(f*100).toFixed(2)+'%';
    Q('#ls_time').textContent=fmtT(f*st.flow)+' / '+fmtT(st.flow); }
  function frame(now){
    if(!glReady){ rafId=requestAnimationFrame(frame); return; }
    let phase;
    if(recording) phase=2*Math.PI*(recElapsed/st.flow);
    else if(playing) phase=2*Math.PI*((((now-startT)/1000)/st.flow)%1);
    else phase=pausedPhase;
    lastPhase=phase;
    gl.viewport(0,0,canvas.width,canvas.height); gl.useProgram(prog);
    gl.uniform2f(uni.uRes,canvas.width,canvas.height); gl.uniform1f(uni.uPhase,phase); gl.uniform1f(uni.uSeed,Math.random()*1000.0);
    gl.uniform1f(uni.uWarp,st.warp);gl.uniform1f(uni.uScale,st.scale);gl.uniform1f(uni.uDetail,st.detail);gl.uniform1f(uni.uGrain,st.grain);
    gl.uniform1f(uni.uSpin,st.spin);gl.uniform1f(uni.uSway,st.sway);gl.uniform1f(uni.uTilt,st.tilt);
    gl.uniform1f(uni.uSphere,st.sphere);gl.uniform1f(uni.uVortex,st.vortex);gl.uniform1f(uni.uDolly,st.dolly);gl.uniform1f(uni.uParallax,st.parallax);
    gl.uniform1f(uni.uHue,st.hue);gl.uniform1f(uni.uRipple,st.ripple);gl.uniform1f(uni.uKaleido,st.kaleido);gl.uniform1f(uni.uPulse,st.pulse);gl.uniform1f(uni.uHalation,st.halation);
    gl.uniform1i(uni.uTex,0);gl.uniform1i(uni.uHasTex,(tex&&hasTex)?1:0);
    gl.activeTexture(gl.TEXTURE0); if(tex)gl.bindTexture(gl.TEXTURE_2D,tex);
    gl.drawArrays(gl.TRIANGLES,0,3);
    updTimebar(phase);
    rafId=requestAnimationFrame(frame);
  }
  function start(){ resize(); if(playing) startT=performance.now()-(lastPhase/(2*Math.PI))*st.flow*1000; if(!rafId)rafId=requestAnimationFrame(frame); }
  function stop(){ if(rafId){ cancelAnimationFrame(rafId); rafId=null; } }

  // play/pause (타임바)
  const playBtn=Q('#ls_play');
  function setPlay(p){ playing=p; playBtn.innerHTML=p?ICON_PAUSE:ICON_PLAY; }
  playBtn.addEventListener('click',()=>{ if(recording)return;
    if(playing){ pausedPhase=2*Math.PI*((((performance.now()-startT)/1000)/st.flow)%1); setPlay(false); }
    else { startT=performance.now()-(pausedPhase/(2*Math.PI))*st.flow*1000; setPlay(true); } });

  // timebar seek
  function seekTo(r){ r=Math.min(1,Math.max(0,r)); if(playing){ startT=performance.now()-r*st.flow*1000; } else { pausedPhase=r*2*Math.PI; } lastPhase=r*2*Math.PI; updTimebar(lastPhase); }
  const track=Q('#ls_track');
  function seekFromEvent(e){ const rect=track.getBoundingClientRect(); const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left; seekTo(rect.width?x/rect.width:0); }
  track.addEventListener('pointerdown',e=>{ if(recording)return; e.preventDefault(); seekFromEvent(e); const mv=ev=>seekFromEvent(ev); const up=()=>{window.removeEventListener('pointermove',mv);window.removeEventListener('pointerup',up);}; window.addEventListener('pointermove',mv); window.addEventListener('pointerup',up); });

  // image replace
  const fileInput=Q('#ls_file');
  Q('#ls_load').addEventListener('click',()=>fileInput.click());
  fileInput.addEventListener('change',e=>{const f=e.target.files[0]; if(f)loadTexture(f);});
  ['dragenter','dragover'].forEach(ev=>stage.addEventListener(ev,e=>{e.preventDefault();stage.classList.add('drag');}));
  ['dragleave','drop'].forEach(ev=>stage.addEventListener(ev,e=>{e.preventDefault();stage.classList.remove('drag');}));
  stage.addEventListener('drop',e=>{const f=e.dataTransfer.files[0]; if(f&&f.type.startsWith('image/'))loadTexture(f);});

  // recording (MP4 if supported, else WebM)
  const recBtn=Q('#ls_rec'),recDot=Q('#ls_recDot'),recLabel=Q('#ls_recLabel');
  function outputSize(){ if(st.ar>=1)return [Math.round(1080*st.ar),1080]; return [1080,Math.round(1080/st.ar)]; }
  function pickMime(){ const l=['video/mp4;codecs=avc1','video/mp4','video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
    for(const m of l){ if(window.MediaRecorder&&MediaRecorder.isTypeSupported(m))return m; } return ''; }
  recBtn.addEventListener('click',()=>{
    if(!glReady||recording)return;
    if(!(tex&&hasTex)){ showError('먼저 이미지를 올려 주세요.'); return; }
    const mime=pickMime(); if(!mime){ showError('이 브라우저는 영상 녹화를 지원하지 않아요.'); return; }
    recording=true; if(!playing) setPlay(true);
    recBtn.classList.add('on'); recBtn.disabled=true; recBtn.textContent='● 녹화 중'; recDot.classList.add('on');
    const prevW=canvas.width,prevH=canvas.height; const [ow,oh]=outputSize(); canvas.width=ow; canvas.height=oh;
    const stream=canvas.captureStream(30);
    const rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:14000000});
    const chunks=[]; rec.ondataavailable=e=>{if(e.data&&e.data.size)chunks.push(e.data);};
    const dur=st.flow,t0=performance.now(); let stopped=false;
    function tick(now){ if(stopped)return; recElapsed=(now-t0)/1000;
      if(recElapsed>=dur){recElapsed=dur;stopped=true;rec.stop();return;}
      recLabel.textContent='REC '+recElapsed.toFixed(1)+'s'; requestAnimationFrame(tick); }
    rec.onstop=()=>{
      const blob=new Blob(chunks,{type:mime}); const url=URL.createObjectURL(blob);
      const ext=mime.indexOf('mp4')>=0?'mp4':'webm';
      const a=document.createElement('a'); const stamp=new Date().toISOString().slice(0,16).replace(/[:T]/g,'');
      const tag=({'1':'1x1','0.75':'3x4','0.5625':'9x16','1.7778':'16x9'})[String(st.ar)]||'loop';
      a.href=url; a.download='dinure_artwork_'+tag+'_'+stamp+'.'+ext; document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(url),4000);
      recording=false; recElapsed=0; canvas.width=prevW; canvas.height=prevH;
      recBtn.classList.remove('on'); recBtn.disabled=false; recBtn.textContent='⦿ 녹화';
      recDot.classList.remove('on'); recLabel.textContent='REC'; startT=performance.now(); resize();
    };
    rec.start(); requestAnimationFrame(tick);
  });

  window.addEventListener('resize',()=>{ if(!recording)resize(); });
  return { root, start, stop, resize };
}

</script>
</body>
</html>
