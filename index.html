/* 표 열 너비 사용자 조정 — 핸들 드래그로 인접 두 열의 비율을 조정, 조정 중 % 표시, 설정은 저장됨 */
let _crTip=null;
function makeColResizable(table,key){
  if(!table||!table.tHead||!table.tHead.rows.length)return;
  const ths=[...table.tHead.rows[0].cells];
  if(ths.length<2)return;
  table.style.tableLayout='fixed';
  const saved=S.colWidths&&S.colWidths[key];
  if(saved&&saved.length===ths.length)ths.forEach((th,i)=>th.style.width=saved[i]+'%');
  ths.forEach((th,i)=>{
    if(i===ths.length-1)return;
    th.style.position='sticky';th.style.top='0';
    const h=ce('div','colresize');h.title='드래그해서 열 너비 조정';th.appendChild(h);
    h.addEventListener('click',e=>e.stopPropagation());
    h.addEventListener('pointerdown',e=>{
      e.preventDefault();e.stopPropagation();
      const tableW=table.clientWidth||1, next=ths[i+1], startX=e.clientX;
      const w1=th.getBoundingClientRect().width, w2=next.getBoundingClientRect().width, pair=w1+w2;
      h.classList.add('active');try{h.setPointerCapture(e.pointerId);}catch(_){}
      if(!_crTip){_crTip=ce('div','colresize-tip');document.body.appendChild(_crTip);}
      _crTip.style.display='block';
      const move=ev=>{
        const pairPct=Math.round(pair/tableW*100);
        let p1=Math.round((w1+(ev.clientX-startX))/tableW*100);
        p1=Math.max(3,Math.min(pairPct-3,p1));           // 정수 %로만 스냅
        const p2=pairPct-p1;
        th.style.width=p1+'%';next.style.width=p2+'%';
        _crTip.textContent=p1+'%  ·  '+p2+'%';
        _crTip.style.left=ev.clientX+'px';_crTip.style.top=(th.getBoundingClientRect().bottom+10)+'px';
      };
      const up=()=>{
        document.removeEventListener('pointermove',move);document.removeEventListener('pointerup',up);
        h.classList.remove('active');if(_crTip)_crTip.style.display='none';
        const ws=ths.map(t=>Math.round(t.getBoundingClientRect().width/tableW*100));
        S.colWidths=S.colWidths||{};S.colWidths[key]=ws;saveSettings();
      };
      document.addEventListener('pointermove',move);document.addEventListener('pointerup',up);
    });
  });
}
function groupCard(rows,by){

/* ---- 카탈로그 ---- */
function relGroups(){
  const rel={};
  REG_DATA.forEach(r=>{const k=r.cat||r.release;(rel[k]||(rel[k]={cat:r.cat,release:r.release,type:r.type,tracks:[]})).tracks.push(r);});
  return Object.values(rel);
}
function relByCat(cat){const k=KX(cat||'');return S.releases.find(r=>KX(r.cat||'')===k)||null;}
function relTrackFor(rel,reg){
  if(!rel)return null;
  const byKey=(rel.tracks||[]).find(t=>t.regKey===reg.k_rtv);
  if(byKey)return byKey;
  const kt=KX(reg.track),kv=KX(reg.version==='-'?'':reg.version);
  return (rel.tracks||[]).find(t=>KX(t.title)===kt&&KX(t.version||'')===kv)
      || (rel.tracks||[]).find(t=>KX(t.title)===kt)||null;
}
/* 부팅 시 1회: relOverrides(구 카탈로그 편집)를 S.releases로 병합 */
function migrateRelOverrides(){
  const ovAll=S.relOverrides||{};const cats=Object.keys(ovAll);if(!cats.length)return;
  let dirty=false,linkColId=null;
  const ensureLinkCol=()=>{if(linkColId)return linkColId;
    let col=S.customCols.find(c=>c.name==='링크');
    if(!col){col={id:'c'+Date.now(),name:'링크'};S.customCols.push(col);saveCustomCols();}
    linkColId=col.id;return linkColId;};
  cats.forEach(cat=>{
    const ov=ovAll[cat]||{};const rel=relByCat(cat);if(!rel)return;
    if(ov.release&&ov.release!==rel.title){rel.title=ov.release;dirty=true;}
    if(ov.type&&ov.type!==rel.type){rel.type=ov.type;dirty=true;}
    Object.entries(ov.tracks||{}).forEach(([k,tov])=>{
      const reg=REG_DATA.find(r=>r.k_rtv===k);if(!reg)return;
      const t=relTrackFor(rel,reg);if(!t)return;
      if(!t.regKey){t.regKey=k;dirty=true;}
      const map={track:'title',artist:'artists',version:'version',genre:'genre',bpm:'bpm'};
      Object.entries(map).forEach(([from,to])=>{const val=tov[from];if(val!=null&&val!==''&&t[to]!==val){t[to]=val;dirty=true;}});
      if(tov.link){t.custom=t.custom||{};const cid=ensureLinkCol();if(!t.custom[cid]){t.custom[cid]=tov.link;dirty=true;}}
      if(tov.custom){t.custom=Object.assign({},tov.custom,t.custom||{});dirty=true;}
    });
  });
  if(dirty)saveReleases();
  S.relOverrides={};saveRel();
}
/* 부팅 시: 정산 트랙(k_rtv)을 릴리즈 트랙에 안정 키로 연결 — 이름을 바꿔도 연동 유지 */
function linkRegKeys(){
  let dirty=false;const used=new Set();
  S.releases.forEach(r=>(r.tracks||[]).forEach(t=>{if(t.regKey)used.add(t.regKey);}));
  REG_DATA.forEach(reg=>{
    if(used.has(reg.k_rtv))return;
    const rel=relByCat(reg.cat);if(!rel)return;
    const kt=KX(reg.track),kv=KX(reg.version==='-'?'':reg.version);
    const t=(rel.tracks||[]).find(x=>!x.regKey&&KX(x.title)===kt&&KX(x.version||'')===kv)
         ||(rel.tracks||[]).find(x=>!x.regKey&&KX(x.title)===kt);
    if(t){t.regKey=reg.k_rtv;used.add(reg.k_rtv);dirty=true;}
  });
  if(dirty)saveReleases();
}

  v.appendChild(ce('div','',`<small class="note">릴리즈명 · 트랙 메타데이터는 <b>릴리즈</b> 페이지와 연동됩니다. 분배 비율 수정은 매칭된 거래에 즉시 반영됩니다.</small>`));
  $('#cq').oninput=()=>{const q=KX($('#cq').value);card.querySelectorAll('tbody tr').forEach(tr=>{tr.style.display=(!q||tr.dataset.s.includes(q))?'':'none';});};
  const ri=$('#regImp');if(ri)ri.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const fr=new FileReader();
    fr.onload=async()=>{
      try{
        const arr=JSON.parse(fr.result);
        if(!Array.isArray(arr))throw 0;
        const have=new Set(REG_DATA.map(x=>x.k_rtv));
        let added=0;
        arr.forEach(x=>{ if(x&&x.k_rtv&&!have.has(x.k_rtv)){ const c={...x}; c.id='r'+(REG_DATA.length+added)+'-'+uid(); REG_DATA.push(c); have.add(x.k_rtv); added++; } });
        if(!added){toast('추가할 새 트랙이 없습니다');return;}
        buildRegMaps();Store.set('registry',REG_DATA,who());
        logAudit('settle','레지스트리 병합',added+'개 트랙 추가');
        render();toast(added+'개 트랙을 추가했습니다');
      }catch(err){toast('레지스트리 파일을 읽지 못했습니다(JSON 배열 형식이어야 합니다)');}
    };
    fr.readAsText(f);
  };
  card.querySelectorAll('td[data-rel]').forEach(td=>td.onclick=()=>openReleaseByCat(td.dataset.rel));
  card.querySelectorAll('[data-edit]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();editSplit(b.dataset.edit);});
}
function editSplit(k){
  const reg=REG_DATA.find(r=>r.k_rtv===k);if(!reg)return;
  const cur=(S.overrides[k]||reg.split.map(s=>({name:s[0],pct:s[2]}))).map(p=>({...p}));
  const sheet=$('#sheet');
  const rows=()=>cur.map((p,i)=>`<div style="display:flex;gap:8px;margin:7px 0"><input type="text" value="${esc(p.name)}" data-n="${i}" style="flex:1"><input type="number" step="0.01" value="${p.pct}" data-p="${i}" style="width:92px"><button class="iconbtn" data-del="${i}"><svg><use href="#i-x"/></svg></button></div>`).join('');
  function draw(){
    const tot=cur.reduce((s,p)=>s+(+p.pct||0),0);
    sheet.innerHTML=`<span class="x" onclick="closeModal()">${ic('x')}</span><h3>분배 편집</h3>
      <div class="mut" style="font-size:var(--f13)">${esc(reg.release)} — <b>${esc(reg.track)}</b>${reg.version&&reg.version!=='-'?' ('+esc(reg.version)+')':''}</div>
      <small class="note">참여자와 비율(%). 합계 100% 기준이며, 이 트랙에 매칭된 거래에 즉시 반영됩니다.</small>
      <div id="rows" style="margin-top:14px">${rows()}</div>
      <div style="display:flex;gap:8px;align-items:center;margin-top:8px"><button class="btn sm" id="addP">${ic('plus')}참여자</button>
        <span class="num" style="margin-left:auto;color:${Math.abs(tot-100)>.01?'var(--warn)':'var(--ok)'};font-weight:500">합계 ${tot.toFixed(2)}%</span></div>
      <hr class="sep"><div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn" onclick="closeModal()">취소</button>${S.overrides[k]?'<button class="btn ghost" id="resetP">기본값 복원</button>':''}<button class="btn pri" id="saveP">저장</button></div>`;
    sheet.querySelectorAll('[data-n]').forEach(inp=>inp.oninput=()=>cur[inp.dataset.n].name=inp.value);
    sheet.querySelectorAll('[data-p]').forEach(inp=>inp.oninput=()=>cur[inp.dataset.p].pct=parseFloat(inp.value)||0);
    sheet.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{cur.splice(+b.dataset.del,1);draw();});
    $('#addP').onclick=()=>{cur.push({name:'',pct:0});draw();};
    if($('#resetP'))$('#resetP').onclick=()=>{delete S.overrides[k];saveOv();closeModal();render();};
    $('#saveP').onclick=async()=>{const tot=cur.reduce((s,p)=>s+(+p.pct||0),0);
      if(Math.abs(tot-100)>.5&&!await dlgConfirm('합계가 100%가 아닙니다 ('+tot.toFixed(2)+'%).\n저장 시 비율로 정규화됩니다. 계속할까요?',{ok:'저장'}))return;
      S.overrides[k]=cur.filter(p=>p.name.trim()).map(p=>({name:p.name.trim(),pct:+p.pct||0}));saveOv();closeModal();render();};
  }
  draw();openModal();
}

/* ---- 정산 기록 (회차 + 개별) ---- */
function fxCtxText(snap){
  const byYm=snap?snap.fxByYm:S.fxByYm;const rate=snap?snap.fxRate:S.fx.rate;
  const n=Object.keys(byYm||{}).length;
  return `₩${rate}/USD${n?` + 월별 ${n}건`:''}`;
}
function openNewRun(){
  const L=ledger();
  const cands=L.artists.filter(a=>a.payable>0).sort((a,b)=>b.payable-a.payable);
  if(!cands.length){toast('임계를 통과한 정산 대상이 없습니다');return;}
  const items=cands.map(a=>({artist:a.name,payable:a.payable,amount:Math.max(0,Math.floor(a.payable)),include:true,memo:''}));
  const sheet=$('#sheet');
  sheet.innerHTML=`<span class="x" onclick="closeModal()">${ic('x')}</span><h3>새 정산 회차</h3>
    <div class="mut2" style="font-size:var(--f12)">임계 통과 ${cands.length}명 · 기준: DCM ${won(S.thrKRW)} / BC $${S.thrUSD} · ${S.settleMode==='release'?'계약별':'아티스트 합산'} 판정 · 환율 ${fxCtxText()}</div>
    <div class="frow" style="margin-top:14px">
      <div class="field" style="flex:2"><label class="fl">회차 이름</label><input type="text" id="runName" value="${esc(todayISO().slice(0,7)+' 정산')}"></div>
      <div class="field"><label class="fl">정산일</label><input type="date" id="runDate" value="${todayISO()}"></div></div>
    <div class="card flat tblx" style="margin-top:14px"><table>
      <thead><tr><th style="width:34px"></th><th>아티스트</th><th class="r">정산 가능</th><th class="r">정산액(₩)</th><th>메모</th></tr></thead>
      <tbody>${items.map((it,i)=>`<tr data-i="${i}">
        <td><input type="checkbox" data-inc="${i}" checked style="accent-color:var(--accent)"></td>
        <td><b>${esc(it.artist)}</b></td>
        <td class="r num mut">${won(it.payable)}</td>
        <td class="r" style="padding:4px 6px"><input type="number" data-amt="${i}" value="${it.amount}" style="width:120px;text-align:right"></td>
        <td style="padding:4px 6px"><input type="text" data-memo="${i}" placeholder="계좌·기간 등" style="width:100%;min-width:120px"></td></tr>`).join('')}</tbody>
    </table></div>
    <small class="note">정산액은 즉시 각 아티스트의 정산 가능·잔여에서 차감됩니다. 정산 가능액을 초과하면 경고색으로 표시됩니다.</small>
    <hr class="sep"><div style="display:flex;gap:8px;align-items:center">
      <span class="num" id="runSum" style="font-weight:600;color:var(--t1)"></span><span class="mut2" id="runCnt" style="font-size:var(--f12)"></span>
      <span style="flex:1"></span>
      <button class="btn" onclick="closeModal()">취소</button><button class="btn pri" id="runCreate">회차 생성</button></div>`;
  const upd=()=>{
    const inc=items.filter(x=>x.include);
    $('#runSum').textContent='합계 '+won(inc.reduce((s,x)=>s+(+x.amount||0),0));
    $('#runCnt').textContent=inc.length+'명 포함';
  };
  sheet.querySelectorAll('[data-inc]').forEach(cb=>cb.onchange=()=>{
    const it=items[+cb.dataset.inc];it.include=cb.checked;
    cb.closest('tr').style.opacity=cb.checked?'':'0.4';upd();});
  sheet.querySelectorAll('[data-amt]').forEach(inp=>{
    const warn=()=>{const it=items[+inp.dataset.amt];inp.style.color=(+inp.value||0)>Math.floor(it.payable)+1?'var(--warn)':'';};
    inp.oninput=()=>{items[+inp.dataset.amt].amount=+inp.value||0;warn();upd();};warn();});
  sheet.querySelectorAll('[data-memo]').forEach(inp=>inp.oninput=()=>{items[+inp.dataset.memo].memo=inp.value;});
  $('#runCreate').onclick=()=>{
    const inc=items.filter(x=>x.include&&(+x.amount||0)>0);
    if(!inc.length){toast('포함된 아티스트가 없습니다');return;}
    const name=$('#runName').value.trim()||todayISO().slice(0,7)+' 정산';
    const date=$('#runDate').value||todayISO();
    const run={id:uid(),name,date,by:who(),createdAt:Date.now(),status:'open',
      snapshot:{thrKRW:S.thrKRW,thrUSD:S.thrUSD,mode:S.settleMode,fxRate:S.fx.rate,fxByYm:deep(S.fxByYm)},
      items:inc.map(x=>({artist:x.artist,amount:Math.floor(+x.amount||0),payable:Math.floor(x.payable),paid:false,memo:x.memo.trim()}))};
    S.settleRuns.push(run);
    run.items.forEach(x=>S.settlements.push({id:uid(),artist:x.artist,amount:x.amount,date,memo:x.memo||name,by:who(),runId:run.id}));
    S.runOpen=run.id;
    saveRuns();saveSettle();closeModal();render();
    logAudit('settle','정산 회차 생성', name+' · '+run.items.length+'명 · '+won(run.items.reduce((s,x)=>s+x.amount,0)), {runId:run.id, count:run.items.length});
    toast(`정산 회차 생성 — ${run.items.length}명 · ${won(run.items.reduce((s,x)=>s+x.amount,0))}`);
  };
  upd();openModal(true);
}
function renderSettle(v){
  const L=ledger();const total=S.settlements.reduce((s,x)=>s+(+x.amount||0),0);
  const payArts=L.artists.filter(a=>a.payable>0);const payTotal=payArts.reduce((s,a)=>s+a.payable,0);
  const k=ce('div','kpis');
  k.innerHTML=`<div class="card kpi"><div class="lab"><span class="ind" style="background:var(--t3)"></span>총 정산액</div><div class="val num">${won(total)}</div><div class="meta">기록 <b>${S.settlements.length}</b>건 · 회차 ${S.settleRuns.length}</div></div>
    <div class="card kpi"><div class="lab"><span class="ind" style="background:var(--ok)"></span>정산 가능 합계</div><div class="val num">${won(payTotal)}</div><div class="meta">대상 <b>${payArts.length}</b>명 · ${L.mode==='release'?'계약별':'아티스트 합산'}</div></div>
    <div class="card kpi"><div class="lab"><span class="ind" style="background:var(--info)"></span>미정산 잔여 합</div><div class="val num">${won(L.artists.reduce((s,a)=>s+Math.max(0,a.remaining),0))}</div><div class="meta">누적−정산 (임계 미달 포함)</div></div>
    <div class="card kpi"><div class="lab"><span class="ind" style="background:var(--t4)"></span>아티스트</div><div class="val num">${L.artists.length}</div><div class="meta">임계 추적 중</div></div>`;
  v.appendChild(k);

  /* --- 정산 회차 --- */
  v.appendChild(secH('정산 회차','임계 통과자 일괄 정산 — 확정하면 금액·기준이 잠깁니다',`<button class="btn sm" id="auditBtn">${ic('list')}이력</button><button class="btn sm pri" id="newRun">${ic('plus')}추가</button>`));
  const runs=S.settleRuns.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  if(runs.length){
    const wrap=ce('div');wrap.style.display='flex';wrap.style.flexDirection='column';wrap.style.gap='10px';
    runs.forEach(run=>{
      const locked=run.status==='locked';
      const sum=run.items.reduce((s,x)=>s+x.amount,0);
      const paid=run.items.filter(x=>x.paid).length;
      const open=S.runOpen===run.id;
      const c=ce('div','card flat');
      c.innerHTML=`<div style="display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer" data-tog="${run.id}">
        <b style="font-size:var(--f13);color:var(--t1)">${esc(run.name)}</b>
        <span class="pill ${locked?'info':'warn'}">${locked?'확정':'진행 중'}</span>
        <span class="mut2" style="font-size:var(--f12)">${fmtD(run.date)} · ${run.items.length}명 · 지급 ${paid}/${run.items.length}</span>
        <span class="num" style="margin-left:auto;font-weight:600;color:var(--t1)">${won(sum)}</span>${ic(open?'up':'down')}</div>`;
      if(open){
        let h='<div class="tblx" style="border-top:1px solid var(--bd)"><table><thead><tr><th>아티스트</th><th class="r">정산액</th><th>지급</th><th>메모</th><th></th></tr></thead><tbody>';
        run.items.forEach((it,i)=>{h+=`<tr><td><div class="cellflex">${avatarMini(it.artist,26)}<b>${esc(it.artist)}</b></div></td>
          <td class="r num">${won(it.amount)}</td>
          <td><label style="display:inline-flex;align-items:center;gap:7px;cursor:pointer;font-size:var(--f12);color:${it.paid?'var(--ok)':'var(--t4)'}"><input type="checkbox" data-paid="${run.id}|${i}" ${it.paid?'checked':''} style="accent-color:var(--ok)">${it.paid?'지급 완료':'대기'}</label></td>
          <td class="mut" style="font-size:var(--f12)">${esc(it.memo||'')}</td>
          <td class="r"><button class="btn sm ghost" data-stmt="${esc(it.artist)}">명세서</button></td></tr>`;});
        h+='</tbody></table></div>';
        h+=`<div style="display:flex;gap:8px;align-items:center;padding:10px 16px;border-top:1px solid var(--bd);flex-wrap:wrap">
          <small class="note" style="margin:0">기준 스냅샷: DCM ${won(run.snapshot.thrKRW)} / BC $${run.snapshot.thrUSD} · ${run.snapshot.mode==='release'?'계약별':'아티스트 합산'} · 환율 ${fxCtxText(run.snapshot)} · ${esc(run.by||'')}</small>
          <span style="flex:1"></span>
          ${locked
            ?`<button class="btn sm ghost" data-unlock="${run.id}">잠금 해제</button>`
            :`<button class="btn sm ghost danger" data-delrun="${run.id}">회차 삭제</button><button class="btn sm pri" data-lock="${run.id}">확정 (잠금)</button>`}
        </div>`;
        c.appendChild(ce('div','',h));
      }
      wrap.appendChild(c);
    });
    v.appendChild(wrap);
    wrap.querySelectorAll('[data-tog]').forEach(el=>el.onclick=()=>{S.runOpen=S.runOpen===el.dataset.tog?null:el.dataset.tog;render();});

        if(run){run.items[+i].paid=cb.checked;saveRuns();render();}};});
    wrap.querySelectorAll('[data-stmt]').forEach(b=>b.onclick=e=>{e.stopPropagation();openArtist(b.dataset.stmt);});

      const run=S.settleRuns.find(r=>r.id===b.dataset.lock);if(run){run.status='locked';run.lockedAt=Date.now();saveRuns();logAudit('settle','정산 회차 확정',(run.name||run.date||run.id),{runId:run.id});render();toast('회차가 확정되었습니다');}});
    wrap.querySelectorAll('[data-unlock]').forEach(b=>b.onclick=async e=>{e.stopPropagation();
      if(!await dlgConfirm('확정을 해제할까요? 금액·기준 수정이 다시 가능해집니다.',{ok:'해제'}))return;

  }else v.appendChild(ce('div','card empty','아직 정산 회차가 없습니다. "새 정산 회차"로 임계 통과자를 한 번에 정산하세요.'));
  $('#newRun').onclick=openNewRun;$('#auditBtn').onclick=openAuditLog;

  /* --- 개별 기록 추가 --- */
  v.appendChild(secH('개별 정산 기록','단건 수정·예외 처리용'));
  const add=ce('div','card');
  const opts=L.artists.slice().sort((a,b)=>b.payable-a.payable).map(a=>`<option value="${esc(a.name)}">${esc(a.name)} — 정산가능 ${won(a.payable)} · 잔여 ${won(a.remaining)}</option>`).join('');
  add.innerHTML=`<div class="filters">
    <select id="sA" style="min-width:230px">${opts}</select>
    <input id="sAmt" type="number" placeholder="정산액(₩)" style="width:120px"><button class="btn sm" id="sFull">전액</button>
    <input id="sDate" type="date" value="${todayISO()}">
    <input id="sMemo" class="search" type="text" placeholder="메모 (계좌·기간 등)"><button class="btn pri" id="sAdd">기록</button></div>
  <small class="note">정산액은 즉시 정산 가능·잔여에서 차감됩니다.</small>`;

  $('#sFull').onclick=()=>{const a=L.artists.find(x=>x.name===$('#sA').value);if(a)$('#sAmt').value=Math.max(0,Math.floor(a.payable));};

    if(!name||!amt||amt<=0){toast('아티스트와 0보다 큰 정산액을 입력하세요');return;}
    S.settlements.push({id:Date.now(),artist:name,amount:Math.floor(amt),date:$('#sDate').value,memo:$('#sMemo').value.trim(),by:who()});saveSettle();logAudit('settle','개별 정산 기록',name+' · '+won(Math.floor(amt)),{artist:name,amount:Math.floor(amt)});render();};

  /* --- 전체 기록 --- */
  v.appendChild(secH('전체 정산 기록',''));

    S.settlements.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).forEach(s=>{
      const run=s.runId?runById[s.runId]:null;
      const act=run
        ?(run.status==='locked'?'<span class="pill info" title="확정된 회차의 기록입니다">잠김</span>':'<span class="mut2" style="font-size:var(--f11)" title="회차에서 일괄 관리됩니다">회차 관리</span>')
        :`<button class="btn sm ghost" data-del="${s.id}">삭제</button>`;
      h+=`<tr><td class="mut2 num">${esc(s.date||'')}</td><td><b>${esc(s.artist)}</b></td><td class="r num">${won(s.amount)}</td>
        <td>${run?`<span class="pill">${esc(run.name)}</span>`:'<span class="mut2">—</span>'}</td>
        <td class="mut">${esc(s.memo||'')}</td><td class="mut2" style="font-size:var(--f12)">${esc(s.by||'')}</td><td class="r">${act}</td></tr>`;});
    h+='</tbody></table>';c.innerHTML=h;

}

/* ---- 가계부 · 레이블 잔고 ---- */
// 잔고 = (음원 순수익 전체 + 기타 수입) − (아티스트 정산 지급 + 기타 비용 + 지출)
function labelBalance(){
  const L=ledger();
  const musicIn=L.net;
  const extraIn=S.extra.reduce((s,x)=>s+(+x.amount||0),0);
  const extraOut=S.extra.reduce((s,x)=>s+(+x.cost||0),0);
  const expenses=S.expenses.reduce((s,x)=>s+(+x.amount||0),0);
  const paidOut=S.settlements.reduce((s,x)=>s+(+x.amount||0),0);
  return {musicIn,extraIn,extraOut,expenses,paidOut,
    balance:musicIn+extraIn-extraOut-expenses-paidOut};
}

/* ---- 아티스트 상세 + 명세서 (원본 이식) ---- */
function artistTx(name){const out=[];ALLTX.forEach(t=>{const p=partiesFor(t).find(x=>x.name===name);if(p)out.push({t,pct:p.pct,nk:txNetKRW(t)*p.pct/100,gk:txGrossKRW(t)*p.pct/100});});return out;}
function openArtist(name){
  const L=ledger();const a=L.artists.find(x=>x.name===name)||{name,accrued:0,qualified:0,settled:0,remaining:0,payable:0,locked:0,tx:0,ch:{DCM:{accrued:0,qualified:0},BC:{accrued:0,qualified:0}},basis:{DCM:0,BC:0},basisQual:{DCM:false,BC:false}};
  const list=artistTx(name);const dates=list.map(x=>x.t.date).filter(Boolean).sort();const pay=a.payable>0;

  const byRel={};list.forEach(x=>{const t=x.t;const rel=t.cat?relByCat(t.cat):null;

    const g=byRel[k]||(byRel[k]={rel:(rel?rel.title:(t.release||'')),t0:t,nk:0,gk:0,c:0});

  sheet.innerHTML=`<span class="x noprint" onclick="closeModal()">${ic('x')}</span>

      <div class="kvc"><div class="l">정산됨</div><div class="v num">${won(a.settled)}</div></div>
      <div class="kvc"><div class="l">잔여 (누적−정산)</div><div class="v num">${won(a.remaining)}</div></div></div>
    <small class="note" style="margin:0 0 8px">임계 미달분 ${won(a.locked)}은 누적되며, 채널 순수익이 임계를 넘으면 정산 가능액에 반영됩니다.</small>
    <div class="card flat tblx" style="margin-bottom:4px"><table><thead><tr><th>채널</th><th class="r">누적</th><th class="r">정산 가능</th><th class="r">순수익 기준</th><th>임계</th></tr></thead><tbody>

    rels.forEach(r=>{h+=`<tr><td><div class="cellflex">${txArt(r.t0)}<b>${esc(r.rel||'(미지정)')}</b></div></td><td class="r num mut2">${r.c}</td><td class="r num mut">${won(r.gk)}</td><td class="r num">${won(r.nk)}</td></tr>`;});h+='</tbody></table></div>';body.innerHTML=h;};

    $('#printStmt').onclick=()=>{
      $('#printDoc').innerHTML=statementHTML(name,a,rels,dates);

      const done=()=>{document.body.classList.remove('printing');window.removeEventListener('afterprint',done);};

  drawRel();
  sheet.querySelectorAll('.tabs .t').forEach(b=>b.onclick=()=>{sheet.querySelectorAll('.tabs .t').forEach(x=>x.classList.toggle('on',x===b));({rel:drawRel,tx:drawTx,stmt:drawStmt}[b.dataset.t])();});

function statementText(name,a,rels,dates){
  const period=dates.length?dates[0]+' ~ '+dates[dates.length-1]:'-';
  let s='DINURE RECORDINGS · 정산 명세서\n';
  s+='--------------------------------\n';
  s+='아티스트: '+name+'\n기간: '+period+'\n발행일: '+todayISO()+'\n';
  s+='분배 기준: 레이블 50% · 단독/합작/리믹스 규정\n';
  s+='임계: 유통(DCM) '+won(S.thrKRW)+' / 밴드캠프 $'+S.thrUSD+' (순수익 기준, '+(S.settleMode==='release'?'계약별':'아티스트 합산')+')\n';
  s+='적용 환율: 기본 ₩'+S.fx.rate+'/USD'+(Object.keys(S.fxByYm).length?' · 월별 환율 '+Object.keys(S.fxByYm).length+'건 적용':'')+'\n';
  s+='--------------------------------\n[릴리즈별 귀속 순수익]\n';
  rels.forEach(r=>{s+='· '+(r.rel||'-')+' : '+won(r.nk)+'\n';});
  s+='--------------------------------\n';
  s+='누적 분배 : '+won(a.accrued)+'\n정산 가능 : '+won(a.payable)+'\n정산됨   : '+won(a.settled)+'\n잔여     : '+won(a.remaining)+'\n';
  if((S.taxRate||0)>0&&a.payable>0){const tr=S.taxRate,tax=Math.floor(a.payable*tr/100);
    s+='--------------------------------\n[원천징수 '+tr+'%]\n지급액   : '+won(a.payable)+'\n원천징수 : -'+won(tax)+'\n실지급액 : '+won(a.payable-tax)+'\n';}
  s+='--------------------------------\n';
  s+=a.payable>0?('정산 가능액 '+won(a.payable)+' — 정산 대상\n'):('현재 임계 미달, 누적 '+won(a.accrued)+' (정산 가능 0)\n');
  s+='* USD(밴드캠프)는 적용 환율로 KRW 환산. 임계 판정은 채널별 순수익 기준.\n';
  return s;
}

/* ===================== 매뉴얼 — 워크플로우 메이킹 보드 ===================== */
let _wfColor='var(--accent)', _wfSaveT=null, _wfZoom=1, _wfPanX=40, _wfPanY=40;
const WF_COLORS=['var(--accent)','var(--info)','var(--ok)','var(--warn)','var(--bad)'];
const WF_ZMIN=0.4, WF_ZMAX=2.2, WF_GRID=22;
function wfNorm(){
  let B=S.manualBoard;
  if(!B||typeof B!=='object') B={};
  if(!Array.isArray(B.workflows)){ const nodes=Array.isArray(B.nodes)?B.nodes:[], edges=Array.isArray(B.edges)?B.edges:[];
    B={workflows:[{id:'wf1',name:'워크플로우 1',nodes,edges}],active:'wf1',palette:B.palette}; }
  if(!B.workflows.length) B.workflows.push({id:'wf1',name:'워크플로우 1',nodes:[],edges:[]});
  if(!B.workflows.some(w=>w.id===B.active)) B.active=B.workflows[0].id;
  if(!Array.isArray(B.palette)||!B.palette.length) B.palette=WF_COLORS.slice();
  B.workflows.forEach(w=>{ w.nodes=w.nodes||[]; w.edges=w.edges||[]; });
  S.manualBoard=B; return B;
}
function renderManual(host){
  const ta=$('#topActions'); if(ta)ta.innerHTML='';
  const B=wfNorm();
  const wf=()=>B.workflows.find(w=>w.id===B.active)||B.workflows[0];
  const save=()=>{ clearTimeout(_wfSaveT); _wfSaveT=setTimeout(saveManual,450); };
  let delOpen=null;

  host.innerHTML=`
    <div class="wfwrap">
      <div class="wfside">
        <div class="wfsec"><div class="wfsec-h">워크플로우</div><div class="wftabs" id="wftabs"></div>
          <button class="wftab-new" id="wfNew">${ic('plus')}워크플로우 추가</button></div>
      </div>
      <div class="wfboard" id="wfboard">
        <div class="wfcanvas" id="wfcanvas"><svg class="wfedges" id="wfedges"></svg><div class="wfnodes" id="wfnodes"></div></div>
        <button class="wffab" id="wffab" title="단계 추가">+</button>
        <div class="wfpop" id="wfpop"></div>
      </div>
    </div>`;
  const board=$('#wfboard'), canvas=$('#wfcanvas'), nodesEl=$('#wfnodes'), edgesEl=$('#wfedges'), fab=$('#wffab'), pop=$('#wfpop');

  function applyXform(){ canvas.style.transform=`translate(${_wfPanX}px,${_wfPanY}px) scale(${_wfZoom})`;
    const g=WF_GRID*_wfZoom; board.style.backgroundSize=g+'px '+g+'px'; board.style.backgroundPosition=_wfPanX+'px '+_wfPanY+'px'; }
  const snap=p=>Math.round(p/WF_GRID)*WF_GRID;
  const magnet=p=>{ const s=snap(p), d=p-s, t=Math.min(1,Math.abs(d)/(WF_GRID/2));
    const pull=(1-t)*(1-t); return p-d*pull*0.92; };   // 격자에 자석처럼 강하게 당김

  function renderTabs(){
    const t=$('#wftabs'); t.innerHTML='';
    B.workflows.forEach(w=>{
      const el=ce('div','wftab'+(w.id===B.active?' on':'')); el.dataset.id=w.id;
      el.innerHTML=`<span class="wftab-grip" title="드래그로 순서 변경 · 클릭하면 삭제"></span>
        <input class="wftab-nm" value="${esc(w.name)}">
        ${delOpen===w.id?`<span class="wftab-del" title="삭제">${ic('trash')}</span>`:''}`;
      const nm=el.querySelector('.wftab-nm'), grip=el.querySelector('.wftab-grip'), del=el.querySelector('.wftab-del');
      el.onclick=ev=>{ if(ev.target.closest('.wftab-grip,.wftab-del,.wftab-nm'))return; B.active=w.id; delOpen=null; closePop(); _wfPanX=40;_wfPanY=40;_wfZoom=1; renderTabs(); applyXform(); renderNodes(); };
      nm.onclick=ev=>ev.stopPropagation();
      nm.oninput=()=>{ w.name=nm.value; save(); };
      if(del) del.onclick=ev=>{ ev.stopPropagation(); if(B.workflows.length<=1){ toast('마지막 워크플로우는 삭제할 수 없어요'); return; }
        if(confirm('이 워크플로우를 삭제할까요?')){ B.workflows=B.workflows.filter(v=>v.id!==w.id); if(B.active===w.id)B.active=B.workflows[0].id; delOpen=null; save(); renderTabs(); renderNodes(); } };
      grip.addEventListener('pointerdown',ev=>{ ev.preventDefault(); ev.stopPropagation();
        const rect=el.getBoundingClientRect(), offX=ev.clientX-rect.left, offY=ev.clientY-rect.top, gw=rect.width;
        let moved=false, ghost=null;
        const markSrc=()=>{ const d=$('#wftabs').querySelector('.wftab[data-id="'+w.id+'"]'); if(d)d.classList.add('ghost-src'); };
        const start=()=>{ ghost=el.cloneNode(true); ghost.className=el.className+' wftab-ghost';
          ghost.style.width=gw+'px'; document.body.appendChild(ghost); markSrc(); };
        const moveGhost=e=>{ if(ghost){ ghost.style.left=(e.clientX-offX)+'px'; ghost.style.top=(e.clientY-offY)+'px'; } };
        const mv=e=>{ if(!moved&&Math.abs(e.clientY-ev.clientY)>4){ moved=true; start(); }
          if(!moved)return; moveGhost(e);
          const tabsEls=[...$('#wftabs').children]; let want=0;
          tabsEls.forEach(te=>{ if(te.dataset.id===w.id)return; const r=te.getBoundingClientRect(); if(e.clientY>r.top+r.height/2)want++; });
          const cur=B.workflows.findIndex(v=>v.id===w.id);
          if(want!==cur){ const [it]=B.workflows.splice(cur,1); B.workflows.splice(want,0,it); renderTabs(); markSrc(); } };
        const up=()=>{ window.removeEventListener('pointermove',mv); window.removeEventListener('pointerup',up);
          if(ghost)ghost.remove(); const d=$('#wftabs').querySelector('.wftab.ghost-src'); if(d)d.classList.remove('ghost-src');
          if(!moved){ delOpen=(delOpen===w.id?null:w.id); renderTabs(); } else { save(); } };
        window.addEventListener('pointermove',mv); window.addEventListener('pointerup',up); });
      t.appendChild(el);
    });
  }
  function renderPop(){
    pop.innerHTML='';
    B.palette.forEach(c=>{ const b=ce('button','wfcol'); b.style.background=c; b.title='이 색으로 단계 추가';
      b.onclick=()=>{ addNode(c); closePop(); }; pop.appendChild(b); });
    const add=ce('button','wfcol wfcol-add','＋'); add.title='색 추가';
    add.onclick=()=>{ const inp=document.createElement('input'); inp.type='color'; inp.value='#7c5cff';
      inp.onchange=()=>{ const c=inp.value; if(!B.palette.includes(c)){ B.palette.push(c); save(); } renderPop(); }; inp.click(); };
    pop.appendChild(add);
  }
  function openPop(){ renderPop(); pop.classList.add('on'); fab.classList.add('on'); }
  function closePop(){ pop.classList.remove('on'); fab.classList.remove('on'); }

  function redrawEdges(){
    const W=wf(); const el={}; nodesEl.querySelectorAll('.wfnode').forEach(d=>el[d.dataset.id]=d);
    let s='';
    W.edges.forEach((e,idx)=>{ const a=el[e.from], b=el[e.to]; const na=W.nodes.find(n=>n.id===e.from), nb=W.nodes.find(n=>n.id===e.to);
      if(!a||!b||!na||!nb)return;
      const x1=na.x+a.offsetWidth, y1=na.y+a.offsetHeight/2, x2=nb.x, y2=nb.y+b.offsetHeight/2;
      const dx=Math.max(40,Math.abs(x2-x1)*0.5);
      const d=`M ${x1} ${y1} C ${x1+dx} ${y1}, ${x2-dx} ${y2}, ${x2} ${y2}`;
      s+=`<g class="wfedge"><path class="wire" d="${d}" stroke="${na.color||'var(--accent)'}"/><path class="hit" data-edge="${idx}" d="${d}"><title>클릭하면 이 연결만 삭제</title></path></g>`; });
    edgesEl.innerHTML=s;
    edgesEl.querySelectorAll('.hit').forEach(p=>p.onclick=()=>{ wf().edges.splice(+p.dataset.edge,1); save(); redrawEdges(); });
  }
  function wireNode(eln,n){
    const bar=eln.querySelector('.wfnode-bar');
    bar.addEventListener('pointerdown',ev=>{ if(ev.target.closest('.wfnode-title,.wfnode-del'))return; ev.preventDefault(); ev.stopPropagation();
      const sx=ev.clientX, sy=ev.clientY, x0=n.x, y0=n.y;
      const mv=e=>{ n.x=Math.max(0,magnet(x0+(e.clientX-sx)/_wfZoom)); n.y=Math.max(0,magnet(y0+(e.clientY-sy)/_wfZoom));
        eln.style.left=n.x+'px'; eln.style.top=n.y+'px'; redrawEdges(); };
      const up=()=>{ window.removeEventListener('pointermove',mv); window.removeEventListener('pointerup',up);
        n.x=Math.max(0,snap(n.x)); n.y=Math.max(0,snap(n.y)); eln.style.left=n.x+'px'; eln.style.top=n.y+'px'; redrawEdges(); save(); };
      window.addEventListener('pointermove',mv); window.addEventListener('pointerup',up); });
    const port=eln.querySelector('[data-port]');
    port.addEventListener('pointerdown',ev=>{ ev.preventDefault(); ev.stopPropagation();
      const cr=canvas.getBoundingClientRect(); const x1=n.x+eln.offsetWidth, y1=n.y+eln.offsetHeight/2;
      const tmp=document.createElementNS('http://www.w3.org/2000/svg','path'); tmp.setAttribute('class','wire'); edgesEl.appendChild(tmp);
      const mv=e=>{ const mx=(e.clientX-cr.left)/_wfZoom, my=(e.clientY-cr.top)/_wfZoom; tmp.setAttribute('d',`M ${x1} ${y1} L ${mx} ${my}`); };
      const up=e=>{ window.removeEventListener('pointermove',mv); window.removeEventListener('pointerup',up); tmp.remove();
        const tg=document.elementFromPoint(e.clientX,e.clientY), tn=tg&&tg.closest('.wfnode'); const W=wf();
        if(tn&&tn.dataset.id!==n.id){ const to=tn.dataset.id;
          if(!W.edges.some(ed=>ed.from===n.id&&ed.to===to)){ W.edges.push({from:n.id,to:to}); save(); } }
        redrawEdges(); };
      window.addEventListener('pointermove',mv); window.addEventListener('pointerup',up); });
    const edge=eln.querySelector('.wfedge-r');
    edge.addEventListener('pointerdown',ev=>{ ev.preventDefault(); ev.stopPropagation();
      const sx=ev.clientX, w0=n.w||eln.offsetWidth;
      const mv=e=>{ n.w=Math.max(150,Math.min(560,magnet(w0+(e.clientX-sx)/_wfZoom))); eln.style.width=n.w+'px'; redrawEdges(); };
      const up=()=>{ window.removeEventListener('pointermove',mv); window.removeEventListener('pointerup',up);
        n.w=Math.max(150,Math.min(560,snap(n.w))); eln.style.width=n.w+'px'; redrawEdges(); save(); };
      window.addEventListener('pointermove',mv); window.addEventListener('pointerup',up); });
  }
  function addRow(n){ n.rows=Array.isArray(n.rows)?n.rows:[]; n.rows.push(''); save(); renderNodes();
    const inp=nodesEl.querySelector('.wfnode[data-id="'+n.id+'"] .wfrow:last-child input'); if(inp)inp.focus(); }
  function renderNodes(){
    const W=wf(); nodesEl.innerHTML='';
    W.nodes.forEach(n=>{
      if(!Array.isArray(n.rows)) n.rows = n.note ? [n.note] : [''];
      const eln=ce('div','wfnode'); eln.dataset.id=n.id; eln.style.left=n.x+'px'; eln.style.top=n.y+'px'; if(n.w)eln.style.width=n.w+'px';
      const col=n.color||'var(--accent)';
      const rowsHtml = n.rows.length
        ? `<div class="wfrows">`+n.rows.map((r,i)=>`<div class="wfrow"><input data-i="${i}" value="${esc(r)}" placeholder="내용 입력"><span class="wfrow-x" data-x="${i}" title="행 삭제">×</span></div>`).join('')+`</div>`
        : `<div class="wfrows"><div class="wfrows-empty">헤더의 ＋ 로 행을 추가하세요</div></div>`;
      eln.innerHTML=`<div class="wfnode-bar" style="background:color-mix(in srgb,${col} 26%, var(--card))">
          <input class="wfnode-title" value="${esc(n.title||'')}" placeholder="단계 이름">
          <span class="wfnode-add" title="행 추가">${ic('plus')}</span>
          <span class="wfnode-del" title="삭제">${ic('x')}</span></div>
        ${rowsHtml}
        <div class="wfport" data-port title="끌어서 연결"></div><div class="wfedge-r" title="가장자리를 끌어 크기 조절"></div>`;
      const ti=eln.querySelector('.wfnode-title');
      ti.oninput=()=>{ n.title=ti.value; save(); };
      eln.querySelectorAll('.wfrow input').forEach(inp=>inp.oninput=()=>{ n.rows[+inp.dataset.i]=inp.value; save(); });
      eln.querySelectorAll('.wfrow-x').forEach(x=>x.onclick=ev=>{ ev.stopPropagation(); n.rows.splice(+x.dataset.x,1); save(); renderNodes(); });
      eln.querySelector('.wfnode-add').onclick=ev=>{ ev.stopPropagation(); addRow(n); };
      eln.querySelector('.wfnode-del').onclick=()=>{ const w=wf(); w.nodes=w.nodes.filter(x=>x.id!==n.id); w.edges=w.edges.filter(e=>e.from!==n.id&&e.to!==n.id); save(); renderNodes(); };
      wireNode(eln,n); nodesEl.appendChild(eln);
    });
    redrawEdges();
  }
  function addNode(color){ const W=wf(); const id='n'+Date.now().toString(36)+Math.floor(Math.random()*1000).toString(36);
    const cx=(-_wfPanX+board.clientWidth/2)/_wfZoom, cy=(-_wfPanY+board.clientHeight/2)/_wfZoom;
    const x=Math.max(0,snap(cx-106)), y=Math.max(0,snap(cy-50));
    W.nodes.push({id,x,y,title:'새 단계',rows:[''],color:color||B.palette[0]}); save(); renderNodes();
    const last=nodesEl.querySelector('.wfnode:last-child .wfnode-title'); if(last){ last.focus(); try{last.select();}catch(e){} } }

  board.addEventListener('wheel',e=>{ e.preventDefault(); const cr=board.getBoundingClientRect();
    const mx=e.clientX-cr.left, my=e.clientY-cr.top;
    const old=_wfZoom; let z=old*(e.deltaY<0?1.12:1/1.12); z=Math.max(WF_ZMIN,Math.min(WF_ZMAX,z));
    if(z===old)return; const k=z/old; _wfPanX=mx-(mx-_wfPanX)*k; _wfPanY=my-(my-_wfPanY)*k; _wfZoom=z; applyXform(); },{passive:false});
  board.addEventListener('pointerdown',e=>{ if(e.target.closest('.wfnode,.wffab,.wfpop,.wfedge'))return; e.preventDefault(); closePop();
    const ae=document.activeElement; if(ae&&ae.closest&&ae.closest('.wfnode'))ae.blur();
    const sx=e.clientX, sy=e.clientY, px=_wfPanX, py=_wfPanY;
    const mv=ev=>{ _wfPanX=px+(ev.clientX-sx); _wfPanY=py+(ev.clientY-sy); applyXform(); };
    const up=()=>{ window.removeEventListener('pointermove',mv); window.removeEventListener('pointerup',up); };
    window.addEventListener('pointermove',mv); window.addEventListener('pointerup',up); });

  fab.onclick=()=>{ if(pop.classList.contains('on'))closePop(); else openPop(); };
  $('#wfNew').onclick=()=>{ const id='wf'+Date.now().toString(36); B.workflows.push({id,name:'워크플로우 '+(B.workflows.length+1),nodes:[],edges:[]}); B.active=id; delOpen=null; closePop(); _wfPanX=40;_wfPanY=40;_wfZoom=1; save(); renderTabs(); applyXform(); renderNodes(); };
  renderTabs(); applyXform(); renderNodes();
}

/* ===================== 회의록 (블록 에디터) ===================== */
function renderNotes(v){
  const grid=ce('div','notegrid');v.appendChild(grid);
  const left=ce('div','card flat');
  left.innerHTML=`<div style="display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--bd)">
    <b style="font-size:var(--f13);font-weight:500;color:var(--t1)">문서</b><span style="flex:1"></span>
    <button class="btn sm pri" id="newNote">${ic('plus')}추가</button></div>`;
  const pl=ce('div','plist');
  const list=S.notes.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  if(!list.length)pl.appendChild(ce('div','',`<div class="mut2" style="padding:10px;font-size:var(--f12)">아직 회의록이 없습니다.</div>`));
  list.forEach(n=>{
    const b=ce('button',n.id===S.noteSel?'on':'',`<b>${esc(n.title||'(제목 없음)')}</b><span>${esc(n.date||'')}${n.by?' · '+esc(n.by):''}</span>`);
    b.onclick=()=>{S.noteSel=n.id;render();};pl.appendChild(b);
  });
  left.appendChild(pl);grid.appendChild(left);
  $('#newNote').onclick=()=>{
    const n={id:uid(),title:'',date:todayISO(),by:who(),blocks:[{t:'p',text:''}],updatedAt:Date.now()};
    S.notes.push(n);S.noteSel=n.id;saveNotes();render();
  };
  const n=S.notes.find(x=>x.id===S.noteSel);
  const right=ce('div','card');grid.appendChild(right);
  if(!n){right.className='card empty';right.textContent='문서를 선택하거나 새 회의록을 만드세요. 단축키: # 제목 · - 목록 · [] 할 일 · --- 구분선';return;}
  buildNoteEditor(right,n);
}
function buildNoteEditor(host,n){
  const doc=ce('div','doc');host.appendChild(doc);
  const title=ce('input','dtitle');title.placeholder='제목 없음';title.value=n.title||'';
  doc.appendChild(title);
  const meta=ce('div','dmeta');
  meta.innerHTML=`<span style="display:inline-flex;align-items:center;gap:5px">${ic('cal')}<input type="date" value="${esc(n.date||'')}" id="nDate" style="border:none;background:none;padding:0;color:var(--t4);font-size:var(--f12)"></span>
    <span>${esc(n.by||'')}</span><span style="flex:1"></span>
    <button class="btn sm ghost danger" id="nDel">삭제</button>`;
  doc.appendChild(meta);
  const blocksHost=ce('div');doc.appendChild(blocksHost);
  const save=debounce(()=>{n.updatedAt=Date.now();saveNotes();},600);
  title.oninput=()=>{n.title=title.value;save();};
  meta.querySelector('#nDate').onchange=e=>{n.date=e.target.value;save();};
  meta.querySelector('#nDel').onclick=async()=>{if(await dlgConfirm('이 회의록을 삭제할까요?',{ok:'삭제',danger:true})){S.notes=S.notes.filter(x=>x.id!==n.id);S.noteSel=null;saveNotes();render();}};

  function blockEl(b,i){
    const el=ce('div','blk'+(b.done?' done':''));el.dataset.t=b.t;el.dataset.i=i;
    if(b.t==='hr'){el.innerHTML='<div class="hrln"></div><div class="bc"></div>';
      el.querySelector('.hrln').onclick=async()=>{if(await dlgConfirm('구분선을 삭제할까요?',{ok:'삭제',danger:true})){n.blocks.splice(i,1);drawBlocks();save();}};
      return el;}
    if(b.t==='todo'){const tg=ce('span','tg');tg.onclick=()=>{b.done=!b.done;el.classList.toggle('done',b.done);save();};el.appendChild(tg);}
    const bc=ce('div','bc');bc.contentEditable='true';bc.spellcheck=false;bc.textContent=b.text||'';
    bc.dataset.ph=i===0&&b.t==='p'?'내용을 입력하세요 — # 제목 · - 목록 · [] 할 일 · --- 구분선':'';
    el.appendChild(bc);
    bc.oninput=()=>{
      let t=bc.textContent;
      const conv=(pre,type)=>{if(t.startsWith(pre)){b.t=type;b.text=t.slice(pre.length);drawBlocks();focusBlock(i,true);save();return true;}return false;};
      if(b.t==='p'){
        if(conv('# ','h1')||conv('## ','h2')||conv('- ','li')||conv('[] ','todo')||conv('[ ] ','todo'))return;
        if(t.trim()==='---'){b.t='hr';b.text='';drawBlocks();const nb={t:'p',text:''};n.blocks.splice(i+1,0,nb);drawBlocks();focusBlock(i+1);save();return;}
      }
      b.text=t;save();
    };
    bc.onkeydown=e=>{
      if(e.key==='Enter'&&!e.shiftKey){
        e.preventDefault();
        const nt=(b.t==='li'||b.t==='todo')&&b.text.trim()?b.t:'p';
        if((b.t==='li'||b.t==='todo')&&!b.text.trim()){b.t='p';drawBlocks();focusBlock(i);save();return;}
        n.blocks.splice(i+1,0,{t:nt,text:''});drawBlocks();focusBlock(i+1);save();
      }else if(e.key==='Backspace'&&!bc.textContent){
        e.preventDefault();
        if(b.t!=='p'){b.t='p';drawBlocks();focusBlock(i);save();return;}
        if(i>0){n.blocks.splice(i,1);drawBlocks();focusBlock(i-1,true);save();}
      }else if(e.key==='ArrowUp'&&i>0&&window.getSelection().anchorOffset===0){focusBlock(i-1,true);}
      else if(e.key==='ArrowDown'&&i<n.blocks.length-1){const sel=window.getSelection();if(sel.anchorOffset>=bc.textContent.length)focusBlock(i+1);}
    };
    return el;
  }
  function drawBlocks(){
    blocksHost.innerHTML='';
    if(!n.blocks.length)n.blocks.push({t:'p',text:''});
    n.blocks.forEach((b,i)=>blocksHost.appendChild(blockEl(b,i)));
  }
  function focusBlock(i,end){
    const el=blocksHost.querySelector(`.blk[data-i="${i}"] .bc`);if(!el)return;
    el.focus();
    if(end&&el.textContent){const r=document.createRange();r.selectNodeContents(el);r.collapse(false);
      const sel=window.getSelection();sel.removeAllRanges();sel.addRange(r);}
  }
  drawBlocks();
}

/* ===================== 링크 ===================== */
function renderLinks(v){
  const ta=$('#topActions');
  if(ta)ta.innerHTML=`<button class="btn sm" id="addCat">${ic('plus')}유형</button><button class="btn sm pri" id="addLink">${ic('plus')}추가</button>`;
  const cats=S.linkcfg.cats.slice();
  const uncatted=S.links.filter(l=>!cats.includes(l.cat));
  const renameCat=(cur,val)=>{
    if(S.linkcfg.cats.includes(val)){toast('이미 있는 유형입니다');render();return;}
    const i=S.linkcfg.cats.indexOf(cur);if(i<0)return;
    S.linkcfg.cats[i]=val;S.links.forEach(l=>{if(l.cat===cur)l.cat=val;});
    saveLinkcfg();saveLinks();render();
  };
  const renderCat=(cat,links,real)=>{
    const box=ce('div','linkcat');box.dataset.cat=cat;if(!real)box.dataset.uncat='1';if(!real)box.dataset.nodrag='1';
    const grp=ce('div','sec-h catgrp');
    grp.innerHTML=`${real?GRIP:''}<h2 style="color:var(--t3);font-weight:500;font-size:var(--f12)"${real?' title="더블클릭해서 이름 변경"':''}>${esc(cat)}</h2>
      ${real?`<div class="ops"><button class="iconbtn" data-cdel="${esc(cat)}" title="유형 삭제"><svg><use href="#i-trash"/></svg></button></div>`:''}`;
    if(real){const h2=grp.querySelector('h2');h2.ondblclick=()=>dndRename(h2,cat,val=>renameCat(cat,val));}
    box.appendChild(grp);
    const g=ce('div','linkgrid');
    links.forEach(l=>{
      let host='';try{host=new URL(l.url).hostname;}catch(e){}
      const a=ce('a','linkcard');a.href=l.url;a.target='_blank';a.rel='noopener';a.dataset.lid=l.id;a.setAttribute('draggable','false');
      a.innerHTML=`${GRIP}<img src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(host)}&sz=64" alt="" onerror="this.style.visibility='hidden'">
        <div class="lt"><b>${esc(l.name)}</b><span>${esc(host)}</span></div>
        ${l.memo?`<span class="memoic" title="메모 있음 — 수정에서 확인">${ic('key')}</span>`:''}
        <button class="iconbtn more" data-edit="${l.id}" title="수정"><svg><use href="#i-edit"/></svg></button>`;
      a.querySelector('[data-edit]').onclick=e=>{e.preventDefault();e.stopPropagation();editLink(l.id);};
      g.appendChild(a);
    });
    if(!links.length){const ph=ce('div','','이 유형에 링크가 없습니다.');ph.dataset.nodrag='1';
      ph.style.cssText='grid-column:1/-1;color:var(--t4);font-size:var(--f12);padding:8px 2px';g.appendChild(ph);}
    box.appendChild(g);
    v.appendChild(box);
  };
  cats.forEach(cat=>renderCat(cat,S.links.filter(l=>l.cat===cat),true));
  if(uncatted.length)renderCat('미분류',uncatted,false);
  if(!S.links.length&&!cats.length)v.appendChild(ce('div','card empty','아직 링크가 없습니다.'));
  $('#addLink').onclick=()=>editLink(null);
  $('#addCat').onclick=async()=>{
    const name=((await dlgPrompt('새 유형 이름','',{title:'유형 추가',ok:'추가'}))||'').trim();
    if(!name)return;
    if(S.linkcfg.cats.includes(name)){toast('이미 있는 유형입니다');return;}
    S.linkcfg.cats.push(name);saveLinkcfg();render();
  };
  v.querySelectorAll('[data-cdel]').forEach(b=>b.onclick=async()=>{
    const cur=b.dataset.cdel;const i=S.linkcfg.cats.indexOf(cur);if(i<0)return;
    const n=S.links.filter(l=>l.cat===cur).length;
    if(!await dlgConfirm(`"${cur}" 유형을 삭제할까요?${n?`\n링크 ${n}개는 미분류로 이동합니다.`:''}`,{ok:'삭제',danger:true}))return;
    S.linkcfg.cats.splice(i,1);saveLinkcfg();render();
  });
  const commitLinks=()=>{
    const catEls=[...v.querySelectorAll(':scope > .linkcat')];
    S.linkcfg.cats=catEls.filter(c=>!c.dataset.uncat).map(c=>c.dataset.cat);
    const lById={};S.links.forEach(l=>lById[l.id]=l);
    const newLinks=[];
    catEls.forEach(catEl=>{const cat=catEl.dataset.uncat?'':catEl.dataset.cat;
      catEl.querySelectorAll('.linkcard[data-lid]').forEach(card=>{const l=lById[card.dataset.lid];if(!l)return;l.cat=cat;newLinks.push(l);});});
    S.links.forEach(l=>{if(!newLinks.includes(l))newLinks.push(l);});
    S.links=newLinks;saveLinkcfg();saveLinks();render();
  };
  dndWire({zones:[v],itemSel:'.linkcat',kind:'lcat',axis:'y',handleSel:'.catgrp .draghandle',commit:commitLinks});
  dndWire({zones:[...v.querySelectorAll('.linkgrid')],itemSel:'.linkcard[data-lid]',kind:'link',axis:'grid',handleSel:'.draghandle',commit:commitLinks});
}
function editLink(id){
  const isNew=!id;
  const l=isNew?{id:uid(),name:'',url:'',cat:S.linkcfg.cats[0]||'',memo:''}:deep(S.links.find(x=>x.id===id));
  const sheet=$('#sheet');
  const catOpts=S.linkcfg.cats.map(c=>`<option ${l.cat===c?'selected':''}>${esc(c)}</option>`).join('');
  sheet.innerHTML=`<span class="x" onclick="closeModal()">${ic('x')}</span><h3>${isNew?'링크 추가':'링크 수정'}</h3>
    <div class="frow" style="margin-top:14px">
      <div class="field" style="flex:2"><label class="fl">이름</label><input type="text" id="lN" value="${esc(l.name)}"></div>
      <div class="field"><label class="fl">유형</label><select id="lC">${catOpts}<option value="">미분류</option></select></div>
    </div>
    <div class="field" style="margin-top:8px"><label class="fl">URL</label><input type="url" id="lU" value="${esc(l.url)}" placeholder="https://"></div>
    <div class="field" style="margin-top:8px"><label class="fl">메모 (계정·비고)</label><textarea id="lM" rows="3" placeholder="아이디 / 비밀번호 / 비고">${esc(l.memo||'')}</textarea>
      <small class="note" style="margin-top:6px">메모는 동기화 시 운영진 모두에게 평문으로 공유됩니다. 비밀번호를 적는다면 동기화를 <b>구글 로그인 + DB 보안 규칙</b>으로 잠근 상태에서만 권장합니다.</small></div>
    <hr class="sep"><div style="display:flex;gap:8px">
      ${!isNew?'<button class="btn danger ghost" id="lDel">삭제</button>':''}
      ${l.memo?`<button class="btn ghost" id="lCopyMemo">${ic('copy')}메모 복사</button>`:''}
      <span style="flex:1"></span>
      <button class="btn" onclick="closeModal()">취소</button><button class="btn pri" id="lSave">저장</button></div>`;
  const del=$('#lDel');if(del)del.onclick=()=>{S.links=S.links.filter(x=>x.id!==l.id);saveLinks();closeModal();render();};
  const cm=$('#lCopyMemo');if(cm)cm.onclick=()=>navigator.clipboard.writeText($('#lM').value).then(()=>toast('메모가 복사되었습니다'));
  $('#lSave').onclick=()=>{
    l.name=$('#lN').value.trim();l.url=$('#lU').value.trim();l.cat=$('#lC').value;l.memo=$('#lM').value;
    if(!l.name||!l.url){toast('이름과 URL을 입력하세요');return;}
    if(!/^https?:\/\//.test(l.url))l.url='https://'+l.url;
    const i=S.links.findIndex(x=>x.id===l.id);
    if(i>=0)S.links[i]=l;else S.links.push(l);
    saveLinks();closeModal();render();
  };
  openModal();
}

/* ===================== 설정 ===================== */
function renderSettings(v){
  const dark=S.theme==='dark';const rel=S.settleMode==='release';
  const ai=Store.authInfo();const impN=S.import.tx.length;
  const grid=ce('div','setgrid');v.appendChild(grid);
  const colA=ce('div','setcol'),colB=ce('div','setcol');
  grid.appendChild(colA);grid.appendChild(colB);
  const sect=(col,title,el)=>{const w=ce('div');w.innerHTML=`<div class="seth">${esc(title)}</div>`;w.appendChild(el);col.appendChild(w);};

  /* ── 화면 모드 (다크/라이트 + 스킨) ── */
  const tm=ce('div','card');
  tm.innerHTML=`<div class="thmrow"><span class="mut2" style="font-size:var(--f12)">모드</span>
      <div class="tabs"><button class="t ${dark?'on':''}" id="thDark">다크</button><button class="t ${!dark?'on':''}" id="thLight">라이트</button></div></div>
    <div class="thmrow" style="margin-top:12px"><span class="mut2" style="font-size:var(--f12)">스킨</span>
      <div class="tabs">${SKINS.map(s=>`<button class="t ${S.skin===s.k?'on':''}" data-skin="${s.k}">${esc(s.name)}</button>`).join('')}</div></div>`;
  sect(colA,'화면 모드',tm);
  $('#thLight').onclick=()=>{S.theme='light';saveSettings();applyTheme();render();};
  $('#thDark').onclick=()=>{S.theme='dark';saveSettings();applyTheme();render();};
  tm.querySelectorAll('[data-skin]').forEach(b=>b.onclick=()=>{S.skin=b.dataset.skin;saveSettings();applyTheme();render();});

  /* ── 정산 임계 · 판정 단위 ── */
  const th=ce('div','card');
  th.innerHTML=`<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px"><span class="mut" style="font-weight:500">판정 단위</span>
      <div class="tabs"><button class="t ${rel?'on':''}" id="modeRel">계약별 (릴리즈)</button><button class="t ${!rel?'on':''}" id="modeArt">아티스트 합산</button></div></div>
    <div class="filters">
      <label class="fl" style="margin:0">유통(DCM)</label><input id="thrK" type="number" value="${S.thrKRW}" style="width:110px"><span class="mut2">KRW</span>
      <label class="fl" style="margin:0 0 0 10px">밴드캠프</label><input id="thrU" type="number" value="${S.thrUSD}" style="width:80px"><span class="mut2">USD</span>
      <button class="btn sm pri" id="thrSave">저장</button></div>`;
  sect(colA,'정산 임계 · 판정 단위',th);
  $('#modeRel').onclick=()=>{S.settleMode='release';saveSettings();render();};
  $('#modeArt').onclick=()=>{S.settleMode='artist';saveSettings();render();};
  $('#thrSave').onclick=()=>{S.thrKRW=parseFloat($('#thrK').value)||S.thrKRW;S.thrUSD=parseFloat($('#thrU').value)||S.thrUSD;saveSettings();render();toast('저장되었습니다');};

  /* ── 원천징수 · 세무 ── */
  const tax=ce('div','card');
  tax.innerHTML=`<div class="filters">
      <label class="fl" style="margin:0">원천징수율</label><input id="taxRate" type="number" step="0.1" min="0" max="100" value="${S.taxRate}" style="width:90px"><span class="mut2">%</span>
      <button class="btn sm pri" id="taxSave">저장</button></div>
    <small class="note" style="margin-top:8px">아티스트 지급 시 적용됩니다. 사업소득 <b>3.3%</b> · 기타소득 <b>8.8%</b>. 아티스트 상세·명세서에 <b>지급액 → 원천징수 → 실지급</b>으로 표시됩니다. 정확한 과세 구분은 세무 전문가와 확인하세요.</small>`;
  sect(colA,'원천징수 · 세무',tax);
  $('#taxSave').onclick=()=>{const v=parseFloat($('#taxRate').value);S.taxRate=(isFinite(v)&&v>=0&&v<=100)?v:S.taxRate;saveSettings();render();toast('저장되었습니다');};

  /* ── 접근 · 동기화 ── */
  const sy=ce('div','card');
  sy.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      <i class="sydot on"></i><b style="font-size:var(--f13);font-weight:500;color:var(--t1)">동기화 켜짐</b>
      <button class="btn sm danger ghost" id="fbOff" style="margin-left:auto">로그아웃</button></div>
    <div class="kvc"><div class="l">로그인 계정</div><div class="v" style="font-size:var(--f13)">${esc(ai.email||'—')}</div></div>`;
  sect(colB,'접근 · 동기화',sy);
  const fo=$('#fbOff');
  if(fo)fo.onclick=async()=>{if(await dlgConfirm('로그아웃할까요?',{ok:'로그아웃'})){await Store.signOut();location.reload();}};

  /* ── 로우데이터 업데이트 ── */
  const imp=ce('div','card');
  imp.innerHTML=`<div class="srcrow">
      <div class="srcl"><span class="pill info">DCM</span><span class="mut2" id="dcmName" style="font-size:var(--f12)">선택된 파일 없음</span></div>
      <label class="btn sm" style="cursor:pointer">파일 선택<input type="file" id="dcmFile" accept=".htm,.html,.xls,.xlsx" style="display:none"></label></div>
    <div class="srcrow">
      <div class="srcl"><span class="pill acc">밴드캠프</span><span class="mut2" id="bcName" style="font-size:var(--f12)">선택된 파일 없음</span></div>
      <label class="btn sm" style="cursor:pointer">파일 선택<input type="file" id="bcFile" accept=".csv,.txt,.tsv" style="display:none"></label></div>
    <div class="srcfoot">
      <button class="btn pri" id="impRun" disabled>불러와서 반영</button>
      ${impN?`<button class="btn ghost" id="impReset">초기화 (${impN}건)</button>`:''}
      <span class="mut2" style="font-size:var(--f12);margin-left:auto">반영 ${ALLTX.length.toLocaleString()}건</span></div>
    <pre id="impLog" style="display:none;background:var(--bg);border:1px solid var(--bd);border-radius:var(--rad);padding:10px;font-size:var(--f12);color:var(--t3);margin:10px 0 0;white-space:pre-wrap"></pre>`;
  sect(colB,'로우데이터 업데이트',imp);
  let dcmRows=null,bcRows=null;
  const setRun=()=>{$('#impRun').disabled=!(dcmRows||bcRows);};
  const log=m=>{const el=$('#impLog');el.style.display='block';el.textContent+=(el.textContent?'\n':'')+m;};
  $('#dcmFile').onchange=e=>{const f=e.target.files[0];if(!f)return;$('#dcmName').textContent=f.name+' 읽는 중…';
    const fr=new FileReader();fr.onload=()=>{try{dcmRows=parseDcmFile(fr.result);$('#dcmName').textContent=f.name+` · ${dcmRows.length}행 인식`;if(!dcmRows.length){$('#dcmName').textContent=f.name+' · 데이터 테이블을 못 찾음 (sheet001.htm을 올려주세요)';dcmRows=null;}}catch(err){$('#dcmName').textContent='읽기 실패';dcmRows=null;}setRun();};fr.readAsText(f);};
  $('#bcFile').onchange=e=>{const f=e.target.files[0];if(!f)return;$('#bcName').textContent=f.name+' 읽는 중…';
    const fr=new FileReader();fr.onload=()=>{try{bcRows=parseBcFile(fr.result);$('#bcName').textContent=f.name+` · ${bcRows.length}행 인식`;if(!bcRows.length){bcRows=null;$('#bcName').textContent=f.name+' · 행을 못 읽음';}}catch(err){$('#bcName').textContent='읽기 실패';bcRows=null;}setRun();};fr.readAsArrayBuffer(f);};
  $('#impRun').onclick=async()=>{
    // 1) S.import은 아직 건드리지 않고 파싱만 (두 파일을 함께 올릴 때 id 충돌 방지 위해 base를 이어붙임)
    let dcmTx=null,bcTx=null,dcmYms=null,bcRange=null,base=maxId();
    if(dcmRows){dcmTx=dcmRowsToTx(dcmRows,base);base+=dcmTx.length;dcmYms=[...new Set(dcmTx.map(t=>t.ym))].sort();}
    if(bcRows){bcTx=bcRowsToTx(bcRows,base);const ds=bcTx.map(t=>t.date).filter(Boolean).sort();if(ds.length)bcRange=[ds[0],ds[ds.length-1]];}
    const riskyN=((dcmTx||[]).concat(bcTx||[])).filter(t=>t.risky).length;
    // 2) 미리보기 확인
    let prev='[가져오기 미리보기]\n';
    if(dcmTx)prev+=`유통(DCM): ${dcmTx.length.toLocaleString()}건 · 정산월 ${dcmYms.join(', ')} 대체\n`;
    if(bcTx)prev+=`밴드캠프: ${bcTx.length.toLocaleString()}건${bcRange?` · ${bcRange[0]} ~ ${bcRange[1]} 대체`:' · 유효한 날짜 없음(반영 안 됨)'}\n`;
    if(riskyN)prev+=`자동 분배(확인 필요): ${riskyN}건\n`;
    prev+='\n기존 동일 기간 데이터는 대체됩니다. 반영할까요?';
    if(!await dlgConfirm(prev,{ok:'반영',title:'로우데이터 반영'}))return;
    // 3) 실제 반영
    $('#impLog').textContent='';
    if(dcmTx){
      S.import.tx=S.import.tx.filter(t=>!(t.src==='유통(DCM)'&&dcmYms.includes(t.ym)));
      S.import.dcmYms=dedup(S.import.dcmYms.concat(dcmYms));
      S.import.tx=S.import.tx.concat(dcmTx);
      log(`유통(DCM): ${dcmTx.length}건 반영 — 정산월 ${dcmYms.join(', ')} 대체`);logAudit('revenue','유통(DCM) 반영','정산월 '+dcmYms.join(', ')+' · '+dcmTx.length+'건',{months:dcmYms,count:dcmTx.length});}
    if(bcTx&&bcRange){
      S.import.tx=S.import.tx.filter(t=>!(t.src==='밴드캠프'&&t.date&&t.date>=bcRange[0]&&t.date<=bcRange[1]));
      S.import.bcRanges=S.import.bcRanges.filter(r=>!(r[0]>=bcRange[0]&&r[1]<=bcRange[1]));
      S.import.bcRanges.push(bcRange);
      S.import.tx=S.import.tx.concat(bcTx);
      log(`밴드캠프: ${bcTx.length}건 반영 — ${bcRange[0]} ~ ${bcRange[1]} 대체`);logAudit('revenue','밴드캠프 반영',bcRange[0]+'~'+bcRange[1]+' · '+bcTx.length+'건',{range:bcRange,count:bcTx.length});}
    const risky=S.import.tx.filter(t=>t.risky).length;
    if(risky)log(`자동 분배 ${risky}건 — 정산 › 거래에서 "확인" 표시를 점검하세요`);
    saveImport();refreshEff();render();toast('로우데이터가 반영되었습니다');
  };
  const ir=$('#impReset');if(ir)ir.onclick=async()=>{if(await dlgConfirm('가져온 데이터를 모두 초기화할까요?\n내장 데이터는 유지됩니다.',{ok:'초기화',danger:true})){S.import={tx:[],dcmYms:[],bcRanges:[]};saveImport();logAudit('revenue','임포트 초기화','가져온 매출 데이터 전체 삭제');refreshEff();render();}};

  // 백업
  const bk=ce('div','card');
  bk.innerHTML=`<div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn" id="bkExp">${ic('down')}내보내기</button>
    <label class="btn" style="cursor:pointer">${ic('up')}가져오기<input type="file" id="bkImp" accept=".json" style="display:none"></label>
    <button class="btn" id="cloudPull">${ic('down')}클라우드 기준 새로고침</button>
    <span style="flex:1"></span>
    <button class="btn danger ghost" id="wipeAll">전체 초기화</button></div>`;
  sect(colB,'백업 · 복원',bk);
  $('#bkExp').onclick=async()=>{
    const out={_app:'dinure-os',_at:new Date().toISOString()};
    for(const c of COLS)out[c]=await Store.get(c);
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([JSON.stringify(out)],{type:'application/json'}));
    a.download='dinure-backup-'+todayISO()+'.json';a.click();
  };
  $('#bkImp').onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const fr=new FileReader();
    fr.onload=async()=>{
      try{
        const j=JSON.parse(fr.result);// async dialogs below
        if(j._app!=='dinure-os'&&!await dlgConfirm('이 앱의 백업 파일이 아닌 것 같습니다. 계속할까요?',{ok:'계속'}))return;
        if(!await dlgConfirm('현재 데이터를 백업 내용으로 덮어씁니다. 계속할까요?',{ok:'덮어쓰기',danger:true}))return;
        for(const c of COLS)if(j[c]!==undefined&&j[c]!==null)await Store.set(c,j[c],who());
        location.reload();
      }catch(err){toast('백업 파일을 읽지 못했습니다');}
    };
    fr.readAsText(f);
  };
  const cp=$('#cloudPull');if(cp)cp.onclick=async()=>{
    if(!Store.cloud()){toast('클라우드에 연결되어 있지 않습니다');return;}

/* ===================== gate film grain (Canvas procedural noise) =====================
   노이즈 타일을 매 틱 재난수화해 '움직이는' 필름 그레인. DPR 1.5 / 10fps로 제한하고,
   게이트가 숨겨지거나(로그인 완료) 탭이 백그라운드면 자동 정지해 부하를 최소화. */
/* 로그인 배경: 정적 필름 그레인 1회 렌더 (애니메이션 없음). 리사이즈 시에만 다시 그림. */
(function(){
  const canvas=document.getElementById('gateGrain'); if(!canvas)return;
  const ctx=canvas.getContext('2d',{alpha:true});
  const TILE=180, SPREAD=92;
  let DPR=Math.min(window.devicePixelRatio||1,1.5), W=0, H=0;
  const tile=document.createElement('canvas'); tile.width=tile.height=TILE;
  const tctx=tile.getContext('2d'); const img=tctx.createImageData(TILE,TILE);
  for(let i=3;i<img.data.length;i+=4)img.data[i]=255;
  for(let i=0;i<img.data.length;i+=4){const v=128+(Math.random()*2-1)*SPREAD;img.data[i]=img.data[i+1]=img.data[i+2]=v;}
  tctx.putImageData(img,0,0);
  function resize(){DPR=Math.min(window.devicePixelRatio||1,1.5);W=Math.floor(innerWidth*DPR);H=Math.floor(innerHeight*DPR);
    canvas.width=W;canvas.height=H;canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';}
  function paint(){
    ctx.clearRect(0,0,W,H);
    ctx.globalAlpha=1;ctx.fillStyle=ctx.createPattern(tile,'repeat');ctx.fillRect(0,0,W,H);
    // 정적인 먼지 입자 한 번만
    const n=Math.round((W*H)/(DPR*DPR)/13000);
    for(let i=0;i<n;i++){const big=Math.random()<0.10;const s=(big?2.2+Math.random()*3.4:1+Math.random()*1.3)*DPR;
      ctx.globalAlpha=big?0.12:0.07;ctx.fillStyle=Math.random()<0.5?'#000':'#fff';ctx.fillRect(Math.random()*W,Math.random()*H,s,s);}
    ctx.globalAlpha=1;
  }
  let rt; window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{if(canvas.offsetParent!==null){resize();paint();}},150);},{passive:true});
  resize();paint();
})();

/* 로고 호버 회전: 올리면 천천히(8초/회전) 정방향 회전, 떼면 원래 위치(0°)로 빠르게 복귀.
   절반(180°)을 넘었으면 정방향으로 마저 돌고, 아니면 역회전. 복귀는 평소보다 빠르게. */
(function(){
  function wire(el){
    let raf=null, ang=0, last=0, mode='idle'; // 'spin' | 'return' | 'idle'
    const SPEED=360/2400;            // 회전 속도(약 2.4초/바퀴)
    let rStart=0, rFrom=0, rTo=0;    // 복귀 트윈 상태
    const RDUR=340;                  // 복귀 시간(ms)
    const ease=t=>1-Math.pow(1-t,3); // easeOutCubic
    el.style.cursor='pointer';
    el.style.transformOrigin='50% 50%';
    el.style.transition='none';      // CSS 트랜지션 미사용 → '움직임 줄이기' 설정의 영향 차단
    function loop(t){
      if(mode==='spin'){
        if(last) ang+=(t-last)*SPEED;
        last=t; el.style.transform='rotate('+ang+'deg)';
        raf=requestAnimationFrame(loop);
      }else if(mode==='return'){
        if(!rStart)rStart=t;
        const p=Math.min(1,(t-rStart)/RDUR);
        ang=rFrom+(rTo-rFrom)*ease(p);
        el.style.transform='rotate('+ang+'deg)';
        if(p<1){raf=requestAnimationFrame(loop);}
        else{mode='idle';raf=null;ang=0;el.style.transform='';} // 원위치(원래 상태)로 복귀
      }else{raf=null;}
    }
    el.addEventListener('mouseenter',function(){ mode='spin'; last=0; if(!raf)raf=requestAnimationFrame(loop); });
    el.addEventListener('mouseleave',function(){ rFrom=ang; rTo=Math.round(ang/360)*360; rStart=0; mode='return'; if(!raf)raf=requestAnimationFrame(loop); });
  }
  document.querySelectorAll('.brand .logo,.gatecard .logo').forEach(wire);
})();

  const MI_LABELS={none:'없음',left:'왼쪽에서',right:'오른쪽에서',up:'아래에서 ↑',down:'위에서 ↓',pop:'팝 (스케일)',tilt:'틸트 (회전)',spinrev:'스핀 리빌 (로고 프레임)'};

  const FILTER_LABELS={none:'없음',vintage:'빈티지 필름',film8:'8mm 홈무비',polaroid:'폴라로이드',sepia:'세피아',vhs:'레트로 VHS',ccd:'CCD 캠코더',glitch:'글리치',cine:'시네마틱 (틸&오렌지)',cross:'크로스 프로세스',dream:'드리미 글로우',clean:'클린 브라이트',noir:'느와르',lomo:'로모'};

  // ===== 킥 검출 v3 — 적응형 스펙트럴 플럭스 온셋 =====

  function mkKickStep(binHz,nBins,fps,cfg){
    const sens=Math.max(0.2,Math.min(3,+cfg.sens||1));
    const lo=Math.max(1,Math.floor(cfg.flo/binHz)), hi=Math.max(lo,Math.min(nBins-1,Math.floor(cfg.fhi/binHz)));
    const refrN=Math.max(1,Math.round(cfg.gap/1000*fps));
    const decay=Math.pow(0.1,(1000/fps)/Math.max(40,cfg.decay));        // decay(ms) 동안 10%로 감쇠
    const W=Math.max(8,Math.round(fps*0.9)); const ring=new Float32Array(W); let ri=0,rn=0;

      let flux=0,k=0;
      for(let i=lo;i<=hi;i++){ const v=bytes[i]/255; const d=v-prev[k]; if(d>0)flux+=d; prev[k]=v; k++; }
      flux/=(hi-lo+1);
      let mean=0; for(let i=0;i<rn;i++)mean+=ring[i]; mean/=(rn||1);
      let va=0; for(let i=0;i<rn;i++){ const dd=ring[i]-mean; va+=dd*dd; }

  function alignSel(mode){

  // ===== 레이어 우클릭 컨텍스트 메뉴 (피그마식) =====
  let _ctx=null;
  function ensureCtx(){ if(_ctx)return _ctx; _ctx=document.createElement('div'); _ctx.className='ls-ctxmenu'; document.body.appendChild(_ctx);
    document.addEventListener('pointerdown',e=>{ if(_ctx&&!_ctx.contains(e.target)) closeCtx(); },true);
    window.addEventListener('blur',closeCtx); document.addEventListener('scroll',closeCtx,true); return _ctx; }
  function closeCtx(){ if(_ctx) _ctx.classList.remove('on'); }
  function ctxItem(label,key,fn,danger){ const b=document.createElement('button'); b.className='ls-ctxitem'+(danger?' danger':'');
    b.innerHTML='<span>'+label+'</span>'+(key?'<span class="ls-ctxkey">'+key+'</span>':'');
    b.addEventListener('click',()=>{ closeCtx(); fn(); }); return b; }
  function placeCtx(m,x,y){ m.classList.add('on'); m.style.left='-9999px'; m.style.top='-9999px';
    const fit=()=>{ const mw=m.offsetWidth||180, mh=m.offsetHeight||120, vw=window.innerWidth, vh=window.innerHeight;
      let L=x,T=y; if(L+mw>vw-6)L=x-mw; if(T+mh>vh-6)T=y-mh;
      m.style.left=Math.max(6,Math.min(L,vw-mw-6))+'px'; m.style.top=Math.max(6,Math.min(T,vh-mh-6))+'px'; };
    fit(); requestAnimationFrame(fit); }
  // 파라미터 우클릭 → 오토메이션 메뉴 (레인 추가/제거 · 현재 시점 키프레임)
  function openAutoCtx(x,y,key){ const m=ensureCtx(); m.innerHTML='';
    const has=autoKeys.indexOf(key)>=0;
    const linked=auto[key]&&auto[key].lk&&auto[key].lk.on;
    m.appendChild(ctxItem('◇ 현재 시점에 키프레임','',()=>addAutoKfNow(key)));
    m.appendChild(ctxItem(linked?'♪ 오디오 연결 편집…':'♪ 오디오에 연결…','',()=>openAudLinkPop(x,y,key)));
    if(has) m.appendChild(ctxItem('오토메이션 레인 제거','',()=>removeAutoLane(key),true));
    else m.appendChild(ctxItem('오토메이션 레인 추가','',()=>{ addAutoLane(key); showError('레인 추가: '+laneLabel(key)); }));
    placeCtx(m,x,y);
  }
  // ===== 커스텀 컬러 피커 — SV 면 + 휴 바 + HEX·RGB·HSL 세 표기 동시 편집 =====
  function _h2r(h){ const m=/^#?([0-9a-f]{6})$/i.exec(h||''); if(!m)return null; const n=parseInt(m[1],16); return [n>>16&255,n>>8&255,n&255]; }
  function _r2h(r,g,b2){ return '#'+[r,g,b2].map(x=>Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,'0')).join(''); }
  function _rgb2hsv(r,g,b2){ r/=255;g/=255;b2/=255; const mx=Math.max(r,g,b2),mn=Math.min(r,g,b2),d=mx-mn;
    let h2=0; if(d){ h2=(mx===r)?((g-b2)/d)%6:(mx===g)?((b2-r)/d+2):((r-g)/d+4); h2=(h2*60+360)%360; }
    return [h2, mx?d/mx:0, mx]; }
  function _hsv2rgb(h2,s,v){ const c=v*s, x=c*(1-Math.abs((h2/60)%2-1)), m=v-c;
    const k=(h2<60)?[c,x,0]:(h2<120)?[x,c,0]:(h2<180)?[0,c,x]:(h2<240)?[0,x,c]:(h2<300)?[x,0,c]:[c,0,x];
    return [(k[0]+m)*255,(k[1]+m)*255,(k[2]+m)*255]; }
  function _rgb2hsl(r,g,b2){ r/=255;g/=255;b2/=255; const mx=Math.max(r,g,b2),mn=Math.min(r,g,b2),l=(mx+mn)/2,d=mx-mn;
    let h2=0,s=0; if(d){ s=d/(1-Math.abs(2*l-1)); h2=(mx===r)?((g-b2)/d)%6:(mx===g)?((b2-r)/d+2):((r-g)/d+4); h2=(h2*60+360)%360; }
    return [h2,s*100,l*100]; }
  function _hsl2rgb(h2,s,l){ s/=100;l/=100; const c=(1-Math.abs(2*l-1))*s, x=c*(1-Math.abs((h2/60)%2-1)), m=l-c/2;
    const k=(h2<60)?[c,x,0]:(h2<120)?[x,c,0]:(h2<180)?[0,c,x]:(h2<240)?[0,x,c]:(h2<300)?[x,0,c]:[c,0,x];
    return [(k[0]+m)*255,(k[1]+m)*255,(k[2]+m)*255]; }
  function openColorPop(anchor,hex,onPick){ closeKfPop();
    let rgb=_h2r(hex)||[13,13,13]; let hsv=_rgb2hsv(rgb[0],rgb[1],rgb[2]);
    kfPop=document.createElement('div'); kfPop.className='ls-kfpop ls-clrpop';
    kfPop.innerHTML='<div class="sv"><canvas width="216" height="112"></canvas><div class="dot"></div></div>'
      +'<div class="hue"><div class="hued"></div></div>'
      +'<div class="vals">'
      +'<em>HEX</em><input data-cf="hex" spellcheck="false">'
      +'<em>RGB</em><input data-cf="r" inputmode="numeric"><input data-cf="g" inputmode="numeric"><input data-cf="b" inputmode="numeric">'
      +'<em>HSL</em><input data-cf="hh" inputmode="numeric"><input data-cf="hs" inputmode="numeric"><input data-cf="hl" inputmode="numeric">'
      +'</div><div class="qrow"></div>';
    document.body.appendChild(kfPop);
    const r0=anchor.getBoundingClientRect(), pw=216;
    kfPop.style.left=Math.max(8,Math.min(window.innerWidth-pw-8,r0.left+r0.width/2-pw/2))+'px';
    const phh=kfPop.offsetHeight||230;
    kfPop.style.top=Math.max(8,Math.min(window.innerHeight-phh-8,(r0.top-phh-8<8?(r0.bottom+8):(r0.top-phh-8))))+'px';
    kfPop.addEventListener('pointerdown',e=>e.stopPropagation());
    const cv=kfPop.querySelector('canvas'), cx=cv.getContext('2d');
    const dot=kfPop.querySelector('.dot'), hueEl=kfPop.querySelector('.hue'), hued=kfPop.querySelector('.hued');
    const F={}; kfPop.querySelectorAll('[data-cf]').forEach(i2=>F[i2.dataset.cf]=i2);
    function drawSV(){ const base=_hsv2rgb(hsv[0],1,1);
      cx.fillStyle=_r2h(base[0],base[1],base[2]); cx.fillRect(0,0,216,112);
      let g2=cx.createLinearGradient(0,0,216,0); g2.addColorStop(0,'#fff'); g2.addColorStop(1,'rgba(255,255,255,0)'); cx.fillStyle=g2; cx.fillRect(0,0,216,112);
      g2=cx.createLinearGradient(0,0,0,112); g2.addColorStop(0,'rgba(0,0,0,0)'); g2.addColorStop(1,'#000'); cx.fillStyle=g2; cx.fillRect(0,0,216,112); }
    function paint(src2){ rgb=_hsv2rgb(hsv[0],hsv[1],hsv[2]); const hx=_r2h(rgb[0],rgb[1],rgb[2]); const hsl=_rgb2hsl(rgb[0],rgb[1],rgb[2]);
      drawSV();
      dot.style.left=(hsv[1]*100)+'%'; dot.style.top=((1-hsv[2])*100)+'%';
      hued.style.left=(hsv[0]/360*100)+'%';
      if(src2!=='hex')F.hex.value=hx;
      if(src2!=='rgb'){ F.r.value=Math.round(rgb[0]); F.g.value=Math.round(rgb[1]); F.b.value=Math.round(rgb[2]); }
      if(src2!=='hsl'){ F.hh.value=Math.round(hsl[0]); F.hs.value=Math.round(hsl[1]); F.hl.value=Math.round(hsl[2]); }
      onPick(hx); }
    function dragOn(el,fn){ el.addEventListener('pointerdown',e=>{ e.preventDefault(); dragLock(true);
      const mv=ev=>{ const r2=el.getBoundingClientRect(); fn(Math.max(0,Math.min(1,(ev.clientX-r2.left)/r2.width)),Math.max(0,Math.min(1,(ev.clientY-r2.top)/r2.height))); };
      mv(e);
      const up=()=>{ dragLock(false); window.removeEventListener('pointermove',mv); window.removeEventListener('pointerup',up); };
      window.addEventListener('pointermove',mv); window.addEventListener('pointerup',up); }); }
    dragOn(kfPop.querySelector('.sv'),(x2,y2)=>{ hsv[1]=x2; hsv[2]=1-y2; paint(); });
    dragOn(hueEl,x2=>{ hsv[0]=x2*360; paint(); });
    F.hex.addEventListener('input',()=>{ const v=_h2r(F.hex.value); if(v){ hsv=_rgb2hsv(v[0],v[1],v[2]); paint('hex'); } });
    ['r','g','b'].forEach(k2=>F[k2].addEventListener('input',()=>{ const v=[+F.r.value||0,+F.g.value||0,+F.b.value||0]; hsv=_rgb2hsv(v[0],v[1],v[2]); paint('rgb'); }));
    ['hh','hs','hl'].forEach(k2=>F[k2].addEventListener('input',()=>{ const v=_hsl2rgb(((+F.hh.value||0)%360+360)%360,Math.max(0,Math.min(100,+F.hs.value||0)),Math.max(0,Math.min(100,+F.hl.value||0))); hsv=_rgb2hsv(v[0],v[1],v[2]); paint('hsl'); }));
    { const q=kfPop.querySelector('.qrow');                            // 빠른 선택: 기본 3색 + 프로젝트에서 쓰는 색
      let qc=['#0d0d0d','#ffffff',((grad&&grad.colors&&grad.colors[0])||'#2ec4a6')];
      try{ qc=qc.concat([...collectProjColors().keys()]); }catch(e){}
      [...new Set(qc.map(s2=>s2.toLowerCase()))].slice(0,8).forEach(cq=>{ const b2=document.createElement('button');
        b2.type='button'; b2.style.background=cq; b2.title=cq;
        b2.addEventListener('click',()=>{ const v=_h2r(cq); if(v){ hsv=_rgb2hsv(v[0],v[1],v[2]); paint(); } }); q.appendChild(b2); }); }
    paint();
  }
  // ♪ 오디오 연결 팝업 — 임의 파라미터를 대역 에너지에 실시간 링크 (키프레임 위 가산, 내보내기 반영)
  function openAudLinkPop(x,y,key){ closeKfPop();
    if(autoKeys.indexOf(key)<0) addAutoLane(key);
    const a=ensureAuto(key); if(!a.lk) a.lk={on:false,band:'low',amt:0.3}; a.on=true;
    kfPop=document.createElement('div'); kfPop.className='ls-kfpop';
    const fmtHz=v=>v>=1000?((v/1000).toFixed(v>=10000?0:1)+'kHz'):(Math.round(v)+'Hz');
    const paint=()=>{ const lk=a.lk;
      const f0=Math.max(20,Math.min(16000,+lk.f0||60)), f1=Math.max(20,Math.min(16000,+lk.f1||4000));
      const thr=Math.max(0,Math.min(0.9,+lk.thr||0)), atk=Math.max(0,Math.min(0.5,+lk.atk||0));
      const rel=Math.max(0.03,Math.min(2,(lk.rel==null?0.28:+lk.rel)));
      kfPop.innerHTML='<div class="sec">♪ 오디오 연결 — '+laneLabel(key)+'</div>'
        +'<div class="row">'+[['low','저역'],['mid','중역'],['high','고역'],['lvl','전체'],['custom','커스텀']].map(b=>'<button data-b="'+b[0]+'" class="'+(lk.on&&lk.band===b[0]?'on':'')+'">'+b[1]+'</button>').join('')+'</div>'
        +(lk.on&&lk.band==='custom'
          ?('<div class="sec" data-f0lab>대역 시작 '+fmtHz(f0)+'</div>'
            +'<div class="row"><input type="range" data-lk="f0" min="20" max="8000" step="10" value="'+f0+'" style="width:100%"></div>'
            +'<div class="sec" data-f1lab>대역 끝 '+fmtHz(f1)+'</div>'
            +'<div class="row"><input type="range" data-lk="f1" min="100" max="16000" step="20" value="'+f1+'" style="width:100%"></div>')
          :'')
        +'<div class="sec" data-amtlab>반응 강도 '+Math.round(lk.amt*100)+'% — 음수는 역방향</div>'
        +'<div class="row"><input type="range" data-lk="amt" min="-1" max="1" step="0.05" value="'+lk.amt+'" style="width:100%"></div>'
        +'<div class="sec" data-thrlab>게이트 '+Math.round(thr*100)+'%'+(thr>0?' — 이 이하 에너지는 무시':' — 0이면 항상 반응')+'</div>'
        +'<div class="row"><input type="range" data-lk="thr" min="0" max="0.9" step="0.05" value="'+thr+'" style="width:100%"></div>'
        +'<div class="sec" data-atklab>어택 '+(atk<=0.002?'즉시':Math.round(atk*1000)+'ms')+'</div>'
        +'<div class="row"><input type="range" data-lk="atk" min="0" max="0.5" step="0.01" value="'+atk+'" style="width:100%"></div>'
        +'<div class="sec" data-rellab>릴리즈 '+Math.round(rel*1000)+'ms</div>'
        +'<div class="row"><input type="range" data-lk="rel" min="0.03" max="1.5" step="0.01" value="'+rel+'" style="width:100%"></div>'
        +'<div class="row"><button data-a="off"'+(lk.on?' class="warn"':'')+'>'+(lk.on?'연결 해제':'대역을 선택하면 연결돼요')+'</button></div>'
        +'<div class="hint">대역 에너지 → 게이트 → 어택/릴리즈 스무딩 → 이 값에 가산 · 키프레임과 공존 · 내보내기에도 동일 반영</div>'; };
    paint(); document.body.appendChild(kfPop);
    const pw=270; kfPop.style.width=pw+'px';
    kfPop.style.left=Math.max(8,Math.min(window.innerWidth-pw-8,x-pw/2))+'px';
    kfPop.style.top=Math.max(8,Math.min(window.innerHeight-(kfPop.offsetHeight||200)-8,y+8))+'px';
    kfPop.addEventListener('pointerdown',e=>e.stopPropagation());
    kfPop.addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;
      if(b.dataset.b){ a.lk.on=true; a.lk.band=b.dataset.b; delete a.lk._e; paint(); renderTimeline(); persistAutoLocal(); }
      else if(b.dataset.a==='off'&&a.lk.on){ a.lk.on=false; delete a.lk._e; paint(); renderTimeline(); persistAutoLocal(); } });
    kfPop.addEventListener('input',e=>{ const r=e.target.closest('[data-lk]'); if(!r)return;
      const f=r.dataset.lk; let v=parseFloat(r.value)||0; const lk=a.lk;
      if(f==='amt'){ lk.amt=Math.max(-1,Math.min(1,v));
        const l2=kfPop.querySelector('[data-amtlab]'); if(l2)l2.textContent='반응 강도 '+Math.round(lk.amt*100)+'% — 음수는 역방향'; }
      else if(f==='f0'){ lk.f0=v; if((+lk.f1||4000)<v+50)lk.f1=v+50;
        const l2=kfPop.querySelector('[data-f0lab]'); if(l2)l2.textContent='대역 시작 '+fmtHz(v); }
      else if(f==='f1'){ lk.f1=v; if((+lk.f0||60)>v-50)lk.f0=Math.max(20,v-50);
        const l2=kfPop.querySelector('[data-f1lab]'); if(l2)l2.textContent='대역 끝 '+fmtHz(v); }
      else if(f==='thr'){ lk.thr=v;
        const l2=kfPop.querySelector('[data-thrlab]'); if(l2)l2.textContent='게이트 '+Math.round(v*100)+'%'+(v>0?' — 이 이하 에너지는 무시':' — 0이면 항상 반응'); }
      else if(f==='atk'){ lk.atk=v;
        const l2=kfPop.querySelector('[data-atklab]'); if(l2)l2.textContent='어택 '+(v<=0.002?'즉시':Math.round(v*1000)+'ms'); }
      else if(f==='rel'){ lk.rel=v;
        const l2=kfPop.querySelector('[data-rellab]'); if(l2)l2.textContent='릴리즈 '+Math.round(v*1000)+'ms'; }
      persistAutoLocal(); });
  }
  // el(또는 감싸는 컨트롤 행) 우클릭에 오토메이션 메뉴 연결
  function wireAutoCtx(el,keyFn){ if(!el||el._autoCtxWired)return; el._autoCtxWired=true;
    const row=el.closest('.ls-ctrl')||el.closest('.ls-orow')||el;
    row.addEventListener('contextmenu',ev=>{ ev.preventDefault(); ev.stopPropagation(); const k=keyFn(); if(k)openAutoCtx(ev.clientX,ev.clientY,k); }); }
  function openObjCtx(x,y,id,nmEl){ const o=findObj(id); if(!o)return; const m=ensureCtx(); m.innerHTML='';
    m.appendChild(ctxItem('이름 변경','',()=>{ const el=root.querySelector('.ls-lyr-row[data-id="'+id+'"] .ls-lyr-nm'); if(el) beginRename(id,el); else beginRenameFloat(id); }));
    if(o.type==='image') m.appendChild(ctxItem('이미지 교체','',()=>replaceImage(id)));
    m.appendChild(ctxItem('복제','⌘D',()=>dupObj(id)));
    if(selIds.size>1) m.appendChild(ctxItem('그룹으로 묶기','⌘G',()=>groupSelected()));
    { const oq=findObj(id); if(oq&&oq.gid!=null) m.appendChild(ctxItem('그룹 해제','⌘⇧G',()=>{ selIds=new Set(groupIds(oq.gid)); ungroupSelected(); })); }
    const sep2=document.createElement('div'); sep2.className='ls-ctxsep'; m.appendChild(sep2);
    m.appendChild(ctxItem('삭제','⌫',()=>delObj(id),true));
    // 먼저 화면 밖(측정용)에 표시해 크기를 잰 뒤, 정확한 위치로 옮긴다.
    m.classList.add('on'); m.style.left='-9999px'; m.style.top='-9999px';
    const place=()=>{
      const mw=m.offsetWidth||180, mh=m.offsetHeight||200;
      const vw=window.innerWidth, vh=window.innerHeight;
      let L,T;
      // 레이어 목록에서 우클릭(nmEl 존재)하면 그 행 우측, 캔버스에서 우클릭하면 마우스(커서) 위치
      const row=nmEl?root.querySelector('.ls-lyr-row[data-id="'+id+'"]'):null;
      if(row){ const r=row.getBoundingClientRect(); L=r.right+6; T=r.top;
        if(L+mw>vw-6) L=r.left-mw-6;                 // 오른쪽 공간 부족 시 왼쪽으로
        if(L<6) L=Math.min(x,vw-mw-6);
      } else { L=x; T=y;                              // 커서 기준
        if(L+mw>vw-6) L=x-mw;                         // 오른쪽 넘치면 커서 왼쪽으로
        if(T+mh>vh-6) T=y-mh;                         // 아래로 넘치면 커서 위로
      }
      m.style.left=Math.max(6,Math.min(L,vw-mw-6))+'px';
      m.style.top=Math.max(6,Math.min(T,vh-mh-6))+'px';
    };
    place(); requestAnimationFrame(place);           // 레이아웃 확정 후 한 번 더 보정
  }
  // 인라인 이름 편집 (레이어 목록 행)
  function beginRename(id,nmEl){ const o=findObj(id); if(!o||!nmEl)return;
    const inp=document.createElement('input'); inp.className='ls-lyr-nmedit'; inp.value=(o.name&&o.name.trim())?o.name.trim():objName(o);
    inp.addEventListener('pointerdown',e=>e.stopPropagation()); inp.addEventListener('click',e=>e.stopPropagation());
    const commit=save=>{ if(save){ const v=inp.value.trim(); o.name=v||''; } scheduleUndoCommit(); refreshObjs(); renderTimeline(); if(objPop&&objPop.classList.contains('on')&&o.id===selId) openPop(o.id); };
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); commit(true); } else if(e.key==='Escape'){ e.preventDefault(); commit(false); } });
    inp.addEventListener('blur',()=>commit(true));
    nmEl.replaceWith(inp); inp.focus(); inp.select();
  }
  // 캔버스 우클릭 시 목록 행이 없을 때 대비한 플로팅 이름 편집 (간단히 목록 렌더 후 재시도)
  function beginRenameFloat(id){ refreshObjs(); const el=root.querySelector('.ls-lyr-row[data-id="'+id+'"] .ls-lyr-nm'); if(el) beginRename(id,el); }
  function refreshObjs(){ renderObjLayer(); renderObjList(); syncLayerNames(); try{renderProjectColors();}catch(e){} try{renderProjectFonts();}catch(e){} scheduleUndoCommit(); }
  // 레이어 이름 변경(개명·텍스트 내용 수정)을 타임라인 라벨·클립에 즉시 반영 — 재빌드 없이 텍스트만
  function syncLayerNames(){ objs.forEach(o=>{ const nm=objName(o);
    root.querySelectorAll('.ls-rlabel.layer[data-id="'+o.id+'"] .ls-rl-name, .ls-lane.layer[data-id="'+o.id+'"] .ls-clip-name')
      .forEach(el=>{ if(el.textContent!==nm) el.textContent=nm; });
    root.querySelectorAll('.ls-rlabel.layer[data-id="'+o.id+'"]').forEach(lab=>{ const on=!!o.hidden;
      if(lab.classList.contains('hid')!==on) lab.classList.toggle('hid',on);
      const b=lab.querySelector('.ls-rl-eye'); if(b&&b.classList.contains('act')!==on){
        b.classList.toggle('act',on); b.title=on?'다시 표시':'숨기기'; b.innerHTML=eyeSvg(on); } }); }); }
  function selectObj(id){ selId=id; selIds=new Set(id!=null?[id]:[]); selTrack=null; refreshObjs(); }
  function selectObjAdd(id){                             // Shift+클릭 토글(피그마식)
    if(selIds.has(id)){ selIds.delete(id); if(selId===id) selId=selIds.size?[...selIds][selIds.size-1]:null; }
