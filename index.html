  function wireScrub(box){ box.querySelectorAll('.ls-scrub').forEach(sc=>{
    let inp=sc.nextElementSibling; while(inp && inp.tagName!=='INPUT') inp=inp.nextElementSibling;
    if(!inp||inp.type!=='number'){ const row=sc.closest('.ls-orow'); inp=row?row.querySelector('input[type=number]'):null; }
    if(!inp||inp.type!=='number')return;
    sc.addEventListener('pointerdown',e=>{ e.preventDefault(); e.stopPropagation();
      const step=parseFloat(inp.step)||1; const dec=(String(inp.step).split('.')[1]||'').length;
      const min=inp.min!==''?parseFloat(inp.min):-Infinity, max=inp.max!==''?parseFloat(inp.max):Infinity;
      const x0=e.clientX, v0=parseFloat(inp.value)||0; dragLock(true); document.body.classList.add('ls-scrubbing');
      const mv=ev=>{ const dx=ev.clientX-x0; const rate=ev.shiftKey?step*0.2:(ev.altKey?step*4:step);
        let nv=v0+dx*rate; nv=Math.max(min,Math.min(max,nv)); nv=parseFloat(nv.toFixed(Math.min(3,Math.max(dec,1))));

      const up=()=>{ dragLock(false); document.body.classList.remove('ls-scrubbing'); window.removeEventListener('pointermove',mv); window.removeEventListener('pointerup',up); };
      window.addEventListener('pointermove',mv); window.addEventListener('pointerup',up); });

  function fxShiftAutoKeys(objId,removedIdx){
    const K=i=>'obj'+objId+'_fx'+i;
    const del=K(removedIdx);
    if(auto[del]) delete auto[del];
    const ai=autoKeys.indexOf(del); if(ai>=0) autoKeys.splice(ai,1);
    for(let i=removedIdx+1;i<12;i++){ const from=K(i), to=K(i-1);
      if(auto[from]){ auto[to]=auto[from]; delete auto[from];
        const j=autoKeys.indexOf(from); if(j>=0) autoKeys[j]=to; } }
    persistAutoLocal();
  }

  function resizeObj(o,o0,hh,dx,dy,free){
    const G=0.02, snap=v=>free?v:Math.round(v/G)*G;
    if(o.type==='text'){ let sc=1;
      if(hh==='e'||hh==='se'||hh==='ne') sc=1+dx/Math.max(.01,o0.w);
      else if(hh==='w'||hh==='sw'||hh==='nw') sc=1-dx/Math.max(.01,o0.w);
      else if(hh==='s') sc=1+dy/Math.max(.01,o0.h);
      else if(hh==='n') sc=1-dy/Math.max(.01,o0.h);
      let ns=o0.size*Math.max(.05,sc); if(!free) ns=Math.round(ns);
      o.size=Math.max(8,Math.min(320,ns)); measureText(o); o.x=o0.x; o.y=o0.y; return; }
    if(hh.length===1){   // 변 = 한 축, 반대 변 고정
      if(hh==='e'){ o.w=Math.max(.02,snap(o0.w+dx)); o.x=(o0.x-o0.w/2)+o.w/2; }
      else if(hh==='w'){ o.w=Math.max(.02,snap(o0.w-dx)); o.x=(o0.x+o0.w/2)-o.w/2; }
      else if(hh==='s'){ o.h=Math.max(.02,snap(o0.h+dy)); o.y=(o0.y-o0.h/2)+o.h/2; }
      else if(hh==='n'){ o.h=Math.max(.02,snap(o0.h-dy)); o.y=(o0.y+o0.h/2)-o.h/2; }
    } else {             // 모서리 = 고정 비율, 반대 모서리 고정
      let sc=(hh==='se'||hh==='ne')?(1+dx/Math.max(.01,o0.w)):(1-dx/Math.max(.01,o0.w));
      sc=Math.max(.05,sc); let nw=o0.w*sc; if(!free) nw=Math.max(.02,Math.round(nw/G)*G); const nh=o0.h*(nw/Math.max(.001,o0.w));
      if(hh==='se'){ o.x=(o0.x-o0.w/2)+nw/2; o.y=(o0.y-o0.h/2)+nh/2; }
      else if(hh==='ne'){ o.x=(o0.x-o0.w/2)+nw/2; o.y=(o0.y+o0.h/2)-nh/2; }
      else if(hh==='nw'){ o.x=(o0.x+o0.w/2)-nw/2; o.y=(o0.y+o0.h/2)-nh/2; }
      else { o.x=(o0.x+o0.w/2)-nw/2; o.y=(o0.y-o0.h/2)+nh/2; }
      o.w=nw; o.h=nh;
    }
  }

      try{
        gp.setValueAtTime(gainAt(ovS),Math.max(0,L(ovS)));
        if(fin>0.01&&clS+fin>ovS&&clS+fin<clE) gp.linearRampToValueAtTime(1,L(clS+fin));
        if(fout>0.01&&foS<clE){ if(foS>ovS) gp.setValueAtTime(1,L(foS)); gp.linearRampToValueAtTime(gainAt(clE),L(clE)); }
      }catch(e){}
      try{ src.start(Math.max(0,L(ovS)), t.trimStart+(ovS-clS), Math.max(0.02,clE-ovS)+0.05); }catch(e){}
    });
    return await oc.startRendering();
  }

  // 믹스다운에서 프레임별 스펙트럼/킥 사전 계산: 라이브 AnalyserNode(fft1024, dB -100~-30, τ0.1)와
  // audioLevels()의 킥 로직을 재현. 60fps 기준 상수는 렌더 fps로 정규화.
  function analyzeMixFrames(buf,fps,frames){
    const N=1024, half=N>>1, sr=buf.sampleRate;
    const L=buf.getChannelData(0), R=buf.numberOfChannels>1?buf.getChannelData(1):L;
    const win=new Float32Array(N);
    for(let i=0;i<N;i++){ const a=2*Math.PI*i/N; win[i]=0.42-0.5*Math.cos(a)+0.08*Math.cos(2*a); } // Blackman
    const re=new Float32Array(N), im=new Float32Array(N);
    function fft(){ // 반복형 radix-2
      for(let i=1,j=0;i<N;i++){ let bit=N>>1; for(;j&bit;bit>>=1)j^=bit; j^=bit;
        if(i<j){ let t=re[i];re[i]=re[j];re[j]=t; t=im[i];im[i]=im[j];im[j]=t; } }
      for(let len=2;len<=N;len<<=1){ const ang=-2*Math.PI/len, wr=Math.cos(ang), wi=Math.sin(ang);
        for(let i=0;i<N;i+=len){ let cr=1,ci=0; const h=len>>1;
          for(let k=0;k<h;k++){ const ur=re[i+k],ui=im[i+k];
            const vr=re[i+k+h]*cr-im[i+k+h]*ci, vi=re[i+k+h]*ci+im[i+k+h]*cr;
            re[i+k]=ur+vr; im[i+k]=ui+vi; re[i+k+h]=ur-vr; im[i+k+h]=ui-vi;
            const ncr=cr*wr-ci*wi; ci=cr*wi+ci*wr; cr=ncr; } } } }
    const smooth=new Float32Array(half); const freq=new Array(frames); const kick=new Float32Array(frames);
    const minDb=-100,maxDb=-30,tau=0.1;
    const binHz=sr/N;
    const kStep=mkKickStep(binHz,half,fps,kickCfg());   // 라이브와 동일 검출기(fps 정규화) — 프리뷰=내보내기 일치
    for(let f=0;f<frames;f++){
      const end=Math.min(buf.length,Math.round((f/fps)*sr)+1), start=end-N;
      for(let i=0;i<N;i++){ const p=start+i; const s=(p>=0&&p<buf.length)?(L[p]+R[p])*0.5:0; re[i]=s*win[i]; im[i]=0; }
      fft();
      const bytes=new Uint8Array(half);
      for(let k=0;k<half;k++){ const mag=Math.hypot(re[k],im[k])/N;
        smooth[k]=tau*smooth[k]+(1-tau)*mag;
        const db=20*Math.log10(smooth[k]+1e-12);
        bytes[k]=Math.max(0,Math.min(255,Math.round(255*(db-minDb)/(maxDb-minDb)))); }
      freq[f]=bytes;
      kick[f]=kStep(bytes);
    }
    return {freq,kick};
  }

  function encodeAudioAAC(mux,buf){
    return new Promise((resolve,reject)=>{
      const enc=new AudioEncoder({output:(c,m)=>mux.addAudioChunk(c,m),error:reject});
      enc.configure({codec:'mp4a.40.2',sampleRate:buf.sampleRate,numberOfChannels:2,bitrate:192000});
      const CH=buf.sampleRate; // 1초 단위 청크
      const L=buf.getChannelData(0), R=buf.numberOfChannels>1?buf.getChannelData(1):L;
      for(let off=0;off<buf.length;off+=CH){
        const n=Math.min(CH,buf.length-off);
        const data=new Float32Array(n*2);
        data.set(L.subarray(off,off+n),0); data.set(R.subarray(off,off+n),n);
        const ad=new AudioData({format:'f32-planar',sampleRate:buf.sampleRate,numberOfFrames:n,numberOfChannels:2,timestamp:Math.round(off/buf.sampleRate*1e6),data});
        enc.encode(ad); ad.close();
      }
      enc.flush().then(()=>{ try{enc.close();}catch(e){} resolve(); },reject);
    });
  }

  function exportName(){ const stamp=new Date().toISOString().slice(0,16).replace(/[:T]/g,'');
    const tag=({'1':'1x1','0.75':'3x4','0.5625':'9x16','1.7778':'16x9'})[String(st.ar)]||'loop';
    return 'dinure_artwork_'+tag+'_'+stamp+'.mp4'; }
  async function startOfflineRender(){
    const fps=st.fps||30;
    const waOn=(waIn!=null&&waOut!=null&&waOut>waIn+0.05);
    const rT0=waOn?Math.max(0,waIn):0, rT1=waOn?Math.min(projDur(),waOut):projDur();
    const dur=Math.max(0.1,rT1-rT0), frames=Math.round(dur*fps);
    const [ow,oh]=outputSize(); const audioOn=hasAudio();
    if(!('VideoEncoder' in window)||!('VideoFrame' in window)){ showError('이 브라우저는 정밀 렌더를 지원하지 않아 실시간 녹화로 진행합니다.'); legacyRecord(); return; }
    // 저장 방식 — 디스크 스트리밍(장편에서도 RAM 사용 일정) 우선. 사용자 제스처가 살아있는 초입에서 위치를 먼저 묻는다.
    let fileStream=null; const fileName=exportName();
    if(window.showSaveFilePicker){
      try{ const fh=await showSaveFilePicker({suggestedName:fileName,types:[{description:'MP4 video',accept:{'video/mp4':['.mp4']}}]});
        fileStream=await fh.createWritable(); }
      catch(e){ if(e&&e.name==='AbortError'){ showError('저장 위치 선택을 취소해서 렌더를 시작하지 않았어요.'); return; }
        fileStream=null; } }                                   // 권한 등 그 외 실패 → 메모리 조립 폴백
    if(!fileStream){ const estMB=Math.round(targetBitrate()/8*dur/1048576);   // 폴백 시 대용량 사전 경고 — 완성본 전체가 RAM에 올라감
      if(estMB>1500 && !window.confirm('예상 파일 크기가 약 '+(estMB/1024).toFixed(1)+'GB예요.\n이 브라우저는 디스크 스트리밍을 지원하지 않아 완성본을 메모리에 조립하는데, 이 크기면 메모리 부족으로 실패할 수 있어요.\n\n계속할까요?')){ showError('렌더를 취소했어요.'); return; } }
    let Mux=null, vCodec=null;
    try{
      if(audioOn && (!('AudioEncoder' in window)||!('OfflineAudioContext' in window))) throw new Error('no AudioEncoder');
      if(audioOn){ const s=await AudioEncoder.isConfigSupported({codec:'mp4a.40.2',sampleRate:48000,numberOfChannels:2,bitrate:192000});
        if(!s||!s.supported) throw new Error('no aac'); }
      Mux=await loadMp4Muxer();
      vCodec=await pickAvcCodec(ow,oh,fps); if(!vCodec) throw new Error('no avc');
    }catch(e){ if(fileStream){ try{ await fileStream.abort(); }catch(e2){} fileStream=null; }
      showError('이 브라우저는 정밀 렌더를 지원하지 않아 실시간 녹화로 진행합니다.'); legacyRecord(); return; }

    recCancelled=false; recording=true; offlineRendering=true; _off={cancel:false}; applyGrid();
    recBtn.classList.add('on'); recBtn.textContent='■ 취소'; recDot.classList.add('on'); recLabel.textContent='렌더 준비 중…';
    const progEl=Q('#ls_prog'), progBar=progEl?progEl.querySelector('i'):null;
    if(progEl){ progEl.classList.add('on'); if(progBar)progBar.style.width='0%'; }
    prevWH=[canvas.width,canvas.height]; canvas.width=ow; canvas.height=oh;
    let ok=false, err=null;
    try{
      const target=fileStream?new Mux.FileSystemWritableFileStreamTarget(fileStream):new Mux.ArrayBufferTarget();
      const muxer=new Mux.Muxer({ target,
        video:{codec:'avc',width:ow,height:oh,frameRate:fps},
        audio: audioOn?{codec:'aac',numberOfChannels:2,sampleRate:48000}:undefined,
        fastStart: fileStream?false:'in-memory' });                // 스트리밍은 진행형 mdat + 종료 시 moov(랜덤 액세스 쓰기)
      let encErr=null;
      const venc=new VideoEncoder({output:(c,m)=>muxer.addVideoChunk(c,m),error:e=>{encErr=e;}});
      venc.configure({codec:vCodec,width:ow,height:oh,bitrate:targetBitrate(),framerate:fps});
      let mix=null, anal=null;
      if(audioOn){ recLabel.textContent='오디오 믹스다운…'; mix=await renderMixdownOffline(rT0,rT1);
        recLabel.textContent='오디오 분석…'; await yieldTask(); anal=analyzeMixFrames(mix,fps,frames); }
      const t0=performance.now(); const gop=fps*2;
      const hasVid=objs.some(q=>q.type==='video'&&q.vid&&!q.hidden);   // 비디오 레이어 존재 시 프레임별 정밀 시킹
      for(let i=0;i<frames;i++){
        if(_off.cancel||encErr) break;
        const t=rT0+i/fps;                                  // work area 지정 시 절대시간으로 렌더
        ovrFreq=anal?anal.freq[i]:null;
        if(hasVid) await seekVideosExact(t);
        drawScene(t, fxPhase(t), anal?anal.kick[i]:0, false); // 연속 위상 — 프리뷰와 동일
        const vf=new VideoFrame(canvas,{timestamp:Math.round(i*1e6/fps),duration:Math.round(1e6/fps)});
        venc.encode(vf,{keyFrame:(i%gop)===0}); vf.close();
        while(venc.encodeQueueSize>4 && !_off.cancel && !encErr) await yieldTask();
        if((i&3)===3) await yieldTask();
        if((i&7)===7 || i===frames-1){ const sp=((i+1)/fps)/Math.max(0.001,(performance.now()-t0)/1000);
          recLabel.textContent='렌더 '+(i+1)+'/'+frames+' · '+sp.toFixed(1)+'×';
          if(progBar)progBar.style.width=((i+1)/frames*100).toFixed(1)+'%'; }
      }
      ovrFreq=null;
      if(!_off.cancel && !encErr){
        recLabel.textContent='인코딩 마무리…'; await venc.flush();
        if(audioOn){ recLabel.textContent='오디오 인코딩…'; await encodeAudioAAC(muxer,mix); }
        muxer.finalize();
        if(progBar)progBar.style.width='100%';
        if(fileStream){ recLabel.textContent='파일 저장 중…'; await fileStream.close(); fileStream=null; }
        else saveBlob([target.buffer],'video/mp4');
        ok=true;
      }
      try{venc.close();}catch(e){}
      if(encErr) err=encErr;
    }catch(e){ err=e; }
    if(fileStream){ try{ await fileStream.abort(); }catch(e2){} fileStream=null; }   // 취소·실패 시 부분 파일 제거
    const cancelled=_off&&_off.cancel;
    offlineRendering=false; ovrFreq=null; _off=null; recCancelled=false;
    if(progEl){ progEl.classList.remove('on'); if(progBar)progBar.style.width='0%'; }
    endRecState();
    if(ok) showError('렌더 완료 — 파일이 저장됐어요.'+(waOn?' (구간 '+fmtT(rT0)+'–'+fmtT(rT1)+')':''));
    if(!ok){ showError(cancelled?'렌더를 취소했어요.':'정밀 렌더에 실패했어요. 잠시 후 다시 시도해 주세요.'); if(err){ try{console.error('[offline render]',err);}catch(e){} } }
  }

  // 폴백: 기존 실시간 MediaRecorder 경로 (WebCodecs 미지원 브라우저 전용)
  function legacyRecord(){
    const audioOn=!!(hasAudio()&&audioDest);
    const mime=pickMime(audioOn); if(!mime){ showError('이 브라우저는 영상 녹화를 지원하지 않아요.'); return; }
    recCancelled=false; recording=true; recBtn.classList.add('on'); recBtn.textContent='■ 취소'; recDot.classList.add('on'); applyGrid();
    prevWH=[canvas.width,canvas.height]; const [ow,oh]=outputSize(); canvas.width=ow; canvas.height=oh;
    const vstream=canvas.captureStream(st.fps||30);
    let stream=vstream, dur;
    if(audioOn){ stream=new MediaStream([...vstream.getVideoTracks(),...audioDest.stream.getAudioTracks()]);
      dur=Math.max(0.1,totalDur()); tlPlaying=true; ensureAudioNodes(); audioCtx.resume&&audioCtx.resume(); scheduleFrom(0,true); }
    else { dur=projDur(); }
    _rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:targetBitrate(),audioBitsPerSecond:192000});
    const chunks=[]; _rec.ondataavailable=e=>{if(e.data&&e.data.size)chunks.push(e.data);};
    _rec.onstop=()=>{ if(!recCancelled){ saveBlob(chunks,mime); } if(audioOn){ stopSources(); tlPlaying=false; tlFromT=0; }
      { const pe=Q('#ls_prog'); if(pe){ pe.classList.remove('on'); const pb=pe.querySelector('i'); if(pb)pb.style.width='0%'; } }
      endRecState(); if(recCancelled){ recCancelled=false; showError('녹화를 취소했어요.'); } };
    const t0=performance.now(); let stopped=false;
    function tick(now){ if(stopped||!recording)return;
      if(audioOn){ recElapsed=timelineTime(); if(recElapsed>=dur-0.04){ stopped=true; finishRec(); return; } }
      else { recElapsed=(now-t0)/1000; if(recElapsed>=dur){ recElapsed=dur; stopped=true; finishRec(); return; } }
      recLabel.textContent='REC '+recElapsed.toFixed(1)+'s';
      { const pe=Q('#ls_prog'); if(pe){ pe.classList.add('on'); const pb=pe.querySelector('i'); if(pb)pb.style.width=Math.min(100,recElapsed/dur*100).toFixed(1)+'%'; } }
      requestAnimationFrame(tick); }
    _rec.start(); requestAnimationFrame(tick);
    if(audioOn) showError('타임라인 전체('+fmtT(dur)+')를 실시간으로 녹화합니다.');
  }

  recBtn.addEventListener('click',()=>{
    if(recording){ recCancelled=true; if(_off){ _off.cancel=true; } else { finishRec(); } return; }
    if(!glReady)return;
    if(!(tex&&hasTex) && !((bgType==='gradient'||bgType==='both')&&gradProg)){ showError('먼저 이미지를 올리거나 배경 소스를 그라디언트로 바꿔 주세요.'); return; }
    startOfflineRender();
  });

  // 더블클릭 UX: 슬라이더 바 = 기본값 초기화, 값 표시(.ls-val/.ls-oval) = 직접 입력
  root.addEventListener('dblclick',e=>{
    const r=e.target.closest('input[type=range]');
    if(r){ r.value=r.defaultValue; r.dispatchEvent(new Event('input',{bubbles:true})); return; }
    const v=e.target.closest('.ls-val,.ls-oval');
    if(!v)return;
    const host=v.closest('.ls-ctrl,.ls-orow'); const sl=host&&host.querySelector('input[type=range]');
    if(!sl||v.querySelector('input'))return;
    const inp=document.createElement('input'); inp.type='number'; inp.className='ls-valedit';
    inp.value=sl.value; inp.step=sl.step||'any'; inp.min=sl.min; inp.max=sl.max;
    v.textContent=''; v.appendChild(inp); inp.focus(); inp.select();
    let fin=false;
    const done=commit=>{ if(fin)return; fin=true;
      if(commit){ const x=parseFloat(inp.value);
        if(isFinite(x)) sl.value=Math.max(parseFloat(sl.min),Math.min(parseFloat(sl.max),x)); }
      sl.dispatchEvent(new Event('input',{bubbles:true})); };   // input 이벤트가 값 표시를 다시 그려 편집칸 제거
    inp.addEventListener('keydown',ev=>{ ev.stopPropagation(); if(ev.key==='Enter')done(true); if(ev.key==='Escape')done(false); });
    inp.addEventListener('blur',()=>done(true));
  });
  window.addEventListener('resize',()=>{ if(!recording)resize(); });
  return { root, start, stop, resize };
}

</script>
